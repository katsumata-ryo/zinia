        - heading "寡婦控除・ひとり親控除 —— 離婚・死別・未婚のひとり親へ" [level=3] [ref=f2e907]
        - paragraph [ref=f2e908]:
          - text: かつての寡婦（寡夫）控除は、婚姻歴の有無や男女で扱いが分かれ不公平とされました。令和2年改正で整理され、
          - strong [ref=f2e909]: 婚姻歴を問わない「ひとり親控除」
          - text: が新設されて現在の形になっています。
        - table [ref=f2e911]:
          - rowgroup [ref=f2e912]:
            - row [ref=f2e913]:
              - columnheader "控除" [ref=f2e914]
              - columnheader "主な要件" [ref=f2e915]
              - columnheader "控除額" [ref=f2e916]
            - row [ref=f2e917]:
              - cell [ref=f2e918]:
                - link "ひとり親控除" [ref=f2e919] [cursor=pointer]:
                  - /url: "#g-hitorioya"
              - cell [ref=f2e920]:
                - text: 現に婚姻していない等で、生計を一にする子（その子の合計所得58万円以下）があり、本人の合計所得500万円以下。
                - strong [ref=f2e921]: 男女を問わない
              - cell "35万円" [ref=f2e922]
            - row [ref=f2e923]:
              - cell [ref=f2e924]:
                - link "寡婦控除" [ref=f2e925] [cursor=pointer]:
                  - /url: "#g-kafu"
              - cell "ひとり親に該当せず、夫と離婚・死別後に婚姻していない女性で、合計所得500万円以下（離婚の場合は扶養親族が必要）" [ref=f2e926]
              - cell "27万円" [ref=f2e927]
        - paragraph [ref=f2e928]:
          - text: ポイントは、(1)
          - strong [ref=f2e929]: ひとり親控除は未婚のひとり親も対象・男女不問
          - text: で額も大きい（35万円）、(2) どちらも
          - strong [ref=f2e930]: 本人の合計所得500万円以下
          - text: の上限がある、(3) 「子があるひとり親」はまずひとり親控除を検討し、それに当たらない女性が寡婦控除、という順序です。本書のペルソナはいずれも該当しませんが、実務では申告書の記載から本人の申告に基づいて判定します。
        - heading "勤労学生控除 —— 働きながら学ぶ本人へ" [level=3] [ref=f2e931]
        - paragraph [ref=f2e932]:
          - link "勤労学生控除" [ref=f2e933] [cursor=pointer]:
            - /url: "#g-kinrougakusei"
          - text: は、本人が学生で、かつ自ら働いて得た所得がある場合の控除（27万円）です。要件は、本人の合計所得金額が
          - strong [ref=f2e934]: 85万円以下
          - generic [ref=f2e935]: 令和7年分（旧75万円以下）
          - text: で、そのうち給与などの勤労による所得以外の所得が10万円以下であること。令和7年改正で所得要件が75万→85万円に引き上げられました（給与収入なら150万円以下に相当）。これは学生本人が自分の税金を減らす控除で、その学生を扶養する親側の扶養控除・特定親族特別控除（第6章）とは別の話である点に注意してください。
        - complementary [ref=f2e936]:
          - generic [ref=f2e937]: ENGINEER'S NOTE — 人的控除は「本人属性」と「所得上限ゲート」の組合せ
          - text: 本章の控除は、扶養控除のような家族の人数ではなく
          - strong [ref=f2e938]: 本人（または扶養親族）のフラグ
          - text: で決まるものが多い。設計指針は、(1) 障害者・寡婦・ひとり親・勤労学生を
          - strong [ref=f2e939]: それぞれ独立のboolean＋所得上限ゲート
          - text: として持ち、控除額は年度テーブルから引く。(2)
          - strong [ref=f2e940]: 「ひとり親」と「寡婦」は排他
          - text: （ひとり親優先）、両方立てない相互排他ルールを明示的に。(3) 所得上限（ひとり親・寡婦は500万円、勤労学生は85万円）や勤労学生の「その他所得10万円以下」の副条件を判定関数に含める。(4) 障害者控除は扶養控除と違い
          - strong [ref=f2e941]: 16歳未満でも適用
          - text: ——「扶養控除がゼロだから障害者控除もゼロ」と早合点する分岐バグに注意。判定基準日はいずれも12月31日時点です。
