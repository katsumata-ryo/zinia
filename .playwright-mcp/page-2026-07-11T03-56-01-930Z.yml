        - paragraph [ref=f2e2645]:
          - text: とりわけ
          - strong [ref=f2e2646]: 順序
          - text: が命取りです。「所得控除を引く → 1,000円未満切り捨て → 速算表 → 住宅ローン控除を引く → ×102.1% → 100円未満切り捨て」。この列のどこか1か所で丸めを前後させると、最終額が数百円ずれ、全従業員に波及します。
        - code [ref=f2e2648]: "// NG: 浮動小数点と早すぎる丸め const fukko = Math.round(nencho * 0.021) // 2.1%を別計算 → 誤差 const tax = Math.round((nencho + fukko) / 100) * 100 // OK: 整数演算で一括 → 最後に100円未満切り捨て const gross = Math.floor(nencho * 1021 / 1000) // 102.1%を一体で const tax = Math.floor(gross / 100) * 100 // 切り捨て（round ではない）"
        - paragraph [ref=f2e2649]:
          - text: お金の計算に浮動小数点の
          - code [ref=f2e2650]: × 1.021
          - text: を使うと、
          - code [ref=f2e2651]: 548500 * 1.021
          - text: が
          - code [ref=f2e2652]: 560018.4999…
          - text: になって切り捨て結果が変わる、といった事故が起きます。
          - strong [ref=f2e2653]:
            - text: 整数（円）で持ち、
            - code [ref=f2e2654]: Math.round
            - text: ではなく
            - code [ref=f2e2655]: Math.floor
            - text: ／切り捨てを明示
          - text: するのが安全です。
        - heading "落とし穴2 —— 税額表・速算表を「コードに埋め込む」" [level=3] [ref=f2e2656]
        - paragraph [ref=f2e2657]:
          - text: 算出所得税額は、累進課税を自前のループで再現するのではなく、
          - strong [ref=f2e2658]: 速算表
          - text: （税率と控除額の対応表）を引くのが制度上の正解です（第10章）。月次源泉は
          - strong [ref=f2e2659]: 税額表
          - text: （月額表・日額表、第2章の甲欄/乙欄）を引きます。これらを
          - code [ref=f2e2660]: if
          - text: のはしごでハードコードすると、改正のたびに全条件を書き換えることになり、しかも境界値を1本間違えると誰も気づけません。
        - code [ref=f2e2662]: "// 速算表はデータとして持つ（令和7年分・所得税の例） const SOKUSAN_2025: Bracket[] = [ { upTo: 1_950_000, rate: 0.05, deduct: 0 }, { upTo: 3_300_000, rate: 0.10, deduct: 97_500 }, { upTo: 6_950_000, rate: 0.20, deduct: 427_500 }, { upTo: 9_000_000, rate: 0.23, deduct: 636_000 }, { upTo: 18_000_000, rate: 0.33, deduct: 1_536_000 }, { upTo: 40_000_000, rate: 0.40, deduct: 2_796_000 }, { upTo: Infinity, rate: 0.45, deduct: 4_796_000 }, ] function calcTax(taxable: Yen, table: Bracket[]): Yen { const b = table.find(x => taxable <= x.upTo)! return Math.floor(taxable * b.rate - b.deduct) // 円未満は切り捨て }"
        - paragraph [ref=f2e2663]:
          - text: 表をデータにしておけば、改正は表の差し替えだけ。
          - code [ref=f2e2664]: calcTax
          - text: のロジックは何年でも不変です。税額表（月額表）も同様に、区分と扶養親族等の数を鍵にした参照テーブルとして持ちます。
          - strong [ref=f2e2665]: 「表は表として持ち、コードは表を引くだけ」
          - text: が鉄則です（年度パラメータ化は第26章）。
        - heading "落とし穴3 —— 「所得」と「収入」の変数名問題" [level=3] [ref=f2e2666]
        - paragraph [ref=f2e2667]:
          - text: 本書が第1章から繰り返してきた区別——
          - strong [ref=f2e2668]: 収入（もらった額）
          - text: と
          - strong [ref=f2e2669]: 所得（収入から必要経費・給与所得控除を引いた額）
          - text: ——は、実装では変数名の問題として牙を剥きます。「103万円の壁」「123万円」は
          - strong [ref=f2e2670]: 給与収入
          - text: の話、扶養の判定要件「合計所得58万円以下」は
          - strong [ref=f2e2671]: 所得
          - text: の話。両者を
          - code [ref=f2e2672]: income
          - text: という一語で受けると、片方の意味で入った値をもう片方の関数に渡す、という気づきにくいバグが必ず生まれます。
        - code [ref=f2e2674]: "// NG: どちらも income で、意味が混ざる function isDependent(income: number) { return income <= 580_000 } isDependent(1_230_000) // 収入123万を所得と誤って渡す → 誤判定 // OK: 型・名前で「収入」と「所得」を分ける type Revenue = number & { readonly _r: unique symbol } // 収入 type Income = number & { readonly _i: unique symbol } // 所得 function salaryIncomeToIncome(rev: Revenue, year: TaxYear): Income { /* 給与所得控除 */ } function isDependent(income: Income, year: TaxYear): boolean { /* 合計所得で判定 */ }"
        - paragraph [ref=f2e2675]:
          - text: 田中さんの弟・翔は
          - strong [ref=f2e2676]: アルバイト給与150万円（収入）
          - text: で、給与所得控除65万円を引いた
          - strong [ref=f2e2677]: 合計所得85万円
          - text: 。扶養要件（所得58万円以下）は超えるが特定親族特別控除の対象、という判断は「収入で判定していないか／所得に変換したか」を型で強制できれば事故りません。命名規約として
          - code [ref=f2e2678]: salaryRevenue
          - text: /
          - code [ref=f2e2679]: totalIncome
          - text: のように
          - strong [ref=f2e2680]: 必ず「収入」か「所得」かを名前に含める
          - text: だけでも効果は大きいです。
        - complementary [ref=f2e2681]:
          - generic [ref=f2e2682]: ENGINEER'S NOTE — 壁の金額はドメインの単位変換点
          - text: 「103万」「123万」「160万」「178万」といった“壁”の数字は、いずれも
          - strong [ref=f2e2683]: 給与収入
          - text: ベースの表現で、内部判定に使う
          - strong [ref=f2e2684]: 合計所得
          - text: とは給与所得控除ぶんズレます。UI（本人が入力するのは収入）と内部ロジック（所得で判定）の
          - strong [ref=f2e2685]: 境界に一箇所だけ変換関数
          - text: を置き、それ以外の場所では所得しか流れないようにするのが定石です。壁の金額を判定式に直書きすると、給与所得控除の改正（令和7年の最低保障55万→65万）で壁が動いたときに追随できません。壁は「収入←→所得の変換の結果として出てくる値」であって、判定の一次定数ではない、と捉えてください。
        - heading "落とし穴4 —— 判定基準日は「12月31日時点の現況」" [level=3] [ref=f2e2686]
        - paragraph [ref=f2e2687]:
          - text: 年齢・扶養・配偶者の判定は、申告書提出日でも計算実行日でもなく、原則
          - strong [ref=f2e2688]: その年の12月31日時点の現況
          - text: で行います（第6章）。年の途中で誕生日を迎えても16歳になったかは
          - strong [ref=f2e2689]: 12/31時点
          - text: 、婚姻・離婚・死亡・出生も
          - strong [ref=f2e2690]: 12/31時点の状態
          - text: で数える。実装では「今日」で年齢を計算してしまう
          - code [ref=f2e2691]: new Date()
          - text: が典型的な地雷です。
        - code [ref=f2e2693]: "// NG: 実行時点で年齢を計算 → 走らせる日によって結果が変わる const age = (Date.now() - birth) / YEAR // OK: 判定基準日を明示的に渡す function ageOnDec31(birth: Date, year: TaxYear): number { const base = new Date(year, 11, 31) // 12/31（月は0始まり） let a = base.getFullYear() - birth.getFullYear() const md = (base.getMonth() - birth.getMonth()) || (base.getDate() - birth.getDate()) if (md < 0) a-- return a }"
        - paragraph [ref=f2e2694]:
          - text: 特定扶養（19歳以上23歳未満）・老人扶養（70歳以上）・16歳未満の区分は、この
          - code [ref=f2e2695]: ageOnDec31
          - text: ひとつを全判定で使い回すこと。死亡した扶養親族は「死亡時の現況」で判定する等の例外もあるため、
          - strong [ref=f2e2696]: 基準日は定数ではなく引数
          - text: にしておくと、こうした特例を局所的に差し込めます。「計算をいつ実行しても結果が同じ（べき等）」であることが、再計算（第26章）や監査の前提です。
        - heading "落とし穴5 —— そのほかの定番" [level=3] [ref=f2e2697]
