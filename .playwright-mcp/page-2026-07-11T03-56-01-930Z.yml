          - term [ref=f2e3248]: 配偶者特別控除（はいぐうしゃとくべつこうじょ）
          - definition [ref=f2e3249]:
            - text: 配偶者の所得が配偶者控除の要件を超えても、一定範囲までは控除を段階的に残す制度。配偶者の給与収入150万円までは満額（38万円）、201万円で消滅。「働くと急に損をする」壁を緩和する趣旨。本人の所得制限も配偶者控除と同様にかかる。
