        - paragraph [ref=f2e1306]: つまりカレンダーは、第1章の「収入→所得→課税所得→税額」というパイプラインを、時間軸に引き伸ばしたものにほかなりません。上流（情報収集）が遅れれば下流（精算・提出）がすべてずれる——だから会社は10月から前倒しで動くのです。
        - heading "二つの「締め」——精算の締めと納付の締め" [level=3] [ref=f2e1307]
        - paragraph [ref=f2e1308]:
          - text: 実務で混同しやすいのが、12月の
          - strong [ref=f2e1309]: 精算
          - text: と1月の
          - strong [ref=f2e1310]: 納付・提出
          - text: という二つの締めです。12月の最終給与で従業員個人への過不足を清算しても、それで終わりではありません。会社は精算後の源泉所得税を
          - strong [ref=f2e1311]: 翌年1月10日まで
          - text: （源泉所得税の納期の特例＝半年まとめ払いを受けている小規模事業者は
          - strong [ref=f2e1312]: 1月20日まで
          - text: ）に国へ納めます。さらに
          - strong [ref=f2e1313]: 1月31日まで
          - text: に源泉徴収票を本人へ、給与支払報告書を市区町村へ、法定調書を税務署へ提出します。個人への精算（12月）と行政への報告・納付（翌1月）は別の締切だと切り分けておきましょう。
        - complementary [ref=f2e1314]:
          - generic [ref=f2e1315]: ENGINEER'S NOTE — カレンダーはステートマシンで表現する
          - text: 年末調整プロダクトのバックボーンは、このカレンダーを
          - strong [ref=f2e1316]: 従業員ごとのステートマシン
          - text: として持つことです。
          - code [ref=f2e1317]: 未着手 → 申告書提出済 → 会社チェック済 → 差し戻し → 計算確定 → 精算済 → 帳票交付済
          - text: のような状態遷移で管理し、各遷移に期限（deadline）を紐づけます。設計上の勘所は3つ。(1)
          - strong [ref=f2e1318]: 締切は年度パラメータ
          - text: ——1月10日/20日/31日は制度で決まっていても、土日祝でずれるので営業日カレンダーを別データとして持つ（第26章）。(2)
          - strong [ref=f2e1319]: 個人精算の締め
          - text: と
          - strong [ref=f2e1320]: 行政提出の締め
          - text: は別の状態遷移として分離する。前者は給与計算、後者は法定調書・給与支払報告書の生成という別ドメインへつながる。(3)
          - strong [ref=f2e1321]: 差し戻しループ
