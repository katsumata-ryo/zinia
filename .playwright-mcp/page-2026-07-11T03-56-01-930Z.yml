      - heading "第1部 全体地図 — 年末調整とは何か" [level=2] [ref=f2e162]
      - generic [ref=f2e163]:
        - heading "第1章 所得税の全体構造" [level=2] [ref=f2e164]
        - generic [ref=f2e165]:
          - strong [ref=f2e166]: この章の位置づけ：
          - text: 本書のすべての土台となる「一枚の地図」を描く章です。年末調整とは、突き詰めれば「1年間の所得税を正しく計算し直す」手続きにほかなりません。その所得税がどういう順序で計算されるのか——
          - strong [ref=f2e167]: 収入 → 所得 → 課税所得 → 税額
          - text: という背骨をここで押さえておけば、以降の章に登場する個々の控除や帳票が、この地図の「どこの部品なのか」として整理できます。まだ細部は覚えなくて構いません。まずは流れの骨格だけをつかんでください。
        - paragraph [ref=f2e168]:
          - text: 私たちは日常会話で「年収」「所得」「税金」といった言葉を、かなり大ざっぱに混ぜて使っています。しかし所得税の世界では、これらは
          - strong [ref=f2e169]: はっきり別物
          - text: で、しかも「この順番でしか計算できない」という強い決まりがあります。まずはその順番——本書の背骨となる計算フローを見てみましょう。
        - heading "収入 → 所得 → 課税所得 → 税額 のフロー図" [level=3] [ref=f2e170]
        - img "収入から年税額までの所得税計算フロー図。収入から給与所得控除を引いて所得、所得から所得控除を引いて課税所得、課税所得に税率を掛けて算出税額、税額控除を引いて基準所得税額、復興特別所得税2.1%を加えて年税額となる。" [ref=f2e171]:
          - generic [ref=f2e172]:
            - generic [ref=f2e173]:
              - text: ① 収入（額面）
              - generic [ref=f2e174]: 給与・賞与の総支給額。源泉徴収票の「支払金額」
            - generic [ref=f2e175]:
              - text: ▼
              - generic [ref=f2e176]: − 給与所得控除
              - text: （会社員の必要経費のみなし）
            - generic [ref=f2e177]:
              - text: ② 所得（給与所得）
              - generic [ref=f2e178]: = もうけ。源泉徴収票の「給与所得控除後の金額」
            - generic [ref=f2e179]:
              - text: ▼
              - generic [ref=f2e180]: − 所得控除
              - text: （基礎・配偶者・扶養・社会保険料・生命保険料…）
            - generic [ref=f2e181]:
              - text: ③ 課税所得
              - generic [ref=f2e182]: = 税率をかける対象。1,000円未満は切り捨て
            - generic [ref=f2e183]:
              - text: ▼
              - generic [ref=f2e184]: × 税率（5〜45%）
              - text: − 速算表の控除額
            - generic [ref=f2e185]:
              - text: ④ 算出所得税額
              - generic [ref=f2e186]: 課税所得に税率を適用した「素の税額」
            - generic [ref=f2e187]:
              - text: ▼
              - generic [ref=f2e188]: − 税額控除
              - text: （住宅ローン控除など）
            - generic [ref=f2e189]: ⑤ 基準所得税額
            - generic [ref=f2e190]:
              - text: ▼
              - generic [ref=f2e191]: + 復興特別所得税 2.1%
            - generic [ref=f2e192]: ⑥ 年税額（＝その年に納めるべき所得税）
          - paragraph [ref=f2e193]:
            - text: オレンジの「−」は
            - strong [ref=f2e194]: 差し引く
            - text: 操作、青の「×／＋」は
            - strong [ref=f2e195]: 掛ける・足す
            - text: 操作。年末調整とは、この①〜⑥をもう一度たどり直して確定させる作業です。
        - heading "「収入」と「所得」は違う" [level=3] [ref=f2e196]
        - paragraph [ref=f2e197]:
          - text: 最初の関門がここです。
          - link "収入" [ref=f2e198] [cursor=pointer]:
            - /url: "#g-goukei"
          - text: とは受け取った額面そのもの（給与なら額面の総支給額）。
          - strong [ref=f2e199]: 所得
          - text: とは、そこから「その収入を得るためにかかった経費」を引いた
          - emphasis [ref=f2e200]: もうけ
          - text: です。個人事業主なら実際の経費を引きますが、会社員は経費を一つひとつ集計しません。代わりに「収入がこれくらいなら経費はこれくらいだろう」と法律があらかじめ決めた概算額を引きます。これが
          - link "給与所得控除" [ref=f2e201] [cursor=pointer]:
            - /url: "#g-kyuyokoujo"
          - text: です。
        - paragraph [ref=f2e202]:
          - text: たとえば佐藤健太さん（年収620万円）の場合、給与所得控除を差し引いた後の給与所得はおよそ452万円になります
          - generic [ref=f2e203]: 令和7年分時点
          - text: 。「620万円もらった」は収入の話、「所得は452万円」はもうけの話。以降の税金計算はすべて
          - strong [ref=f2e204]: 所得
          - text: を起点に進みます。給与所得控除の具体的な計算は第5章で扱います。
        - heading "所得控除で「課税所得」まで削る" [level=3] [ref=f2e205]
        - paragraph [ref=f2e206]:
          - text: 所得が出たら、次はそこから
          - link "所得控除" [ref=f2e207] [cursor=pointer]:
            - /url: "#g-shotokukoujo"
          - text: を引きます。所得控除とは、「この人にはこういう事情があるから、担税力（税を負担する力）がその分小さい」という個人の事情を税額に反映させる仕組みです。誰にでも一律に認められる
          - link "基礎控除" [ref=f2e208] [cursor=pointer]:
            - /url: "#g-kiso"
          - text: 、扶養する家族がいる場合の扶養控除・配偶者控除、支払った社会保険料や生命保険料に応じた控除などがここに含まれます。
        - paragraph [ref=f2e209]:
          - text: 所得からこれら所得控除をすべて引いた残りが
          - link "課税所得" [ref=f2e210] [cursor=pointer]:
            - /url: "#g-kazeishotoku"
          - text: です。名前のとおり「ここに初めて税率がかかる金額」で、1,000円未満は切り捨てます。所得控除が大きいほど課税所得は小さくなり、税額も下がります。
        - heading "課税所得に税率をかけて「税額」を出す" [level=3] [ref=f2e211]
        - paragraph [ref=f2e212]:
          - text: 日本の所得税は
          - strong [ref=f2e213]: 超過累進税率
          - text: です。課税所得が大きいほど、上に積み上がった部分にだけ高い税率がかかります。実務では段階ごとに計算する代わりに、下の
          - link "速算表" [ref=f2e214] [cursor=pointer]:
            - /url: "#g-sokusan"
          - text: で一気に計算します
          - generic [ref=f2e215]: 令和7年分時点
          - text: 。
        - table [ref=f2e217]:
          - rowgroup [ref=f2e218]:
            - row [ref=f2e219]:
              - columnheader "課税所得金額（A）" [ref=f2e220]
              - columnheader "税率（B）" [ref=f2e221]
              - columnheader "控除額（C）" [ref=f2e222]
            - row [ref=f2e223]:
              - cell "1,000円 〜 194.9万円" [ref=f2e224]
              - cell "5%" [ref=f2e225]
              - cell "0円" [ref=f2e226]
            - row [ref=f2e227]:
              - cell "195万円 〜 329.9万円" [ref=f2e228]
              - cell "10%" [ref=f2e229]
              - cell "97,500円" [ref=f2e230]
