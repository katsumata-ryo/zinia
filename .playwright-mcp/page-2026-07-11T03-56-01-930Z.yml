          - term [ref=f2e3192]: 税額控除（ぜいがくこうじょ）
          - definition [ref=f2e3193]:
            - text: 算出した所得税額から
            - strong [ref=f2e3194]: 直接
            - text: 差し引く控除。代表は住宅借入金等特別控除。所得控除が課税所得を減らして間接的に税を下げるのに対し、税額控除は税額を1円単位でそのまま減らすため効きが大きい。
