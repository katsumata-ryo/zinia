        - paragraph [ref=f2e2804]:
          - text: とりわけ実装者を悩ませるのが⑤です。令和8年分は
          - strong [ref=f2e2805]: 年末調整には改正が反映されるのに、月次の源泉徴収税額表は令和8年中は据え置き
