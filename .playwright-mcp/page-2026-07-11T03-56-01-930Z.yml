      - heading "第5部 歴史と変化" [level=2] [ref=f2e2053]
      - generic [ref=f2e2054]:
        - heading "第20章 年末調整の歴史" [level=2] [ref=f2e2055]
        - generic [ref=f2e2056]:
          - strong [ref=f2e2057]: この章の位置づけ：
          - text: ここまでの章は「いまの制度がどう動くか」を扱ってきました。第5部では視点を時間軸に移します。この章はその出発点として、
          - strong [ref=f2e2058]: なぜ日本では「会社が従業員の所得税を精算する」という一見不思議な仕組みが当たり前なのか
          - text: を、歴史からたどります。源泉徴収と年末調整は、もともと別の目的で生まれた別の制度でした。その成り立ちを知ると、以降の章で扱う「毎年の改正」が、この制度の骨格の上でどこをいじっているのかが立体的に見えてきます。
        - paragraph [ref=f2e2059]:
          - text: 本書をここまで読んだあなたは、月次で概算徴収し（第2章）、年末に精算する（第3章）という二段構えを、もう当然のものとして受け止めているはずです。しかしこれは決して「自然」な仕組みではありません。世界を見渡せば、給与から税を天引きする国は多くても、
          - strong [ref=f2e2060]: 会社が年末に一人ひとりの所得税を確定させてしまう
          - text: 国は少数派です。なぜ日本はこうなったのか。答えは、戦争と戦後復興という歴史的事情の中にあります。
        - heading "源泉徴収制度の導入 —— 戦費調達という出発点" [level=3] [ref=f2e2061]
        - paragraph [ref=f2e2062]:
          - text: 日本の給与に対する源泉徴収は、
          - strong [ref=f2e2063]: 1940年（昭和15年）
          - text: の税制改正で本格導入されました。時代背景は日中戦争のさなかで、政府は膨張する戦費をまかなうため、税収を「早く・確実に・薄く広く」集める仕組みを必要としていました。給与を支払う側（会社）に天引きと納付を義務づければ、国は個々の労働者から取り立てる手間なく、給料日ごとに税を吸い上げられます。この「支払う側に徴収させる」という発想が、第2章で学んだ
          - link "源泉徴収" [ref=f2e2064] [cursor=pointer]:
            - /url: "#g-gensen"
          - text: 義務者の原型です。
        - paragraph [ref=f2e2065]: もともとこの方式はドイツの制度を参考にしたものでした。徴税コストを国から民間（雇用主）へ転嫁し、しかも取りはぐれが少ない——徴税の効率という一点において、源泉徴収は極めて優秀な発明です。だからこそ戦後も廃止されず、むしろ制度の中心に据えられていきます。
        - complementary [ref=f2e2066]:
          - generic [ref=f2e2067]: ENGINEER'S NOTE — 「徴収義務の外部委託」というアーキテクチャ
          - text: 源泉徴収を設計思想として眺めると、これは
          - strong [ref=f2e2068]: 国家が担うべき徴税処理を、給与支払者という多数のノードへ分散委託したアーキテクチャ
          - text: だと読めます。国は各社が正しく計算・納付しているかを検証すればよく、個々の納税者と直接トランザクションを張る必要がない。スケールの観点では理にかなっていますが、副作用として
          - strong [ref=f2e2069]: 計算ロジックの正しさを担保する責任が民間側（＝私たちが作るプロダクト）へ移譲される
          - text: 。年末調整プロダクトのバグが「一社の不具合」で済まず「納税額の誤り」に直結するのは、この歴史的な責任移譲の帰結です。制度の重さは、その出自から来ています。
        - heading "年末調整の誕生 —— 概算徴収の「後始末」として" [level=3] [ref=f2e2070]
        - paragraph [ref=f2e2071]: 源泉徴収には構造的な弱点があります。毎月の天引きはあくまで概算です（第3章）。扶養の状況や生命保険料などの個人の事情は、給料日の時点では正確に反映しきれません。放っておけば、年間の天引き合計と本来の税額との間に必ずズレが出ます。このズレを各人が自分で確定申告して精算する——というのが本来の姿ですが、それでは源泉徴収で稼いだ「効率」が台無しです。全国民が申告に殺到すれば税務署がパンクします。
        - paragraph [ref=f2e2072]:
          - text: そこで
          - strong [ref=f2e2073]: 1947年（昭和22年）
          - text: 、精算そのものも会社にやらせる仕組みが導入されました。これが
          - link "年末調整" [ref=f2e2074] [cursor=pointer]:
            - /url: "#g-nencho"
          - text: です。徴収を委託したのだから、精算も委託してしまえばよい——年末調整は、源泉徴収という効率追求の論理を最後まで貫いた結果として生まれた、いわば「概算徴収の後始末を雇用主に押し付ける制度」なのです。第3章で見た還付・追徴の仕組みは、この後始末を数字で表したものにほかなりません。
        - table [ref=f2e2076]:
          - rowgroup [ref=f2e2077]:
            - row [ref=f2e2078]:
              - columnheader "年" [ref=f2e2079]
              - columnheader "できごと" [ref=f2e2080]
              - columnheader "意味" [ref=f2e2081]
            - row [ref=f2e2082]:
              - cell "1940年（昭15）" [ref=f2e2083]
              - cell "給与への源泉徴収を本格導入" [ref=f2e2084]
              - cell "戦費調達。徴税を雇用主へ委託" [ref=f2e2085]
            - row [ref=f2e2086]:
              - cell "1947年（昭22）" [ref=f2e2087]
              - cell "年末調整を導入" [ref=f2e2088]
              - cell "概算徴収の精算も雇用主へ委託" [ref=f2e2089]
            - row [ref=f2e2090]:
              - cell "1950年（昭25）" [ref=f2e2091]
              - cell "シャウプ勧告後の税制で定着" [ref=f2e2092]
              - cell "申告納税を原則としつつ給与は源泉＋年調で完結" [ref=f2e2093]
        - paragraph [ref=f2e2094]:
          - text: 戦後のシャウプ勧告（1949年）は本来「申告納税」を民主的な税制の柱としました。しかし給与所得者については、源泉徴収と年末調整で納税がほぼ完結する仕組みが温存されます。結果として日本は、
          - strong [ref=f2e2095]: 建前は申告納税、実態は多くの給与所得者が申告せずに済む
          - text: という二重構造を持つことになりました。この構造こそ、第23章で扱う「年末調整不要論」の火種でもあります。
        - heading "なぜ日本は「会社が税を精算する」国なのか —— 諸外国との比較" [level=3] [ref=f2e2096]
        - paragraph [ref=f2e2097]:
          - text: 天引き（源泉徴収）自体は多くの国にあります。違うのは
          - strong [ref=f2e2098]: 「精算まで会社がやるか」
          - text: です。ここで各国を並べてみましょう
          - generic [ref=f2e2099]: 制度の大枠を示すための概観であり、細部は各国の改正で変わります。
          - text: 。
        - table [ref=f2e2101]:
          - rowgroup [ref=f2e2102]:
            - row [ref=f2e2103]:
              - columnheader "国" [ref=f2e2104]
              - columnheader "給与天引き" [ref=f2e2105]
              - columnheader "年末の精算" [ref=f2e2106]
              - columnheader "多くの給与所得者は…" [ref=f2e2107]
            - row [ref=f2e2108]:
              - cell "日本" [ref=f2e2109]
              - cell "あり" [ref=f2e2110]
              - cell [ref=f2e2111]:
                - strong [ref=f2e2112]: 会社が年末調整
              - cell "申告不要で完結" [ref=f2e2113]
            - row [ref=f2e2114]:
              - cell "ドイツ" [ref=f2e2115]
              - cell "あり" [ref=f2e2116]
              - cell "原則は本人が申告（会社精算の制度も過去にあったが縮小）" [ref=f2e2117]
              - cell "還付目当てに申告する人が多い" [ref=f2e2118]
