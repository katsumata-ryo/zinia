              - cell [ref=f2e2288]:
                - strong [ref=f2e2289]: 令和8年分以後
            - row [ref=f2e2290]:
              - cell "② 給与所得控除の最低保障額の引上げ＋「年末調整等のための給与所得控除後の給与等の金額の表」の改正" [ref=f2e2291]
              - cell "令和8年12月1日" [ref=f2e2292]
