          - term [ref=f2e3188]: 生計を一にする（せいけいをいつにする）
          - definition [ref=f2e3189]:
            - text: 扶養・配偶者控除の判定に使う概念。同居している必要はなく、単身赴任や進学で別居していても、生活費・学費などを常に送金し合っていれば「生計を一にする」に該当する。財布が一つかどうかで判断する。
