          - text: つまり
          - strong [ref=f2e1702]: 年末調整で確定した令和7年の所得が、1年以上遅れて令和8年6月からの住民税として跳ね返ってくる
          - text: 。この時間差は、新卒2年目に住民税が急に始まる現象や、退職した翌年に住民税の請求が来て驚く現象の正体です。年末調整データが翌年度課税の入力になっている、という因果を掴むと腑に落ちます。
        - heading "特別徴収と普通徴収 —— 誰が納めるか" [level=3] [ref=f2e1703]
        - paragraph [ref=f2e1704]:
          - text: 住民税の納め方は2種類あります。
          - strong [ref=f2e1705]: 特別徴収
          - text: は会社が給与から天引きして市区町村へ納める方式、
          - strong [ref=f2e1706]: 普通徴収
          - text: は本人が納付書で自分で納める方式です。給与所得者は原則
          - strong [ref=f2e1707]: 特別徴収
          - text: で、これは所得税の源泉徴収と同じ「会社が徴収義務者になる」構図です（第2章）。所得税の源泉徴収と住民税の特別徴収は、名前は違えど「会社が個人の税を天引きして行政へ渡す」という同じ骨格を持ちます。
