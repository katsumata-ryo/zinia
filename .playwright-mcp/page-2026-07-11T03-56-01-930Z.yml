                - strong [ref=f2e1222]: 0円
        - paragraph [ref=f2e1223]:
          - text: 佐藤さんは税額控除（住宅ローン控除21万円）が算出所得税額8.9万円を上回り、
          - strong [ref=f2e1224]: 年調所得税額が0円で頭打ち
          - text: になりました。結果、その年の所得税・復興特別所得税はゼロ。毎月源泉徴収されてきた所得税は
          - strong [ref=f2e1225]: ほぼ全額が還付
          - text: されます。これが第3章で「佐藤さんはなぜ還付されるのか」と言った構造の、数字での正体です。なお引ききれなかった住宅ローン控除（約12万円）は、翌年度の住民税から控除されます——ただし全額ではなく
          - strong [ref=f2e1226]: 上限（課税総所得金額等の5%・最高9.75万円）
          - text: の範囲内です（第16章）。税額控除がいかに強力か——所得控除では決してこうはなりません——を実感してください。
        - complementary [ref=f2e1227]:
          - generic [ref=f2e1228]: ENGINEER'S NOTE — 端数処理は「位置と方向」を仕様として固定する
          - text: 本章のパイプラインは、丸めの
          - strong [ref=f2e1229]: 位置・方向・順序
          - text: がすべて仕様で決まっています。実装チェックリスト：(1)
          - strong [ref=f2e1230]: 課税給与所得金額は1,000円未満切り捨て
          - text: 。(2) 算出所得税額は
          - strong [ref=f2e1231]: 速算表（税率×課税所得 − 控除額）
          - text: で求め、独自の累進ループを組まない。(3) 住宅ローン控除は
          - strong [ref=f2e1232]: 復興特別所得税を乗せる前
          - text: に引き、
          - strong [ref=f2e1233]: 年調所得税額は0円が下限
          - text: （マイナス＝給付にしない）。(4)
          - strong [ref=f2e1234]: 年調年税額 ＝ 年調所得税額 × 102.1% の結果を100円未満切り捨て
          - text: ——2.1%を先に別計算して足すのではなく102.1%を一括で掛ける。浮動小数点で
          - code [ref=f2e1235]: × 1.021
          - text: すると誤差が出るので、整数演算（× 1021 ÷ 1000 など）で処理し、最後に100円未満を落とす。(5) これらの定数（1,000円・100円・2.1%）は理論上は安定的だが、税率や速算表の控除額は改正され得るので年度テーブルから引く。境界値（課税所得が速算表の区切りにちょうど乗る、税額控除が算出税額と一致する等）のテストを必ず用意します。丸めを1か所ずらすだけで全ユーザーの年税額がずれ、還付額の集計・住民税連携まで波及します。
        - heading "第2部のまとめ —— 部品が地図に収まった" [level=3] [ref=f2e1236]
        - paragraph [ref=f2e1237]:
          - text: 第2部を振り返ると、第1章で描いた
