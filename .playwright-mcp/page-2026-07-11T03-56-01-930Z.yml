          - term [ref=f2e3159]: 社会保険料控除（しゃかいほけんりょうこうじょ）
          - definition [ref=f2e3160]:
            - text: 健康保険・厚生年金・国民年金・介護保険などの保険料を、支払った全額所得控除できる物的控除。本人負担分のほか、生計を一にする親族の分を本人が支払った場合も対象。
