          - term [ref=f2e3144]: 源泉徴収（げんせんちょうしゅう）
          - definition [ref=f2e3145]:
            - text: 給与の支払者が、支払時に所得税を天引きして国へ納付する仕組み。国は個々の労働者から取り立てる手間なく税を集められる。天引きはあくまで概算であり、年末調整で精算される。
