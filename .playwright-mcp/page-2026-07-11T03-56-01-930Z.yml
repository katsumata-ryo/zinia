        - paragraph [ref=f2e2813]:
          - text: 年末調整プロダクトは、当年を計算して終わりではありません。第15章で見た
          - strong [ref=f2e2814]: 再年末調整
          - text: （年末調整後に扶養の異動等が判明し、その年分をやり直す）や、過年度分の訂正・問い合わせが必ず発生します。ここで致命的なのが、
          - strong [ref=f2e2815]: コードを「常に最新年度のロジック」に更新してしまい、過去年分を今年の制度で計算してしまう
          - text: 設計です。
        - paragraph [ref=f2e2816]:
          - text: 令和6年分の再年末調整を令和8年分の基礎控除62万円で計算したら、当然まちがいです。過年度は
          - strong [ref=f2e2817]: その年分の制度で
          - text: 再計算されなければならない。年度パラメータ化ができていれば、これは
          - code [ref=f2e2818]: paramsFor(2024)
          - text: を渡すだけで自然に満たせます——旧年度のパラメータを消さずに
          - strong [ref=f2e2819]: すべて保持し続ける
          - text: ことが条件です。
        - code [ref=f2e2821]: "// 過年度も「その年分のパラメータ」で再計算できる function reCompute(filing: EmployeeFiling): Result { const params = paramsFor(filing.taxYear) // 2024でも2026でも同じ入口 return runPipeline(filing, params) // ロジックは共通・パラメータだけ違う } // 再年末調整＝入力の一部を差し替えて同じ関数を再実行するだけ（べき等）"
        - paragraph [ref=f2e2822]:
          - text: 第24章で「各段の中間成果物を残せ」と述べたことも、ここで効きます。当初計算の入力・区分札・各段の金額を保存してあれば、再年末調整は
          - strong [ref=f2e2823]: 差し替えた入力で同じパイプラインを再実行
          - text: し、旧結果との差分を精算するだけ。第25章の「計算はべき等であるべき」という原則が、再計算可能性の土台になっているわけです。まとめると、毎年変わる制度に耐える設計は
          - strong [ref=f2e2824]: (1) 定数を年度テーブルに追い出す (2) 旧年度パラメータを捨てない (3) ロジックはべき等に保つ
          - text: ——この3点に集約されます。
