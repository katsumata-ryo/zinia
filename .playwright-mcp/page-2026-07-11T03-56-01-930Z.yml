          - term [ref=f2e3225]: 特定扶養親族（とくていふようしんぞく）
          - definition [ref=f2e3226]:
            - text: 控除対象扶養親族のうち、その年12/31時点で19歳以上23歳未満の人。教育費のかさむ年代への配慮で扶養控除が63万円と手厚い。名前の似た「特定親族特別控除」とは対象所得帯も根拠も異なるので注意。
