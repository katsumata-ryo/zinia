          - term [ref=f2e3176]: 所得控除（しょとくこうじょ）
          - definition [ref=f2e3177]:
            - text: 税率をかける前の課税所得を圧縮する控除。基礎控除・扶養控除などの人的控除と、社会保険料控除・生命保険料控除などの物的控除がある。税額から直接引く「税額控除」とは効き方が異なる（引く位置が違う）。
