          - text: という単方向パイプラインで、各ステージは前段の出力だけに依存します。設計上の勘所は3つ。(1)
          - strong [ref=f2e286]: 「収入」と「所得」を別の変数・別の型として持つ
          - text: ——両者を
          - code [ref=f2e287]: income
          - text: の一語で使い回すとバグの温床になります（第25章で詳述）。(2)
          - strong [ref=f2e288]: 控除には「所得控除」と「税額控除」の2系統があり、パイプラインへの合流点が異なる
