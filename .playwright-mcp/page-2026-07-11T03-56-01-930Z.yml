              - cell "令和8年12月1日" [ref=f2e2297]
              - cell [ref=f2e2298]:
                - strong [ref=f2e2299]: 令和8年分以後
            - row [ref=f2e2300]:
              - cell [ref=f2e2301]:
                - text: ④
                - strong [ref=f2e2302]: 「源泉徴収税額表」（月次の税額表）の改正
              - cell "令和9年1月1日" [ref=f2e2303]
              - cell [ref=f2e2304]:
                - strong [ref=f2e2305]: 令和9年分以後
                - text: （同日以後支払う給与）
            - row [ref=f2e2306]:
              - cell "⑤ 公的年金等の源泉徴収における基礎的控除額の引上げ" [ref=f2e2307]
              - cell "令和9年1月1日" [ref=f2e2308]
              - cell [ref=f2e2309]:
                - strong [ref=f2e2310]: 令和9年分以後
        - paragraph [ref=f2e2311]:
          - text: この表の意味を、給与の流れで言い直します。
          - strong [ref=f2e2312]: 令和8年11月までの毎月の源泉徴収は、いっさい変わりません。
          - text: 月々の天引きに使う
          - link "源泉徴収税額表" [ref=f2e2313] [cursor=pointer]:
            - /url: "#g-zeigakuhyo"
          - text: （月額表）の改正は令和9年1月からだからです（④）。ところが基礎控除・給与所得控除の引上げ（①②）は令和8年分にさかのぼって効きます。つまり——
        - img "令和8年分の源泉徴収と年末調整の流れ。1月から11月までは改正前の税額表で毎月天引き。12月の年末調整で改正後の基礎控除と改正後の給与所得控除後の金額の表を使って1年分の税額を計算し、天引き合計との差を精算する。" [ref=f2e2314]:
          - generic [ref=f2e2315]:
            - generic [ref=f2e2316]:
              - text: 令和8年1月〜11月
              - generic [ref=f2e2317]: 改正前の源泉徴収税額表のまま毎月天引き（引上げは未反映）
            - generic [ref=f2e2318]:
              - text: ▼
              - generic [ref=f2e2319]: ↓ 引上げ分は月次に乗っていない
            - generic [ref=f2e2320]:
              - text: 令和8年12月 年末調整
              - generic [ref=f2e2321]: 改正後の基礎控除＋改正後の「年末調整等のための給与所得控除後の給与等の金額の表」で1年分の税額を計算
            - generic [ref=f2e2322]:
              - text: ▼
              - generic [ref=f2e2323]: − 改正前の税額表で天引きしてきた源泉税額合計
            - generic [ref=f2e2324]: 差額を年末調整で精算（多くは還付）
          - paragraph [ref=f2e2325]:
            - text: 令和8年分は、引上げ分がまるごと
            - strong [ref=f2e2326]: 年末調整の精算
            - text: に集約される。月次は据え置き、年末で一気に効く。
        - paragraph [ref=f2e2327]:
          - text: 結果として、令和8年分の年末調整は
          - strong [ref=f2e2328]: 「例年より還付が出やすい年」
          - text: になる可能性があります。1年間ずっと引上げ前の高めの税額で天引きしておいて、年末に引上げ後の低い税額へ精算し直すからです。ちょうど第3章で学んだ「月次で無視されていた控除が年末にまとめて効くから戻る」という構造の、改正版だと考えてください。
        - paragraph [ref=f2e2329]:
          - text: なお、この二段階の分け方には行政側の事情があります。月次の税額表を年の途中で差し替えると、給与計算の現場に混乱が生じます。そこで
          - strong [ref=f2e2330]: 「月次は年初（令和9年1月）まで据え置き、令和8年分の引上げは年末調整でまとめて反映する」
          - text: という、現場負担の少ない移行を選んだわけです。制度の親切設計ですが、私たちのプロダクトから見ると「年をまたいで税額表の切替時期がずれる」という実装課題になります。
        - complementary [ref=f2e2331]:
          - generic [ref=f2e2332]: ENGINEER'S NOTE — 「月次テーブル」と「年調テーブル」を別バージョン軸で持つ
          - text: 令和8年分の設計上の要点は、
          - strong [ref=f2e2333]: 月次の源泉徴収税額表と、年末調整用の「給与所得控除後の給与等の金額の表」を、別々のバージョン軸で管理する
          - text: ことです。素朴に「令和8年分パラメータ一式」を1つのバージョンにまとめてしまうと、この年は破綻します。なぜなら令和8年は
          - strong [ref=f2e2334]: 月次＝改正前、年調＝改正後
          - text: という食い違った状態が正解だからです。実装では、 ・月次計算が参照するのは「令和8年分（＝令和7年分と同じ）源泉徴収税額表」 ・年末調整計算が参照するのは「令和8年分の改正後・基礎控除／給与所得控除後の金額の表」 と、
          - strong [ref=f2e2335]: 同じ会計年度に対して2系統のテーブルを引き分ける
          - text: 必要があります。テストでは「令和8年の月次天引き合計」と「令和8年の年調年税額」がわざと食い違い、その差が還付として出ることを正しく検証する。ここを「バグでは？」と早合点して月次側を改正後にそろえてしまうと、天引き不足になり従業員から追徴、という逆事故を起こします。
          - strong [ref=f2e2336]: 食い違いこそ仕様
          - text: ——このフレーズをコメントに残しておく価値があります。
        - heading "3. 令和8年11月30日までに最後の給与を払った人は要注意" [level=3] [ref=f2e2337]
        - paragraph [ref=f2e2338]:
          - text: 改正（①②③）は
          - strong [ref=f2e2339]: 令和8年12月1日施行
          - text: です。年末調整は「その年最後の給与を支払う際」に行うため、
          - strong [ref=f2e2340]: 年の途中で退職・死亡・海外転勤（非居住者化）などにより、令和8年11月30日以前に最後の給与を支払ってしまった人
          - text: の年末調整には、改正後の基礎控除等は適用されません（Q&A Q1-3）。この人たちが引上げ後の控除を受けるには、
          - strong [ref=f2e2341]: 本人が確定申告する
          - text: 必要があります。
        - paragraph [ref=f2e2342]:
          - text: 実装上は、
          - strong [ref=f2e2343]: 「その年最後の給与の支払日が12月1日以後か否か」で適用テーブルを分岐
          - text: させる判定が要ります。判定基準日は退職日や在籍期間ではなく
          - strong [ref=f2e2344]: 最終給与の支払日
          - text: である点に注意してください。中途退職者の年末調整（第14章）を扱うロジックに、この年だけの追加ゲートが必要になります。
        - heading "4. 申告書様式の変更 —— 「源泉控除対象親族」の登場" [level=3] [ref=f2e2345]
        - paragraph [ref=f2e2346]:
          - text: 令和8年分から、
          - link "扶養控除等（異動）申告書" [ref=f2e2347] [cursor=pointer]:
            - /url: "#g-fuyoushinkoku"
          - text: まわりの考え方に新しい区分
          - strong [ref=f2e2348]: 「源泉控除対象親族」
          - text: が入ります。定義はこうです
          - generic [ref=f2e2349]: 令和8年分時点
          - text: 。
        - generic [ref=f2e2350]:
          - strong [ref=f2e2351]: 源泉控除対象親族
          - text: ＝ 次のいずれかに該当する人。 ①
          - strong [ref=f2e2352]: 控除対象扶養親族
          - text: （16歳以上で、扶養控除の対象となる親族） ②
          - strong [ref=f2e2353]: 特定親族
          - text: （19歳以上23歳未満で、特定親族特別控除の対象）のうち、
          - strong [ref=f2e2354]: 合計所得金額が100万円以下
          - text: の人
        - paragraph [ref=f2e2355]:
          - text: なぜこの区分が必要なのか。理由は
          - strong [ref=f2e2356]: 月次の源泉徴収
          - text: にあります。月々の天引きでは「
          - link "扶養親族等の数" [ref=f2e2357] [cursor=pointer]:
            - /url: "#g-fuyousuu"
          - text: 」をカウントして税額表を引きます（第2章・第13章）。従来この数に入るのは控除対象扶養親族などでしたが、令和7年に特定親族特別控除ができたことで、
          - strong [ref=f2e2358]: 「大学生年代で、月次のカウントに入れてよい親族」の線引き
          - text: を明確にする必要が出ました。それが「合計所得100万円以下の特定親族も源泉控除対象親族としてカウントに含める」という整理です。源泉控除対象親族とは、要するに
          - strong [ref=f2e2359]: 「月次の扶養親族等の数に入れてよい親族」を1語でまとめた概念
          - text: だと捉えると腑に落ちます。
        - paragraph [ref=f2e2360]:
          - text: 様式面では、令和8年分の扶養控除等申告書に記載する事項そのものに大きな変更はない、と国税庁は説明しています（Q&A Q2-1）。ただし所得要件が62万円へ上がったため（③）、
          - strong [ref=f2e2361]: 新たに扶養親族等の対象になった家族
          - text: がいれば、その旨を記載した申告書を出し直す必要があります。異動事由欄には「令和8年12月1日 改正」などと書きます。あわせて、地方税法上の「給与所得者の扶養親族等申告書」と統合された1枚の様式になっている点も、実務では押さえどころです。
        - paragraph [ref=f2e2362]:
          - text: また統合様式である「基礎控除申告書 兼 配偶者控除等申告書 兼 特定親族特別控除申告書 兼 所得金額調整控除申告書」（実務略称マル基配所）については、令和8年分では
          - strong [ref=f2e2363]: 改正後の金額を正しく書く
          - text: ことが要点です。基礎控除申告書には合計所得に応じた改正後の基礎控除額を（Q2-2）、配偶者控除等・特定親族特別控除申告書には改正後の給与所得控除（最低保障74万円）で計算し直した合計所得にもとづく控除額を記載します（Q2-3・Q2-4）。
        - complementary [ref=f2e2364]:
          - generic [ref=f2e2365]: ENGINEER'S NOTE — 「源泉控除対象親族」は月次と年調で意味が違う
          - text: 源泉控除対象親族という語に振り回されないコツは、
          - strong [ref=f2e2366]: 「これは月次カウント用の概念であって、年末調整の控除額を決める概念ではない」
          - text: と割り切ることです。月次の税額表を引くための「扶養親族等の数」に、誰を1人として数えるか——それを定義するのが源泉控除対象親族。一方、年末調整で実際に扶養控除・特定親族特別控除をいくら引くかは、合計所得区分にもとづく別の判定です。データモデルとしては、親族エンティティに「①月次カウント対象か（source_withholding_eligible）」と「②年調でどの控除の対象か（扶養控除／特定親族特別控除／対象外）」を
          - strong [ref=f2e2367]: 別々のフラグとして持つ
          - text: のが正解。1つのbooleanで兼用しようとすると、合計所得100万円超123万円以下の特定親族（＝月次カウントには入らないが特定親族特別控除の対象にはなる）で必ず破綻します。第6章の田中さんの弟・翔がまさにこの帯に入りうるので、テストケースに固定しておくとよいです。
        - heading "5. ひとり親控除まわりの調整" [level=3] [ref=f2e2368]
        - paragraph [ref=f2e2369]:
          - text: ひとり親控除（第7章）そのものの控除額（所得税35万円）は令和8年分でも変わりませんが、周辺が所得要件の引上げに連動して調整されました。ひとり親の要件のうち
          - strong [ref=f2e2370]: 「生計を一にする子」の所得要件
          - text: は、他の扶養親族等と同じく引き上げられます（総所得金額等の合計額で判定）。また
          - strong [ref=f2e2371]: 公的年金等の源泉徴収
          - text: におけるひとり親の人的控除額が、
          - strong [ref=f2e2372]: 月額30,000円→32,500円
          - text: へ引き上げられました（令和9年分の年金源泉から）。給与の年末調整というより公的年金の源泉事務側の話ですが、「所得要件の引上げが、ひとり親判定の子の範囲や年金源泉の控除額まで芋づる式に動かす」という連動を知っておくと、改正の影響範囲を見誤りません。
        - paragraph [ref=f2e2373]:
          - text: 改正の解説などで言われる「ひとり親控除の段階的拡充」は、控除額そのものの拡大というより、
          - strong [ref=f2e2374]: 所得要件の引上げに伴ってひとり親と判定される子の範囲・関連する源泉控除額が連動して広がる
          - text: という趣旨で捉えるのが、令和8年5月時点の一次情報に忠実です。控除額35万円の改定は執筆時点の一次情報では確認できていないため、本文では断定を避けています。
        - heading "6. 適用時期の総整理 —— この一枚に集約" [level=3] [ref=f2e2375]
        - paragraph [ref=f2e2376]:
          - text: 本章でいちばん覚えて帰ってほしいのは、
          - strong [ref=f2e2377]: 「令和8年分と令和9年分で分かれる」
          - text: という一点です。最後に集約表で締めます。
