          - text: （住宅ローン控除）です。なぜ初年だけ確定申告で2年目以降は年末調整でできるのか、その仕組みを「残高証明」を軸に解きほぐします。フロー図でいえば④算出所得税額 → ⑤基準所得税額の段の話です。
        - heading "所得控除との効き方の違い（再確認）" [level=3] [ref=f2e1064]
        - paragraph [ref=f2e1065]:
          - text: 第1章の表をもう一度思い出してください。税率20%の人にとって「10万円の所得控除」は2万円の減税にしかなりませんが、「10万円の税額控除」は
          - strong [ref=f2e1066]: まるまる10万円の減税
          - text: です。住宅ローン控除は年間で数十万円規模になり得るため、多くの人にとって年末調整で最もインパクトの大きい項目になります。「年末調整で大きく戻ってきた」の主因は、たいていこの住宅ローン控除です。
        - heading "住宅ローン控除のしくみ" [level=3] [ref=f2e1067]
        - paragraph [ref=f2e1068]:
          - text: 住宅ローン控除は、住宅ローンを組んでマイホームを取得・入居した人が、
          - strong [ref=f2e1069]: 年末のローン残高に一定率を掛けた額
          - text: を、原則13年間（新築の認定住宅等の近年の例）にわたり所得税額から控除できる制度です。近年取得分の控除率は
          - strong [ref=f2e1070]: 年末残高 × 0.7%
          - text: が基本です。
        - table [ref=f2e1072]:
          - rowgroup [ref=f2e1073]:
            - row [ref=f2e1074]:
              - cell "住宅ローン控除額 ＝ 年末のローン残高 × 控除率（近年は0.7%）" [ref=f2e1075]
        - paragraph [ref=f2e1076]:
          - text: 控除率・控除期間・借入限度額・所得要件（合計所得2,000万円以下など）・住宅の環境性能による上限は、
          - strong [ref=f2e1077]: 取得年や住宅の種類で細かく異なります
          - text: 。かつては1%・10年でしたが、令和4年以降の取得分は原則0.7%・13年（住宅性能で借入限度額が変動）。本書では制度の骨格に絞り、具体的な率・限度額は取得年ごとの国税庁資料で確認してください。
        - paragraph [ref=f2e1078]:
          - text: 佐藤健太さんは2年前にマイホームを取得し、いま住宅ローン控除の2年目以降にあたります。仮に年末のローン残高が3,000万円で控除率0.7%なら、
          - code [ref=f2e1079]: 3,000万 × 0.7% ＝ 21万円
          - text: が税額から直接引かれます（借入限度額等の範囲内の場合）。第10章で佐藤さんの税額を仕上げるとき、この税額控除が④→⑤の段でどう効くかを追います。
        - heading "なぜ初年は確定申告、2年目以降は年末調整なのか" [level=3] [ref=f2e1080]
        - paragraph [ref=f2e1081]:
          - text: 第4章でも触れたこの棲み分けを、税額控除の視点から掘り下げます。
          - strong [ref=f2e1082]: 初年（1年目）は必ず本人が確定申告
          - text: しなければなりません。理由は、初年は「本当にその住宅を取得し、そこに居住し、要件を満たすローンか」を税務署が実物の書類で確認する必要があるからです。登記事項証明書、売買・請負契約書、借入金の年末残高証明書などを添えて申告し、税務署が適用の可否と控除枠を確定させます。会社に真偽判定をさせるには重すぎる——だから初年は確定申告に委ねられているのです。
        - paragraph [ref=f2e1083]:
          - text: いったん初年の確定申告で税務署が適用を認めると、2年目以降は話が一気に軽くなります。税務署は、残りの控除可能年分をまとめて記載した
          - strong [ref=f2e1084]: 「年末調整のための（特定増改築等）住宅借入金等特別控除証明書」
          - text: を本人に交付します（初回の申告後にまとめて送付）。本人はこれと、金融機関が発行する
          - strong [ref=f2e1085]: 「住宅取得資金に係る借入金の年末残高等証明書」
          - text: を勤務先に提出するだけ。会社は「税務署が既にお墨付きを与えた控除を、今年の残高に応じて計算するだけ」でよくなるので、年末調整で処理できるのです。
