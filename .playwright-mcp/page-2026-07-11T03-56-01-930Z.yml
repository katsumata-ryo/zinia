          - text: 回すかの話です。年末調整は一つのイベントではなく、10月から翌1月まで続く一連の作業の連なり。この章ではその全体を時間軸で俯瞰し、以降の章（申告書＝第12章、帳票＝第13章）がカレンダーのどこに位置するかの地図を描きます。手続きの一つ一つに「なぜこの順番なのか」を対応づけて押さえましょう。
        - paragraph [ref=f2e1255]:
          - text: 年末調整は「12月にやる作業」と思われがちですが、実際には
          - strong [ref=f2e1256]: 秋の準備から翌年1月の行政提出まで
          - text: 続きます。しかも登場人物は会社（給与の支払者）だけではありません。
          - strong [ref=f2e1257]: 従業員
          - text: が申告書を出し、
