      - generic [ref=f2e950]:
        - heading "第8章 物的控除" [level=2] [ref=f2e951]
        - generic [ref=f2e952]:
          - strong [ref=f2e953]: この章の位置づけ：
          - text: 人的控除（第6・7章）が「誰の事情か」で決まったのに対し、本章の
          - strong [ref=f2e954]: 物的控除
          - text: は「いくら支払ったか」で決まります。社会保険料控除、生命保険料控除、地震保険料控除、小規模企業共済等掛金控除（iDeCo）。これらは第3章で見た「月次の源泉徴収では捉えきれず、年末に控除証明書で初めて申告する」還付の主役たちです。とくに生命保険料控除は
          - strong [ref=f2e955]: 新旧2つの制度
          - text: が併存し計算が複雑なので、表で丁寧に押さえます。
        - heading "社会保険料控除 —— 全額が所得控除" [level=3] [ref=f2e956]
        - paragraph [ref=f2e957]:
          - link "社会保険料控除" [ref=f2e958] [cursor=pointer]:
            - /url: "#g-shakaihoken"
          - text: は、本人や生計を一にする配偶者・親族の社会保険料（健康保険・厚生年金・国民年金・介護保険・雇用保険など）を支払った場合、
          - strong [ref=f2e959]: その全額
          - text: が所得控除になる制度です。上限も計算式もなく、払った実額がまるごと引けるのが特徴。会社員は毎月の給与から天引きされる分が自動的に対象になり、源泉徴収簿に集計されます（第13章）。
        - paragraph [ref=f2e960]:
          - text: 年末調整で追加申告が要るのは、
          - strong [ref=f2e961]: 給与天引き以外に自分で払った分
          - text: です。典型例は、生計を一にする大学生の子や親の
          - strong [ref=f2e962]: 国民年金保険料を本人が払ったケース
          - text: 。この場合は「社会保険料（国民年金保険料等）控除証明書」の添付が必要です。全額控除なので、金額の大きい国民年金などは還付インパクトが大きくなります。
        - heading "小規模企業共済等掛金控除（iDeCo）—— これも全額控除" [level=3] [ref=f2e963]
        - paragraph [ref=f2e964]:
          - link "小規模企業共済等掛金控除" [ref=f2e965] [cursor=pointer]:
            - /url: "#g-shoukibo"
          - text: は、iDeCo（個人型確定拠出年金）や小規模企業共済の掛金を対象とし、こちらも
          - strong [ref=f2e966]: 支払った全額
          - text: が所得控除になります。iDeCoが「節税になる」と言われるのはこの控除のためです。佐藤健太さんはiDeCoに月2.3万円拠出しているので、年間
          - code [ref=f2e967]: 2.3万 × 12 ＝ 27.6万円
          - text: がまるごと所得控除。掛金は本人名義のものだけが対象で、「小規模企業共済等掛金払込証明書」を添付します。社会保険料控除とは別枠なので混同しないこと。
