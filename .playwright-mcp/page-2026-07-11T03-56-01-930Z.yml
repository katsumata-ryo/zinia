              - cell "あり" [ref=f2e2126]
              - cell "本人が確定申告（4月）" [ref=f2e2127]
              - cell "ほぼ全員が申告" [ref=f2e2128]
        - paragraph [ref=f2e2129]:
          - text: ポイントは2つです。第一に、
          - strong [ref=f2e2130]: 「申告不要で完結する」という点なら日本とイギリスは似ています
          - text: 。ただしイギリスのPAYE（Pay As You Earn）は、精算の主体が
          - strong [ref=f2e2131]: 税務当局
          - text: である点が決定的に違います。日本は精算の主体が
          - strong [ref=f2e2132]: 民間企業
          - text: なのです。第二に、アメリカは天引きこそすれ精算は各人の確定申告に委ねており、日本とは正反対の思想です。
        - paragraph [ref=f2e2133]: つまり「会社が一人ひとりの年税額を確定させる」という日本の年末調整は、国際的に見てもかなり特徴的な制度です。徴税コストを極限まで下げる代わりに、そのコストと責任を企業（と、そのシステムを作る私たち）が引き受けている——この非対称性が、日本の年末調整の本質です。第23章で触れる「不要論」も「デジタル化」も、突き詰めればこの非対称性をどう組み替えるかの議論だと捉えると見通しがよくなります。
        - complementary [ref=f2e2134]:
          - generic [ref=f2e2135]: ENGINEER'S NOTE — 制度の「思想」がデータモデルを決める
          - text: 精算主体が誰かは、そのままシステムの持ち主が誰かを決めます。アメリカ型なら「個人が自分の申告ソフトで完結」、イギリス型なら「当局が全国民の給与データを名寄せする巨大な国側システム」、日本型なら「各企業が自社従業員分の年調エンジンを持つ」。私たちが年末調整プロダクトを作れるのは、日本が
          - strong [ref=f2e2136]: 精算処理を分散して民間に委ねた
          - text: からです。逆に言えば、もし将来イギリス型（当局主導の名寄せ精算）へ寄れば、プロダクトの役割は「年税額を確定する計算機」から「当局へ正確なデータを渡すコネクタ」へ変質します。歴史を知ることは、自分たちのプロダクトが将来どの方向に押されうるかを知ることでもあります（第23章）。
        - group [ref=f2e2137]:
          - generic "Q1. 日本の給与に対する源泉徴収は、もともと何のために導入されましたか。" [ref=f2e2138] [cursor=pointer]
        - group [ref=f2e2139]:
          - generic "Q2. 年末調整は、源泉徴収とはどういう関係で生まれた制度ですか。" [ref=f2e2140] [cursor=pointer]
        - group [ref=f2e2141]:
          - generic "Q3. 「会社が年末調整で税を精算する」点で、日本はイギリスやアメリカとどう違いますか。" [ref=f2e2142] [cursor=pointer]
      - generic [ref=f2e2143]:
        - heading "第21章 近年の改正の流れ" [level=2] [ref=f2e2144]
        - generic [ref=f2e2145]:
          - strong [ref=f2e2146]: この章の位置づけ：
          - text: 第20章で制度の骨格ができるまでをたどりました。この章は、その骨格の上でこの10年ほどに起きた
          - strong [ref=f2e2147]: 大きな改正の流れ
          - text: を、一本の線として整理します。個々の改正は第6章（人的控除）や第18章（年収の壁）ですでに部品として登場しましたが、ここでは「なぜその順番でその改正が必要だったのか」という
          - strong [ref=f2e2148]: 制度意図の連なり
          - text: として読み直します。この線がつかめると、次章（令和8年分）の改正が唐突な変更ではなく、続いてきた流れの一区切りだと分かります。
        - paragraph [ref=f2e2149]:
          - text: 近年の改正には、実は一貫したテーマがあります。
          - strong [ref=f2e2150]: 「働き方に中立な税制へ」
          - text: と
          - strong [ref=f2e2151]: 「高所得層への集中と低・中所得層への配慮」
          - text: 、そして最近では
          - strong [ref=f2e2152]: 「物価上昇への対応」
          - text: です。この3つを念頭に、時系列で追ってみましょう。
        - heading "平成30年 —— 配偶者控除の見直し（「103万円の壁」への最初の一手）" [level=3] [ref=f2e2153]
        - paragraph [ref=f2e2154]:
          - text: 2018年（平成30年）分から、
          - link "配偶者控除" [ref=f2e2155] [cursor=pointer]:
            - /url: "#g-haigusha"
          - text: ・
          - link "配偶者特別控除" [ref=f2e2156] [cursor=pointer]:
            - /url: "#g-haigushatokubetsu"
          - text: が大きく組み替えられました。改正の狙いは、いわゆる
          - strong [ref=f2e2157]: 「103万円の壁」による就業調整をやわらげる
          - text: ことです。それまで配偶者特別控除は配偶者の給与収入141万円未満までで先細りしていましたが、これを
          - strong [ref=f2e2158]: 150万円まで満額（38万円）
          - text: 、201万円まで先細りへと拡大しました。パート収入を103万円に抑えようとする心理的な壁を、制度側からなだらかにしたわけです。
        - paragraph [ref=f2e2159]:
          - text: 同時に、それまで所得制限のなかった配偶者控除に
          - strong [ref=f2e2160]: 本人（納税者側）の所得制限
          - text: が入りました。合計所得900万円（給与収入約1,120万円）を超えると控除額が逓減し、1,000万円超で消滅します。第6章で見た「本人所得×配偶者所得の二次元マトリクス」は、このとき生まれた形です。
          - strong [ref=f2e2161]: 「配偶者への配慮は残すが、高所得世帯には絞る」
          - text: ——集中と配慮というテーマの最初の現れでした。
        - heading "令和2年 —— 給与所得控除・基礎控除の「振替」" [level=3] [ref=f2e2162]
        - paragraph [ref=f2e2163]:
          - text: 2020年（令和2年）分の改正は、一見地味ですが構造的に重要です。
          - strong [ref=f2e2164]: 給与所得控除を一律10万円引き下げ、その分を基礎控除に10万円上乗せ（38万円→48万円）
          - text: しました。プラスマイナスゼロの「振替」です。なぜこんなことをしたのか。
        - paragraph [ref=f2e2165]:
          - text: 狙いは
          - strong [ref=f2e2166]: 働き方の中立性
          - text: です。給与所得控除は会社員だけが受けられる控除ですが、フリーランスや副業で働く人が増える中、「雇われて働く人だけが優遇される」構造は時代に合わなくなっていました。そこで
          - strong [ref=f2e2167]: 誰にでも効く基礎控除へ重心を移す
          - text: ことで、雇用形態による有利・不利を薄めたのです。第1章で「基礎控除は誰にでも一律」と学びましたが、その基礎控除が近年重みを増しているのは、この振替が出発点です。
        - paragraph [ref=f2e2168]:
          - text: ただし振替には仕掛けがありました。給与所得控除には
          - strong [ref=f2e2169]: 上限（195万円）
          - text: が設けられ、基礎控除には
          - strong [ref=f2e2170]: 高所得での逓減・消滅
          - text: （合計所得2,400万円超で減り始め2,500万円超でゼロ）が導入されました。低・中所得層は振替で損得ゼロ、高所得層は実質増税——ここでも「集中と配慮」が効いています。第5章で学んだ給与所得控除の上限も、この章末の基礎控除の逓減も、令和2年改正の産物です。
        - complementary [ref=f2e2171]:
          - generic [ref=f2e2172]: ENGINEER'S NOTE — 「振替」は差分実装の教科書的ケース
          - text: 令和2年の振替は、実装から見ると
          - strong [ref=f2e2173]: 2つのパラメータテーブルを同時に差し替える改正
          - text: です。給与所得控除表と基礎控除額を別々に年度パラメータ化していれば、両方を新年度版に切り替えるだけで済みます。逆に、給与所得控除の最低保障額や基礎控除額を
          - strong [ref=f2e2174]: コード中にリテラルで埋め込んでいた
          - text: としたら、この改正で複数箇所を手当てする羽目になり、片方だけ直し忘れて「振替の帳尻が合わない」バグを生みます。基礎控除に高所得逓減が入った点も重要で、「基礎控除＝定数48万」という素朴なモデルが、この改正で
          - strong [ref=f2e2175]: 合計所得を引数に取る関数
          - text: へ格上げされました。改正の歴史は、しばしば「定数だったものが関数になる」歴史です（第26章）。
        - heading "令和7年 —— 基礎控除引上げと特定親族特別控除（「103万円→160万円の壁」）" [level=3] [ref=f2e2176]
        - paragraph [ref=f2e2177]:
          - text: そして2025年（令和7年）分。ここで流れが
          - strong [ref=f2e2178]: 「物価上昇への対応」
          - text: という新テーマへ切り替わります。長く据え置かれてきた課税最低限が、物価と最低賃金の上昇に取り残されている——この問題意識から、大幅な引上げが行われました。第6章・第7章で扱った数字を、改正の意図とともに振り返ります
          - generic [ref=f2e2179]: 令和7年分時点。詳細な区分表は第7章参照。
          - text: 。
        - list [ref=f2e2180]:
          - listitem [ref=f2e2181]:
            - strong [ref=f2e2182]: 基礎控除の引上げ
            - text: ：一律48万円だった基礎控除を、合計所得に応じて最大95万円まで引き上げ。特に低所得帯（合計所得132万円以下）を95万円と手厚くしました。ただし132万円超〜655万円以下の上乗せ（88／68／63万円）は
            - strong [ref=f2e2183]: 令和7・8年分限定の特例
            - text: という位置づけです。
          - listitem [ref=f2e2184]:
            - strong [ref=f2e2185]: 給与所得控除の最低保障額
            - text: ：55万円→
            - strong [ref=f2e2186]: 65万円
            - text: へ。
          - listitem [ref=f2e2187]:
            - strong [ref=f2e2188]: 扶養親族等の所得要件
            - text: ：合計所得48万円以下→
            - strong [ref=f2e2189]: 58万円以下
            - text: （給与収入なら103万円→123万円相当）へ。
        - paragraph [ref=f2e2190]:
          - text: この「基礎控除の低所得帯95万円＋給与所得控除65万円」により、
          - strong [ref=f2e2191]: 給与収入160万円までは所得税がかからない
          - text: 形になりました。これが「103万円の壁が160万円へ動いた」と報じられた正体です（第6章・第18章で計算済み）。
        - paragraph [ref=f2e2192]:
          - text: 同時に創設されたのが
          - link "特定親族特別控除" [ref=f2e2193] [cursor=pointer]:
            - /url: "#g-tokuteishinzoku"
          - text: です。扶養の所得要件を引き上げると、今度は
          - strong [ref=f2e2194]: 大学生年代（19〜22歳）のアルバイト収入
          - text: で新たな壁が生まれます。従来、特定扶養控除（63万円）は子の合計所得が一定を超えると
          - strong [ref=f2e2195]: ゼロに崖落ち
          - text: しました。そこで、合計所得58万円超123万円以下の特定親族について、控除額をなだらかに先細りさせる制度を新設したのです。田中由紀さんの弟・翔（大学生・バイト年収150万円）が、まさにこの制度の検討対象でした（第6章）。
        - table [ref=f2e2197]:
          - rowgroup [ref=f2e2198]:
            - row [ref=f2e2199]:
              - columnheader "改正年（適用）" [ref=f2e2200]
              - columnheader "主眼" [ref=f2e2201]
              - columnheader "代表的な変更" [ref=f2e2202]
              - columnheader "テーマ" [ref=f2e2203]
            - row [ref=f2e2204]:
              - cell "平成30年分" [ref=f2e2205]
              - cell "配偶者" [ref=f2e2206]
              - cell "配偶者特別控除を150万円まで満額化／本人所得制限を導入" [ref=f2e2207]
              - cell "就業調整の緩和・集中と配慮" [ref=f2e2208]
            - row [ref=f2e2209]:
              - cell "令和2年分" [ref=f2e2210]
              - cell "控除の重心" [ref=f2e2211]
              - cell "給与所得控除−10万／基礎控除+10万の振替。給与所得控除に上限、基礎控除に高所得逓減" [ref=f2e2212]
              - cell "働き方への中立" [ref=f2e2213]
            - row [ref=f2e2214]:
              - cell "令和7年分" [ref=f2e2215]
              - cell "課税最低限" [ref=f2e2216]
              - cell "基礎控除引上げ（最大95万）／給与所得控除65万／所得要件123万相当／特定親族特別控除の創設" [ref=f2e2217]
              - cell "物価対応・壁対策（→160万）" [ref=f2e2218]
        - paragraph [ref=f2e2219]:
          - text: こうして並べると、近年の改正は行き当たりばったりではなく、
          - strong [ref=f2e2220]: 「配偶者の壁 → 働き方の中立 → 物価対応」
          - text: とテーマを移しながら、少しずつ課税最低限を引き上げてきたことが分かります。そして次章の令和8年分は、この令和7年の「物価対応」の続きです。壁は160万円からさらに
          - strong [ref=f2e2221]: 178万円
          - text: へ動きます。
        - group [ref=f2e2222]:
          - generic "Q1. 令和2年分の「給与所得控除と基礎控除の振替」は何を狙った改正でしたか。" [ref=f2e2223] [cursor=pointer]
        - group [ref=f2e2224]:
          - generic "Q2. 令和7年分で「103万円の壁が160万円へ」と言われたのはなぜですか。" [ref=f2e2225] [cursor=pointer]
        - group [ref=f2e2226]:
          - generic "Q3. 特定親族特別控除はなぜ令和7年に創設されたのですか。" [ref=f2e2227] [cursor=pointer]
      - generic [ref=f2e2228]:
        - heading "第22章 令和8年分の変更点" [level=2] [ref=f2e2229]
        - generic [ref=f2e2230]:
          - strong [ref=f2e2231]: この章の位置づけ：
          - text: 第21章で見た「物価対応」の流れが、令和8年分でもう一段進みます。この章は本書でもっとも改正情報が濃い章です。基礎控除・給与所得控除のさらなる引上げ（課税最低限が
          - strong [ref=f2e2232]: 178万円
          - text: へ）、扶養親族等の所得要件の再引上げ、申告書様式の変更（
          - strong [ref=f2e2233]: 源泉控除対象親族
          - text: の登場）、そして実務上いちばん厄介な
          - strong [ref=f2e2234]: 「適用時期が令和8年分と令和9年分で分かれる」
          - text: という論点を、一次情報にもとづいて丁寧にほどきます。数字だけでなく「令和8年の年末調整で現場が何につまずくか」を実装目線で押さえるのが本章の目的です。
        - paragraph [ref=f2e2235]:
          - text: 本章は令和8年5月時点の国税庁一次情報（「令和8年度税制改正による所得税の基礎控除の引上げ等について」、「令和8年4月 源泉所得税の改正のあらまし」、および同Q&A）にもとづきます。令和8年度改正は
          - strong [ref=f2e2236]: 令和8年12月1日施行・令和8年分以後適用
          - text: で成立済みとして扱えます。ただし金額・様式は執筆時点のものであり、実装時は必ず nta.go.jp の最新版に当たり直してください。
        - heading "1. 何が変わるのか —— 令和8年度改正の全体像" [level=3] [ref=f2e2237]
        - paragraph [ref=f2e2238]: 令和8年度改正の中身は、令和7年改正の「続き」です。物価上昇に連動して課税最低限をもう一段引き上げる、というのが基本線。主な変更は次の3点です。
        - table [ref=f2e2240]:
          - rowgroup [ref=f2e2241]:
            - row [ref=f2e2242]:
              - columnheader "項目" [ref=f2e2243]
              - columnheader "令和7年分" [ref=f2e2244]
              - columnheader "令和8年分" [ref=f2e2245]
              - columnheader "ねらい" [ref=f2e2246]
            - row [ref=f2e2247]:
              - cell "基礎控除（標準帯・合計所得655万円超2,350万円以下）" [ref=f2e2248]
              - cell "58万円（本則）" [ref=f2e2249]
              - cell [ref=f2e2250]:
                - strong [ref=f2e2251]: 62万円
                - text: （本則。物価スライド+4万円）
              - cell "物価連動" [ref=f2e2252]
            - row [ref=f2e2253]:
              - cell "給与所得控除の最低保障額" [ref=f2e2254]
              - cell "65万円" [ref=f2e2255]
              - cell [ref=f2e2256]:
                - strong [ref=f2e2257]: 74万円
                - text: （本則69万＋特例上乗せ。令和8・9年分限定）
              - cell "低所得層の底上げ" [ref=f2e2258]
            - row [ref=f2e2259]:
              - cell "扶養親族等の合計所得金額要件" [ref=f2e2260]
              - cell "58万円以下" [ref=f2e2261]
              - cell [ref=f2e2262]:
                - strong [ref=f2e2263]: 62万円以下
                - text: （給与収入なら123万→引上げ相当）
              - cell "要件の連動引上げ" [ref=f2e2264]
        - paragraph [ref=f2e2265]:
          - strong [ref=f2e2266]: 課税最低限178万円
          - text: という数字は、この改正が生む代表的な結果です。低所得帯の基礎控除（令和7・8年分の特例で厚い区分）と給与所得控除の特例最低保障額74万円を組み合わせると、給与収入178万円あたりまで所得税がかからない姿になります。「103万円の壁 → 令和7年で160万円 → 令和8年で178万円」という報道上の壁の変遷は、この積み上げの話です
          - generic [ref=f2e2267]: 令和8年分時点
          - text: 。
        - paragraph [ref=f2e2268]:
          - text: この「178万円の壁」も、あくまで
          - strong [ref=f2e2269]: 所得税（国税）の壁
          - text: です。住民税の非課税限度額や社会保険の106万・130万の壁とは別レイヤーであり、混同は禁物です（切り分けは第18章）。田中由紀さんの弟・翔のケースでも、翔の所得税・翔の社保・翔を扶養する田中さんの税は、それぞれ別の壁で判定します。
        - complementary [ref=f2e2270]:
          - generic [ref=f2e2271]: ENGINEER'S NOTE — 「特例」と「本則」を型で区別する
          - text: 令和8年分は
          - strong [ref=f2e2272]: 本則と特例の二層構造
          - text: が随所に出ます。基礎控除は「標準帯の本則62万」＋「低所得帯の令和7・8年分限定の上乗せ」、給与所得控除の最低保障額は「本則69万」＋「令和8・9年分限定の特例で74万」。実装では、控除額を単なる年度パラメータとして持つだけでは不十分で、
          - strong [ref=f2e2273]: 「その金額が恒久措置か時限措置か」というメタ情報
          - text: まで持たせておくと、令和9年分以後の逓減（後述）を仕込むときに事故りません。素朴には
          - code [ref=f2e2274]: 基礎控除(合計所得, 年分)
          - text: という関数ですが、内部では「本則テーブル＋その年分に有効な特例テーブル」を合成する、という二段構えにしておくのが安全です。改正の歴史は「定数→関数」でしたが（第21章NOTE）、令和8年は「関数→時限フラグ付き関数」へさらに一段複雑化します。
        - heading "2. 最大の落とし穴 —— 月次源泉には反映されず、年末調整で精算" [level=3] [ref=f2e2275]
        - paragraph [ref=f2e2276]:
          - text: ここが令和8年分でもっとも実務を混乱させる点であり、本章の核心です。
          - strong [ref=f2e2277]: 改正項目のうち、令和8年分に適用されるものと、令和9年分から適用されるものが分かれています。
          - text: 国税庁のQ&A（Q1-1）にもとづき整理します。
        - table [ref=f2e2279]:
          - rowgroup [ref=f2e2280]:
            - row [ref=f2e2281]:
              - columnheader "改正項目" [ref=f2e2282]
              - columnheader "施行日" [ref=f2e2283]
              - columnheader "適用" [ref=f2e2284]
