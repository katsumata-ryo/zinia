          - definition [ref=f2e3240]:
            - text: 年末調整で確定する、その年に納めるべき所得税＋復興特別所得税の額。算出所得税額から税額控除を引いた年調所得税額に102.1%を掛け、100円未満を切り捨てて求める。源泉徴収済額と突き合わせて過不足を精算する。
