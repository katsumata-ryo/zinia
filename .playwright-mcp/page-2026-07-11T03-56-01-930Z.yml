        - complementary [ref=f2e2807]:
          - generic [ref=f2e2808]: ENGINEER'S NOTE — 特例と本則を区別してデータに刻む
          - text: 令和7・8年分の基礎控除の上乗せ（132万〜655万円の帯に付く88/68/63万円）や、給与所得控除最低保障の74万円は、いずれも
          - strong [ref=f2e2809]: 時限的な特例
