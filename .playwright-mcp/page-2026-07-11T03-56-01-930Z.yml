        - paragraph [ref=f2e1040]:
          - text: 佐藤さんが地震保険料を年3万円払っていれば、全額の
          - strong [ref=f2e1041]: 3万円
          - text: が控除。1つの契約に地震保険と旧長期損害保険の両方の性質がある場合は、いずれか一方を選択します。
        - complementary [ref=f2e1042]:
          - generic [ref=f2e1043]: ENGINEER'S NOTE — 生命保険料控除は「枠 × 制度」の二層計算
          - text: 物的控除は「証明書の金額を式に入れる」だけに見えて、生命保険料控除だけは実装が重い。構造を分解すると、(1)
          - strong [ref=f2e1044]: 枠（一般・介護医療・個人年金）ごとに計算
          - text: し、(2) 各枠で
          - strong [ref=f2e1045]: 新制度・旧制度それぞれの式を適用
          - text: して、(3) 新旧が混在する枠は「新のみ・旧のみ・新旧合算（枠上限4万）」の
          - strong [ref=f2e1046]: 有利選択
          - text: を行い、(4) 3枠を合算して
          - strong [ref=f2e1047]: 全体上限12万円でクランプ
          - text: する——という四段構え。テストは各式の境界（2万・4万・8万／2.5万・5万・10万）と、有利選択で結果が入れ替わる組合せを必ず用意します。円未満の端数は各控除の計算過程で切り上げる（1円未満切り上げ）ルールがある点も要確認。社会保険料控除・iDeCoは全額控除で式がない代わり、
          - strong [ref=f2e1048]: 「給与天引き分（源泉徴収簿から自動集計）」と「本人が別途申告する分」の二重計上・計上漏れ
          - text: に注意が必要です。
