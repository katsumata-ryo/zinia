        - heading "落とし穴1 —— 端数処理は「位置・方向・順序」が仕様" [level=3] [ref=f2e2622]
        - paragraph [ref=f2e2623]:
          - text: 年末調整の丸めは、四捨五入が普通、という素朴な感覚が通用しません。第10章で見たとおり、
