          - text: という点です。生命保険料をいくら払ったか、扶養家族が最終的に何人か、住宅ローン残高はいくらか——こうした情報は年末にまとめて集めるしかありません。だから年末調整では、これらを申告書（第12章）で回収し、第1章の地図を「実額」で引き直すのです。
        - heading "計算例：佐藤健太さんはなぜ還付されるのか" [level=3] [ref=f2e424]
        - paragraph [ref=f2e425]:
          - text: 佐藤さん（年収620万円
          - generic [ref=f2e426]: 令和7年分時点
          - text: ）を例にとります。毎月の源泉徴収では、生命保険料控除・地震保険料控除・iDeCo（小規模企業共済等掛金控除）・住宅ローン控除（2年目以降の税額控除）は
          - strong [ref=f2e427]: 一切考慮されていません
          - text: 。年末調整でこれらを申告すると、
        - list [ref=f2e428]:
          - listitem [ref=f2e429]:
            - text: 生命保険料控除・介護医療保険料控除・地震保険料控除・iDeCoの掛金 → いずれも
            - strong [ref=f2e430]: 所得控除
            - text: が増える → 課税所得が下がる → 本当の年税額が月次の前提より小さくなる
          - listitem [ref=f2e431]:
            - text: 住宅ローン控除 →
            - strong [ref=f2e432]: 税額控除
            - text: としてさらに税額から直接引かれる
        - paragraph [ref=f2e433]:
          - text: 結果、実額で計算した年調年税額は、毎月概算で徴収してきた合計より小さくなります。その差額が佐藤さんに
          - strong [ref=f2e434]: 還付
          - text: されます。個々の控除の計算は第2部で詳しく積み上げますが、「月次で無視されていた控除が年末にまとめて効くから戻る」という構造だけ、ここでつかんでください。
        - paragraph [ref=f2e435]:
          - text: 逆に、年の途中で扶養家族が減った人や、副収入で月次の前提が甘かった人などは
          - strong [ref=f2e436]: 追徴
          - text: になることもあります。還付が当たり前ではなく、あくまで「正しい額への精算」だという点が大切です。
        - heading "なぜ会社が精算まで引き受けるのか" [level=3] [ref=f2e437]
        - paragraph [ref=f2e438]:
          - text: 第2章で見たとおり、会社はすでに源泉徴収義務者として毎月の給与データを持っています。誰にいくら払い、いくら天引きしたかを把握しているのは会社です。ならば「年末にその集計を締めて、正しい年税額との差を精算する」役目も会社に負わせるのが合理的——これが日本の制度設計です。その結果、
          - strong [ref=f2e439]: 大多数の給与所得者は自分で確定申告をしなくて済み
          - text: 、税務署も膨大な申告処理を負わずに済みます。年末調整は、源泉徴収制度とセットで「申告不要のインフラ」を成立させているわけです。この棲み分け（年末調整で完結する人／確定申告が要る人）は第4章で扱います。
        - complementary [ref=f2e440]:
          - generic [ref=f2e441]: ENGINEER'S NOTE — 年末調整は「再計算」である
          - text: 年末調整のロジックは、新しい計算ではなく
          - strong [ref=f2e442]: 第1章のパイプラインを実額で走らせ直す再計算
          - text: だと捉えると見通しが良くなります。実装上のポイントは2つ。(1)
          - strong [ref=f2e443]: 月次の源泉徴収額の「合計」は、年末調整の入力の一つにすぎない
          - text: ——年間の正しい税額は申告書データから独立に組み立て、最後に「合計源泉税額 − 年調年税額」で過不足を出します。月次の積み上げから逆算するのではなく、あるべき年税額を先に確定させるのが筋です。(2)
          - strong [ref=f2e444]: 判定はすべて「12月31日時点の現況」に統一する
          - text: ——扶養親族の人数や年齢、配偶者の所得区分などは基準日で確定させ、年の途中の状態と混ぜないこと（第25章）。過不足の符号（還付＝マイナス徴収、追徴＝プラス徴収）の扱いも、後工程の帳票・住民税連携まで一貫させておく必要があります。
        - generic [ref=f2e445]:
          - heading "理解度チェック" [level=3] [ref=f2e446]
          - group [ref=f2e447]:
            - generic "Q1. 年末調整の過不足額は、どんな引き算で求められますか。" [ref=f2e448] [cursor=pointer]
          - group [ref=f2e449]:
            - generic "Q2. 月次の源泉徴収と本当の年税額がズレる原因を、具体的に3つ挙げてください。" [ref=f2e450] [cursor=pointer]
          - group [ref=f2e451]:
            - generic "Q3. 「年末調整＝必ずお金が戻る」という理解はなぜ不正確ですか。" [ref=f2e452] [cursor=pointer]
      - generic [ref=f2e453]:
        - heading "第4章 確定申告との棲み分け" [level=2] [ref=f2e454]
        - generic [ref=f2e455]:
          - strong [ref=f2e456]: この章の位置づけ：
          - text: 年末調整は万能ではありません。会社が給与データの範囲で完結できることには限界があり、そこからはみ出す部分は
          - strong [ref=f2e457]: 確定申告
          - text: が引き受けます。この章では「年末調整でできること・できないこと」と「そもそも年末調整の対象になる人・ならない人」を線引きします。第1部の締めくくりとして、年末調整という制度の輪郭をはっきりさせる章です。
        - paragraph [ref=f2e458]:
          - link "確定申告" [ref=f2e459] [cursor=pointer]:
            - /url: "#g-kakutei"
          - text: は、納税者本人が1年間の所得と税額を計算して税務署に申告・納税（または還付を受ける）手続きです。年末調整と確定申告は対立するものではなく、
          - strong [ref=f2e460]: 役割分担
          - text: の関係にあります。年末調整は「会社が給与について代行できる範囲」、確定申告は「本人にしか分からない・給与以外の事情まで含めた全体」を担当します。
        - heading "なぜ年末調整には「できないこと」があるのか" [level=3] [ref=f2e461]
        - paragraph [ref=f2e462]:
          - text: 理由はシンプルで、
          - strong [ref=f2e463]: 会社が把握できるのは給与に関する情報だけ
          - text: だからです。医療費をいくら払ったか、どこにふるさと納税したか、株でいくら儲かったか、副業の収支はどうか——こうした情報は会社の給与システムの外にあります。会社が知りようのない情報や、証憑の真偽を会社に判断させるべきでない控除は、制度上あえて年末調整の対象外にして、本人の確定申告に委ねているのです。
