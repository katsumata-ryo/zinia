        - paragraph [ref=f2e871]:
          - text: 重要：合計所得132万円超〜655万円以下の上乗せ（88／68／63万円）は
          - strong [ref=f2e872]: 令和7・8年分限定の特例
          - text: です。令和9年分以後は本則58万円へ段階調整される予定。また令和8年分は本則が58万→
          - strong [ref=f2e873]: 62万円
          - text: に引き上げ（物価スライド）。「いくら控除できるか」は
          - strong [ref=f2e874]: 適用年で必ず変わる
          - text: ので、実装では年度を必ずキーにします。本章の計算例は令和7年分。
        - paragraph [ref=f2e875]:
          - text: 「160万円の壁」との関係を整理します。給与収入160万円の人は、給与所得控除65万円を引くと合計所得95万円。これは基礎控除の「132万円以下＝95万円」区分。給与所得95万円から基礎控除95万円を引くと課税所得はゼロ——つまり
          - strong [ref=f2e876]: 給与収入160万円までは所得税がかからない
          - text: のが令和7年分の姿で、これが「103万円の壁が160万円へ」と言われる正体です（令和8年分はさらに178万円へ。第22章）。
        - paragraph [ref=f2e877]:
          - text: ペルソナの基礎控除を確認します
          - generic [ref=f2e878]: 令和7年分
          - text: 。佐藤さん（合計所得452万円 → 「336万超489万以下」）は
          - strong [ref=f2e879]: 68万円
          - text: 。田中さん（332万円 → 「132万超336万以下」）は
          - strong [ref=f2e880]: 88万円
          - text: 。鈴木さん（840万円 → 「655万超2,350万以下」）は本則の
          - strong [ref=f2e881]: 58万円
          - text: 。同じ基礎控除でも人によって額が違う、というのが新しい常識です。
        - complementary [ref=f2e882]:
          - generic [ref=f2e883]: ENGINEER'S NOTE — 基礎控除は「所得の関数」になった
          - text: かつて定数だった基礎控除が、令和7年から
          - strong [ref=f2e884]: 合計所得金額を入力とする階段関数
          - text: になりました。実装上の注意は3つ。(1)
          - strong [ref=f2e885]: 入力は本人の「合計所得金額」
          - text: ——給与所得だけの人は給与所得がそれに当たりますが、他に所得がある人は合算後の値。第5章の所得金額調整控除を引いた後の給与所得を使う点にも注意。(2)
          - strong [ref=f2e886]: 区分の境界（132万・336万・489万・655万…）は「以下／超」を厳密に
          - text: 。境界1円のズレが控除額を数十万円動かします。(3)
          - strong [ref=f2e887]: 特例（R7・R8）と本則、さらにR8の62万への引き上げが年度で交差する
          - text: ので、基礎控除テーブルは年度パラメータとして丸ごと差し替えられる構造にしておくこと。「48万円決め打ち」の旧実装が残っていないか要監査です。
        - heading "障害者控除 —— 本人・家族の障害への配慮" [level=3] [ref=f2e888]
