          - text: は本章の最難関です。難しさの原因は、
          - strong [ref=f2e971]: 契約時期で「新制度」と「旧制度」に分かれ、計算式も枠組みも違う
          - text: ことにあります。境界は
          - strong [ref=f2e972]: 平成24年（2012年）1月1日
          - text: 。それ以後の契約が新制度、以前が旧制度です。
