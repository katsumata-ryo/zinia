        - paragraph [ref=f2e1293]: 令和8年分時点。納付期限が休日にあたる場合は翌開庁日にずれます。
        - heading "なぜこの順番なのか" [level=3] [ref=f2e1294]
        - paragraph [ref=f2e1295]:
          - text: カレンダーの順序は恣意的ではなく、
          - strong [ref=f2e1296]: 情報が確定していく順
          - text: に並んでいます。第3章で見たとおり、生命保険料をいくら払ったか・扶養が最終的に何人かは年末にならないと確定しません。だから、
        - list [ref=f2e1297]:
          - listitem [ref=f2e1298]:
            - strong [ref=f2e1299]: 秋に証明書が出そろう
            - text: のを待って、
