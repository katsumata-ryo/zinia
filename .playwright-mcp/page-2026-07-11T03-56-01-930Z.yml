              - cell [ref=f2e515]:
                - strong [ref=f2e516]: 必要
        - paragraph [ref=f2e517]:
          - text: 境界線を覚えるより、
          - strong [ref=f2e518]: なぜそこに線が引かれるか
          - text: で理解しましょう。
        - list [ref=f2e519]:
          - listitem [ref=f2e520]:
            - strong [ref=f2e521]: 住宅ローン控除の初年だけ確定申告
            - text: ：初年は登記事項証明書や売買契約書など多くの書類で「本当にその住宅を取得し居住したか」を税務署が確認する必要があります。2年目以降は税務署が発行する残高ベースの証明で足りるため、会社に任せられる＝年末調整でできるようになります（詳細は第9章）。
          - listitem [ref=f2e522]:
            - strong [ref=f2e523]: 医療費控除・雑損控除が確定申告のみ
            - text: ：家族全体の医療費の集計や災害の実態は、会社が検証しようのない本人固有の事情だからです。
          - listitem [ref=f2e524]:
            - strong [ref=f2e525]: 寄附金控除（ふるさと納税）
            - text: ：寄附先の証明にもとづく控除で、原則は確定申告。ただし給与所得者向けの例外として
            - strong [ref=f2e526]: ワンストップ特例
            - text: があり、寄附先が5団体以内で他に確定申告の必要がない場合は、確定申告なしで（所得税分も含め）翌年度の住民税から控除されます。これは年末調整で処理するものではない点に注意（住民税との連携は第16章）。
        - heading "年末調整の対象になる人・ならない人" [level=3] [ref=f2e527]
        - paragraph [ref=f2e528]:
          - text: もう一つの棲み分けが「そもそも年末調整してもらえるか」です。
          - strong [ref=f2e529]: その年の最後の給与のときにマル扶を提出している、1か所勤務の甲欄の従業員
          - text: が基本の対象です。
        - table [ref=f2e531]:
          - rowgroup [ref=f2e532]:
            - row [ref=f2e533]:
              - columnheader "年末調整の対象になる（代表例）" [ref=f2e534]
              - columnheader "対象にならない（代表例）" [ref=f2e535]
            - row [ref=f2e536]:
              - cell "1年を通じて勤務した従業員" [ref=f2e537]
              - cell "マル扶を出していない人（乙欄・従たる給与）" [ref=f2e538]
            - row [ref=f2e539]:
              - cell "年の途中で就職し年末まで在籍する人（中途入社。前職分は合算／第14章）" [ref=f2e540]
              - cell "年の途中で退職し再就職していない人（原則）" [ref=f2e541]
            - row [ref=f2e542]:
              - cell "年の途中の退職でも一定要件を満たす場合（死亡退職、心身の障害による退職など）" [ref=f2e543]
              - cell [ref=f2e544]:
                - text: 給与収入が
                - strong [ref=f2e545]: 2,000万円を超える
                - text: 人（要確定申告）
        - paragraph [ref=f2e546]:
          - text: 本書のペルソナで言えば、佐藤健太さん・田中由紀さん（中途入社・前職合算）・鈴木三郎さんはいずれも1か所勤務・甲欄で、年末調整の対象です。ただし
          - strong [ref=f2e547]: 年末調整の対象者であっても、医療費控除やふるさと納税（確定申告方式）を使いたい場合は、年末調整とは別に自分で確定申告する
          - text: ——この「両方やる」パターンは実務で非常に多く、混乱しやすいので押さえておきましょう。年末調整で給与分を締めたうえで、確定申告で残りの控除を上乗せする、という積み上げです。
        - complementary [ref=f2e548]:
          - generic [ref=f2e549]: ENGINEER'S NOTE — 「対象外」と「対象だが未完」を分けて設計する
          - text: 年末調整プロダクトでは、対象者判定を早い段階のゲートとして持つのが定石です。実装で効くのは次の切り分け。(1)
          - strong [ref=f2e550]: そもそも年末調整の対象外
          - text: （乙欄、給与2,000万円超、年途中退職など）——この人は年末調整フローに乗せず確定申告へ案内する。(2)
          - strong [ref=f2e551]: 対象だが、扱えない控除を持っている
          - text: （医療費控除・初年の住宅ローン控除・ふるさと納税の確定申告分など）——年末調整は通常どおり完了させつつ、「この控除は確定申告で」と
          - strong [ref=f2e552]: 誘導・注記
          - text: する。両者を「できない」の一語で潰すと、後者のユーザーに誤った案内をしてしまいます。加えて、給与2,000万円超のような閾値は年度パラメータとして外出しし（第26章）、判定基準日（12月31日時点）で確定する属性と、入社・退職といったイベント日で決まる属性を明確に区別しておくと、中途入社・退職（第14章）の分岐が破綻しません。
