    - main [ref=f2e78]:
      - generic [ref=f2e79]:
        - heading "はじめに" [level=2] [ref=f2e80]
        - paragraph [ref=f2e81]:
          - text: この本は、年末調整のプロダクト開発に携わるエンジニアが、制度を
          - strong [ref=f2e82]: 「暗記」ではなく「構造」で理解する
          - text: ための一冊です。個々の控除を丸暗記しても、翌年の税制改正で数字が変わればすぐに陳腐化します。そうではなく、「なぜこの控除が存在するのか」「なぜこの手続きが必要なのか」という
          - strong [ref=f2e83]: 制度の意図
          - text: をつかめば、仕様書や計算ロジックが「なぜそう書かれているか」まで腹落ちし、改正にも自分の頭で対応できるようになります。
        - paragraph [ref=f2e84]:
          - text: 想定読者は、実務で少し年末調整に触れたものの、体系的な知識はこれからという方です。税務・労務の専門家である必要はありません。簿記や税法の前提知識は仮定せず、法令用語は初出時に平易に言い換え、巻末の
          - link "専門用語集" [ref=f2e85] [cursor=pointer]:
            - /url: "#glossary"
          - text: にリンクしています。
        - paragraph [ref=f2e86]:
          - strong [ref=f2e87]: 読み方の案内。
          - text: 本書は6部構成です。急がば回れで、まず
          - link "第1部（全体地図）" [ref=f2e88] [cursor=pointer]:
            - /url: "#ch1"
          - text: を通読することを強くおすすめします。特に第1章の「収入→所得→課税所得→税額」のフロー図は本書全体の背骨で、以降のすべての章がこの一枚にぶら下がります。第2部で計算の部品（各種控除）を、第3部で手続きと帳票を学び、第4部で住民税や社会保険との接続を、第5部で歴史と改正の流れを押さえます。最後の
          - link "第6部" [ref=f2e89] [cursor=pointer]:
            - /url: "#ch24"
          - text: は、ここまでの制度理解を実装の視点へ還元する、エンジニア向けのまとめです。各章末には「理解度チェック」（答えは折りたたみ）を用意しました。本文中の 下線つきの語 は用語集へのリンクです。全編を通じて、次に紹介する3人の架空の従業員の計算例を積み上げていきます。
        - paragraph [ref=f2e90]: 本書の金額・要件・様式は令和7年分・令和8年分の制度を基準にしています。制度は毎年改正されるため、実務では必ず国税庁の最新情報をご確認ください。
