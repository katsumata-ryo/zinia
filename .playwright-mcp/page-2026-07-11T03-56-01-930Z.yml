        - paragraph [ref=f2e2483]:
          - text: この対立の根っこは、第20章で見た
          - strong [ref=f2e2484]: 「精算主体を民間企業に置く」という日本型の特殊性
          - text: そのものです。不要論とは要するに「精算主体を企業から個人（＋当局）へ戻せ」という主張であり、存続論は「その移譲コストは払う価値がある」という主張です。デジタル化（前節）がどこまで進むかが、この論争の現実味を左右します。名寄せとプレフィルドが十分に成熟すれば、不要論は「理念」から「実現可能な選択肢」へ変わりうるからです。
        - complementary [ref=f2e2485]:
          - generic [ref=f2e2486]: ENGINEER'S NOTE — どの未来でも「計算ロジックの正しさ」は残る
          - text: エンジニアとして冷静に見ておきたいのは、
          - strong [ref=f2e2487]: 年末調整の形がどう変わっても、「収入→所得→課税所得→税額」という計算そのものは消えない
          - text: という点です（第1章の背骨）。不要論が実現して申告一本化になっても、その申告を支援するソフトが同じ計算をします。プレフィルド化が進んでも、埋め込む金額の正しさは誰かが計算する必要があります。つまり私たちのプロダクトの
          - strong [ref=f2e2488]: 価値の核（正確な計算エンジン）は制度変更に対して頑健
          - text: で、変わるのは
          - strong [ref=f2e2489]: 入出力の相手と経路
          - text: （会社→従業員か、当局→個人か）です。第19章のNOTEで述べた「1つの内部モデル × 複数の外部フォーマット」というハブ＆スポーク設計は、まさにこの不確実な未来へのヘッジになります。計算の核を守り、周辺のアダプタを差し替え可能にしておく——これがどの未来にも効く構えです。
        - heading "第5部のまとめ —— 歴史を知ると改正が読める" [level=3] [ref=f2e2490]
        - paragraph [ref=f2e2491]:
          - text: 第5部を振り返ります。第20章で、年末調整は戦時の源泉徴収と戦後の効率追求から生まれた「精算主体が民間企業」という日本型の制度だと知りました。第21章で、近年の改正が「配偶者の壁→働き方の中立→物価対応」とテーマを移してきた線を追い、第22章で、その線が令和8年分でどう具体化し、なぜ月次と年調で適用時期が分かれるのかを実装目線で押さえました。そして本章で、物価連動・デジタル化・不要論という未来の論点が、いずれも第20章の「精算主体は誰か」という一点に帰着することを見ました。
          - strong [ref=f2e2492]: 制度は毎年変わりますが、変わり方には構造があります。
          - text: その構造をつかんでおけば、来年どんな改正が来ても、この地図のどこが動いたのかとして落ち着いて読めるはずです。次の第6部では、この理解をエンジニアの実装知へ翻訳していきます。
        - group [ref=f2e2493]:
          - generic "Q1. 「物価連動の仕組み」が制度に入ることは、これまでの改正と何が構造的に違いますか。" [ref=f2e2494] [cursor=pointer]
        - group [ref=f2e2495]:
          - generic "Q2. 年末調整不要論の対立の根っこは、突き詰めると何をめぐる議論ですか。" [ref=f2e2496] [cursor=pointer]
        - group [ref=f2e2497]:
          - generic "Q3. 制度がどう変わっても、年末調整プロダクトの何が変わらずに残ると考えられますか。" [ref=f2e2498] [cursor=pointer]
      - heading "第6部 エンジニアのための年末調整" [level=2] [ref=f2e2500]
      - generic [ref=f2e2501]:
        - heading "第24章 計算ロジックの構造" [level=2] [ref=f2e2502]
        - generic [ref=f2e2503]:
          - strong [ref=f2e2504]: この章の位置づけ：
          - text: 第6部の入口です。第1〜23章で身につけた制度の理解を、いよいよ実装者の言葉に翻訳していきます。この章では年末調整の計算を、
          - strong [ref=f2e2505]: 入力 → 判定 → 計算 → 出力
          - text: という4ステージのパイプラインとして捉え直します。第1章で描いた「収入 → 所得 → 課税所得 → 税額」の背骨が、そのままソフトウェアのデータフローに写ることを見ていきます。個々の控除の暗記から一歩引いて、
          - strong [ref=f2e2506]: 全体を貫くデータの流れ
          - text: を頭に入れるのが狙いです。
        - heading "年末調整は4ステージのパイプライン" [level=3] [ref=f2e2507]
        - paragraph [ref=f2e2508]: 年末調整の処理を「一つの巨大な計算式」として書こうとすると破綻します。控除の適用可否、金額表の参照、端数処理、帳票への転記——性質の違う仕事が混ざっているからです。これらは次の4つのステージに分けられます。
        - generic [ref=f2e2509]:
          - generic [ref=f2e2510]:
            - generic [ref=f2e2511]:
              - text: ① 入力（Input）
              - generic [ref=f2e2512]: 申告書・前職源泉徴収票・控除証明書のデータ化。生の申告値
            - generic [ref=f2e2513]:
              - text: ▼
              - generic [ref=f2e2514]: 正規化・型付け
            - generic [ref=f2e2515]:
              - text: ② 判定（Eligibility）
              - generic [ref=f2e2516]: 各控除の適用可否と区分の決定。12/31時点の現況で真偽を確定
            - generic [ref=f2e2517]:
              - text: ▼
              - generic [ref=f2e2518]: 区分 → 金額テーブル参照
            - generic [ref=f2e2519]:
              - text: ③ 計算（Calculation）
              - generic [ref=f2e2520]: 給与所得・控除額・課税所得・税額を数式と速算表で算出
            - generic [ref=f2e2521]:
              - text: ▼
              - generic [ref=f2e2522]: 丸め・整形
            - generic [ref=f2e2523]:
              - text: ④ 出力（Output）
              - generic [ref=f2e2524]: 源泉徴収簿・源泉徴収票・給与支払報告書・法定調書への転記
          - paragraph [ref=f2e2525]: 申告書データが4つのステージを一方向に流れて帳票になる
        - paragraph [ref=f2e2526]:
          - text: 重要なのは、この4ステージが
          - strong [ref=f2e2527]: 一方向（左から右）に流れる
          - text: ことです。判定は入力に依存し、計算は判定に依存し、出力は計算に依存します。逆流はありません。この単純な依存の向きが、テストのしやすさ・改正への強さ・バグの追いやすさを決めます。以下、ステージごとに何が起きるかを見ます。
        - heading "① 入力 —— 生の申告値を「型のあるデータ」にする" [level=3] [ref=f2e2528]
        - paragraph [ref=f2e2529]: 入力ステージの仕事は、紙またはフォームで集まった申告値を、後段が扱える構造化データに変換することです。第12章で読み解いた各種申告書——扶養控除等（異動）申告書（マル扶）、基礎控除申告書兼配偶者控除等申告書兼特定親族特別控除申告書兼所得金額調整控除申告書（マル基配所）、保険料控除申告書（マル保）、住宅ローン控除申告書——が、それぞれ入力の束に対応します。
        - paragraph [ref=f2e2530]:
          - text: ここで集めるのは、あくまで
          - strong [ref=f2e2531]: 「本人が申告した生の値」と「事実」
          - text: だけです。控除額をこの段で計算してはいけません。たとえば配偶者の「収入」は集めますが、そこから「配偶者控除38万円」を導くのは③計算の仕事です。田中由紀さんのケースなら、現勤務先の給与380万円・前職90万円・弟翔のアルバイト給与150万円といった
          - strong [ref=f2e2532]: 収入額
          - text: と、弟の年齢20歳・生計を一にする事実を集めるところまでが入力です。
        - code [ref=f2e2534]: "// 入力ステージが生成する構造（型定義のイメージ） type EmployeeFiling = { employeeId: string taxYear: 2025 | 2026 // 年分は必ず持たせる（第26章） salaryIncome: Yen // 給与「収入」。所得ではない（第25章） priorJobIncome: Yen // 前職分（田中さんの90万円・第14章） dependents: DependentClaim[]// 各人の生年月日・所得・同居別居・障害等 spouse: SpouseClaim | null insurancePremiums: InsuranceClaim[] housingLoan: HousingLoanClaim | null }"
        - paragraph [ref=f2e2535]:
          - text: この段で「値の正規化」——全角数字を半角に、空欄を0でなく
          - code [ref=f2e2536]: "null"
          - text: に、生年月日を日付型に——を済ませておくと、後段が例外だらけにならずに済みます。第19章で触れたマイナンバーや電子的控除証明書は、この入力段で本人確認済みのデータとして合流します。
        - heading "② 判定 —— 「適用できるか」と「どの区分か」を真偽で確定する" [level=3] [ref=f2e2537]
        - paragraph [ref=f2e2538]:
          - text: 判定ステージは、集めた事実から
          - strong [ref=f2e2539]: 各控除の適用可否と区分
          - text: を決めます。ここが年末調整ロジックの「頭脳」で、制度の要件がそのまま条件分岐になります。金額はまだ出しません。出すのは
          - strong [ref=f2e2540]: 「この人にこの控除が使えるか」「使えるとしてどの区分か」という札
          - text: です。
        - paragraph [ref=f2e2541]: たとえば扶養まわり（第6章）の判定は、おおよそ次の形になります。判定の入力は「生計を一にするか」「合計所得金額がいくらか」「12月31日時点で何歳か」といった事実です。
        - code [ref=f2e2543]: "// 扶養親族の区分判定（令和7年分・イメージ） function classifyDependent(d: Dependent, year: TaxYear): DependentKind { if (!d.sharesLivelihood) return 'none' // 生計を一にしない const income = totalIncome(d) // 合計所得金額（収入ではない） const threshold = dependentIncomeLimit(year) // R7:58万 / R8:62万（第26章） if (income > threshold) return 'specialRelative?' // 特定親族特別控除の検討へ const age = ageOnDec31(d.birthDate, year) // 判定基準日は12/31（第25章） if (age >= 70) return d.livesWithParent ? 'elderlyCohabit' : 'elderly' if (age >= 19 && age < 23) return 'specific' // 特定扶養親族 if (age >= 16) return 'general' return 'under16' // 扶養控除の対象外 }"
        - paragraph [ref=f2e2544]:
          - text: 鈴木三郎さんの長男・大輔（21歳）は
          - code [ref=f2e2545]: "'specific'"
          - text: （特定扶養親族）、同居の母ハル（82歳）は
          - code [ref=f2e2546]: "'elderlyCohabit'"
          - text: （同居老親等）という札がここで付きます。田中さんの弟・翔（20歳・所得58万円超）は扶養控除の枠から外れ、
          - code [ref=f2e2547]: "'specialRelative?'"
          - text: ——特定親族特別控除（第6章・令和7年創設）の検討対象という札に回ります。
          - strong [ref=f2e2548]: 札を付けるところまでが判定
          - text: で、控除額そのものは次段です。
        - complementary [ref=f2e2549]:
          - generic [ref=f2e2550]: ENGINEER'S NOTE — 判定と計算を混ぜない
          - text: 実装で最も事故が多いのが、判定（可否・区分）と計算（金額）を1つの関数に押し込むことです。
          - code [ref=f2e2551]: calcDependentDeduction()
          - text: の中で年齢も所得も同居判定も金額表の参照も全部やる、という書き方は、改正が来たとき「どこを直せばいいか」が分からなくなります。
          - strong [ref=f2e2552]: 「区分を返す関数」と「区分から金額を引く関数」を分ける
          - text: ——判定は制度要件（真偽）、計算は金額表（数値）というレイヤ分けにしておくと、令和8年の所得要件引き上げ（58万→62万）は判定側の定数1つ、控除額の改正は計算側のテーブル1つ、と修正箇所が一点に閉じます（第26章）。
        - heading "③ 計算 —— 区分と数式で金額を積み上げる" [level=3] [ref=f2e2553]
        - paragraph [ref=f2e2554]:
          - text: 計算ステージで、ようやく金額が出ます。ここは第1章の背骨——
          - strong [ref=f2e2555]: 収入 → 所得 → 課税所得 → 税額
          - text: ——を数式でなぞる部分です。第5章の給与所得（収入から給与所得控除を引く）、第6〜8章の各所得控除、第10章の税額計算（速算表・復興特別所得税・端数処理）が、すべてこのステージに収まります。
