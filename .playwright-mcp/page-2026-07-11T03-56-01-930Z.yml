        - heading "第2章 源泉徴収制度" [level=2] [ref=f2e303]
        - generic [ref=f2e304]:
          - strong [ref=f2e305]: この章の位置づけ：
          - text: 第1章の地図は「1年分をまとめて計算する」話でした。しかし実際には、税は毎月の給与から少しずつ天引きされています。この「毎月の概算徴収」の仕組みが
          - strong [ref=f2e306]: 源泉徴収
          - text: です。年末調整は源泉徴収があるからこそ必要になる手続きなので、まず源泉徴収の目的と、会社が負う「徴収義務者」という立場を理解しておきましょう。第3章の「ズレの精算」へ直接つながる章です。
        - paragraph [ref=f2e307]:
          - link "源泉徴収" [ref=f2e308] [cursor=pointer]:
            - /url: "#g-gensen"
          - text: とは、給与や報酬を
          - strong [ref=f2e309]: 支払う側
          - text: が、支払いの時点であらかじめ所得税を天引きし、本人に代わって国に納める仕組みです。「源泉」＝所得が発生する源、つまり給与が支払われるその場で税を捕まえる、という意味合いです。会社員なら、給与明細の「所得税」欄がまさにこれです。
        - heading "なぜ毎月、しかも概算で徴収するのか" [level=3] [ref=f2e310]
        - paragraph [ref=f2e311]: もし源泉徴収がなければ、全国の給与所得者が翌年に自分で1年分の所得税を計算し、まとまった額を一度に納めることになります。これには制度側から見て大きな問題があります。
        - list [ref=f2e312]:
          - listitem [ref=f2e313]:
            - strong [ref=f2e314]: 徴収の確実性
            - text: ：納税者本人がお金を使い切ってしまうと、後から一括で払うのは難しい。給与から先に天引きすれば取りっぱぐれがない。
          - listitem [ref=f2e315]:
            - strong [ref=f2e316]: 納税者の負担の平準化
            - text: ：年1回の大きな支払いより、毎月少しずつのほうが家計への衝撃が小さい。
          - listitem [ref=f2e317]:
            - strong [ref=f2e318]: 税務署の事務負担の分散
            - text: ：数千万人の申告を一時期に処理せず、日々の給与支払いに乗せて薄く広く集められる。
        - paragraph [ref=f2e319]:
          - text: ただし毎月の給与時点では、その人の1年間の総収入も、年内に支払う社会保険料も、扶養家族の状況の最終形も確定していません。そこで源泉徴収は「1年間これがずっと続いたらこれくらいだろう」という
          - strong [ref=f2e320]: 概算
          - text: で徴収します。使うのが
          - link "源泉徴収税額表" [ref=f2e321] [cursor=pointer]:
