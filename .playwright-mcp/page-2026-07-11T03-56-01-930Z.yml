          - term [ref=f2e3229]: 特別徴収／普通徴収（とくべつちょうしゅう・ふつうちょうしゅう）
          - definition [ref=f2e3230]:
            - text: 住民税の納め方。
            - strong [ref=f2e3231]: 特別徴収
            - text: は会社が毎月の給与から天引きして市区町村へ納付（原則）。
            - strong [ref=f2e3232]: 普通徴収
            - text: は本人が納付書で年4回納める。年末調整のデータは給与支払報告書として市区町村へ渡り、翌年度の特別徴収税額の基礎になる。
