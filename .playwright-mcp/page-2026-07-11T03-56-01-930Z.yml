          - term [ref=f2e3168]: 障害者控除（しょうがいしゃこうじょ）
          - definition [ref=f2e3169]:
            - text: 本人・同一生計配偶者・扶養親族が障害者に該当する場合の人的控除。区分に応じ27万／40万（特別障害者）／75万円（同居特別障害者）。
