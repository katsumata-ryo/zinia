          - term [ref=f2e3220]: 特定親族特別控除（とくていしんぞくとくべつこうじょ）
          - definition [ref=f2e3221]:
            - text: 令和7年創設。19歳以上23歳未満で合計所得金額58万円超123万円以下の親族（＝特定扶養控除の枠を外れる所得帯）について、控除額をなだらかに先細りさせる制度。大学生年代のアルバイト収入増で扶養控除が崖落ちするのを防ぐ。
