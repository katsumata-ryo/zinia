          - text: の各段に、具体的な部品を差し込んできました。給与所得控除（第5章）で「所得」を、人的・物的控除（第6〜8章）で「課税所得」を、税額控除（第9章）と復興特別所得税（本章）で「税額」を——それぞれ精密化したわけです。次の第3部では、この計算を実際に回すための
          - strong [ref=f2e1239]: 申告書・帳票・実務の流れ
          - text: へ進みます。ここまでの計算の意味がわかっていれば、「あの帳票はこの段の入力を集めるためにある」と読めるはずです。
