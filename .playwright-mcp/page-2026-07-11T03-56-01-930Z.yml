          - code [ref=f2e2810]: "{ value: 740_000, kind: 'special', until: 2027 }"
          - text: のように、数値に
          - strong [ref=f2e2811]: 由来と期限
          - text: を添える。「なぜこの年だけこの額なのか」を後任が制度大綱まで遡らずに読めることが、毎年触るコードの寿命を延ばします。
