          - text: ——の、いちばん最初の一歩をここで精密化します。会社員の「所得」はどう決まるのか。額面（収入）から差し引く
          - strong [ref=f2e568]: 給与所得控除
          - text: とは何で、なぜ実際の経費ではなく法律が決めた概算なのか。そして高所得の子育て世帯などを救う
          - strong [ref=f2e569]: 所得金額調整控除
          - text: まで。第6章以降の所得控除は、すべてこの章で求めた「給与所得」を出発点に引き算していきます。ここが第2部全体の土台です。
