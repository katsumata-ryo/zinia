        - heading "年末調整の対象外パターンの整理" [level=3] [ref=f2e1553]
        - paragraph [ref=f2e1554]:
          - text: 第4章で触れた対象外を、この章の視点で束ねておきます。
          - strong [ref=f2e1555]: 年末調整されない＝確定申告で精算する
          - text: 、が共通の帰結です。
        - list [ref=f2e1556]:
          - listitem [ref=f2e1557]: マル扶未提出（乙欄・従たる給与）の人
          - listitem [ref=f2e1558]: 年の途中で退職し年内に再就職しなかった人（原則）
          - listitem [ref=f2e1559]: 給与収入が2,000万円を超える人
          - listitem [ref=f2e1560]: 前職の源泉徴収票が年末までに間に合わなかった人（合算不能）
          - listitem [ref=f2e1561]: 継続して同一の雇用主に雇用されない日雇い等（丙欄）の人
        - complementary [ref=f2e1562]:
          - generic [ref=f2e1563]: ENGINEER'S NOTE — 合算と対象外判定の分岐設計
          - text: 中途入社・退職・複数勤務は、年末調整プロダクトで最もバグが出やすい領域です。設計の勘所を3点。(1)
          - strong [ref=f2e1564]: 前職給与は「別レコード」ではなく合算の入力
          - text: ——現勤務先の給与と前職源泉徴収票を
          - strong [ref=f2e1565]: 合算した一つの年収
          - text: で給与所得控除・税額を計算する。前職分を別枠で控除計算すると二重に給与所得控除を引いてしまう典型バグになる。前職データには「支払金額」「源泉徴収税額」「社会保険料」の3項目を最低限モデル化し、未回収なら
          - strong [ref=f2e1566]: 年末調整をブロックして確定申告へ誘導
          - text: するゲートを置く。(2)
          - strong [ref=f2e1567]: 甲乙丙は税額計算のモードであって従業員属性ではない
          - text: ——マル扶提出の有無から導出する派生値として持ち、乙欄・丙欄は年末調整フローに乗せない。(3)
          - strong [ref=f2e1568]: 退職の対象判定はイベント日で分岐
          - text: ——退職日・再就職有無・死亡/障害区分の組み合わせで「会社が年調するか／確定申告か」が決まる。第4章のNOTEで述べた「基準日で決まる属性」と「イベント日で決まる属性」の区別が、まさにここで効きます。合算・乙欄・退職を一つの巨大な条件分岐に潰さず、「収入の合算」「徴収モード」「対象者ゲート」という独立した3レイヤーに分けるのが破綻しない鍵です。
