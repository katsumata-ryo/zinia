              - cell "48万円" [ref=f2e727]
            - row [ref=f2e728]:
              - cell "老人扶養親族（同居老親等）" [ref=f2e729]
              - cell "70歳以上・本人や配偶者の直系尊属で同居" [ref=f2e730]
              - cell "58万円" [ref=f2e731]
        - paragraph [ref=f2e732]:
          - strong [ref=f2e733]: 特定扶養親族
          - text: （19〜22歳）の額が大きいのは、大学生年代で教育費が最もかさむからです。
          - strong [ref=f2e734]: 同居老親等
          - text: が手厚いのは、同居で親を扶養する負担への配慮です。佐藤さんの長女・葵さん（16歳）は一般扶養で
          - strong [ref=f2e735]: 38万円
          - text: 、長男・陽向さん（10歳）は16歳未満なので扶養控除は
          - strong [ref=f2e736]: 0円
          - text: 。鈴木さんは母・ハルさん（82歳・同居）で同居老親等
          - strong [ref=f2e737]: 58万円
          - text: ——長男・大輔さん（21歳）は特定扶養で
          - strong [ref=f2e738]: 63万円
          - text: ——ただし大学生年代にはバイト収入次第で適用が変わる仕組みがあるので、後述の特定親族特別控除とあわせて押さえてください。
        - heading "配偶者控除・配偶者特別控除 ——「崖」をなくした二段構え" [level=3] [ref=f2e739]
        - paragraph [ref=f2e740]:
          - text: 配偶者については専用の控除があります。ポイントは
          - strong [ref=f2e741]: 本人（納税者）の所得によっても額が変わる
          - text: ことと、
          - strong [ref=f2e742]: 配偶者の所得が増えても急に控除が消えない
          - text: 設計です。
        - list [ref=f2e743]:
          - listitem [ref=f2e744]:
            - link "配偶者控除" [ref=f2e745] [cursor=pointer]:
              - /url: "#g-haiguusha"
            - text: ：配偶者の合計所得が
            - strong [ref=f2e746]: 58万円以下
            - text: （給与収入123万円以下）
            - generic [ref=f2e747]: 令和7年分
            - text: 。控除額は本人の所得に応じ最高38万円（配偶者が70歳以上の老人控除対象配偶者は最高48万円）。
          - listitem [ref=f2e748]:
            - link "配偶者特別控除" [ref=f2e749] [cursor=pointer]:
              - /url: "#g-haiguutokubetsu"
            - text: ：配偶者の合計所得が
            - strong [ref=f2e750]: 58万円超133万円以下
            - text: 。所得が増えるほど控除が段階的に減る。
        - paragraph [ref=f2e751]:
          - text: この二段構えの狙いは「働き損の解消」です。もし配偶者控除が所得58万円で完全に消えるだけなら、あと少し稼ぐと控除ゼロで手取りが逆に減る「崖」が生じます。配偶者特別控除は、58万円を超えた先を
          - strong [ref=f2e752]: なだらかな下り坂
          - text: にして崖をならしています。さらに本人の合計所得が
          - strong [ref=f2e753]: 1,000万円を超えると、配偶者控除・配偶者特別控除はどちらも受けられません
          - text: （高所得者は対象外）。
        - paragraph [ref=f2e754]:
          - text: 佐藤さんの妻・美咲さん（パート年収95万円）は、給与所得控除65万円を引くと合計所得は30万円。58万円以下なので
          - strong [ref=f2e755]: 配偶者控除の対象
          - text: 、佐藤さん本人の所得も1,000万円以下なので満額
          - strong [ref=f2e756]: 38万円
          - text: です。鈴木さんの妻・和子さん（収入なし＝合計所得0）も配偶者控除の要件は満たしますが、鈴木さん本人の合計所得は840万円（第5章）で1,000万円以下のため、こちらも配偶者控除の対象になります。
        - complementary [ref=f2e757]:
          - generic [ref=f2e758]: ENGINEER'S NOTE — 配偶者控除は「本人×配偶者」の二次元テーブル
          - text: 配偶者（特別）控除額は
          - strong [ref=f2e759]: 本人の合計所得区分（900万・950万・1,000万の3段階）×配偶者の合計所得区分
          - text: の二次元マトリクスで決まります。単一の閾値ではなく表引きにすること。実装で事故りやすいのは、(1)
          - strong [ref=f2e760]: 「配偶者控除」と「配偶者特別控除」を別物のように分岐させると境界（合計所得58万円）で不整合が出る
          - text: ——連続した1枚の表として持つほうが安全。(2) 本人所得1,000万円超で問答無用にゼロになるゲートを忘れない。(3) 「収入」で判定するのか「合計所得」で判定するのかを画面・内部で統一する（申告書はしばしば収入見積で書かせ、内部で所得へ換算する）。年度で閾値（48万→58万→62万）が動くので、判定表そのものを年度パラメータ化します。
        - heading "特定親族特別控除 —— 令和7年の目玉、「大学生バイトの壁」対策" [level=3] [ref=f2e761]
        - paragraph [ref=f2e762]:
          - text: 令和7年に新設された
          - link "特定親族特別控除" [ref=f2e763] [cursor=pointer]:
            - /url: "#g-tokuteishinzoku"
          - text: は、田中由紀さんのようなケースの主役です。従来、19〜22歳の子は特定扶養親族として63万円という大きな控除の対象でした。ところが子のバイト収入が増えて合計所得58万円（給与123万円）を1円でも超えると、特定扶養控除が
          - strong [ref=f2e764]: まるごと消えて63万円の崖
          - text: が生じていました。これが「学生は稼ぎすぎると親の税負担が跳ね上がる（＝働き控えの原因）」という、いわゆる大学生年代の壁です。
        - paragraph [ref=f2e765]:
          - text: 特定親族特別控除は、この崖を配偶者特別控除と同じ発想でならす制度です。対象は
          - strong [ref=f2e766]: 特定親族
          - text: ——19歳以上23歳未満で、生計を一にし、合計所得金額が
          - strong [ref=f2e767]: 58万円超123万円以下
          - text: （給与収入なら123万円超188万円以下）の親族。控除額は所得に応じて段階的に減り、最高63万円です。
        - table [ref=f2e769]:
          - rowgroup [ref=f2e770]:
            - row [ref=f2e771]:
              - columnheader "特定親族の合計所得金額" [ref=f2e772]
              - columnheader "控除額" [ref=f2e773]
