          - definition [ref=f2e3155]:
            - text: 令和8年分の扶養控除等申告書で記載の中心となる区分。控除対象扶養親族または特定親族のうち、合計所得金額100万円以下の者を指す。特定親族特別控除の創設に伴い、月次の「扶養親族等の数」に反映するために設けられた。
            - generic [ref=f2e3156]:
