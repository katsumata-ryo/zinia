        - paragraph [ref=f2e2594]:
          - text: この段は
          - strong [ref=f2e2595]: 純粋な関数
          - text: として書けるのが理想です。入力（区分札と金額）が同じなら、出力（税額）は必ず同じ。外部の状態やその時刻に依存しない。そうしておけば、佐藤さん・田中さん・鈴木さんの各ケースを固定入力→期待出力のテストとして何百通りでも回せます。②で札を付け終えているので、③は「札に応じて金額表を引き、数式に流し、決められた位置で丸める」だけの見通しの良い処理になります。
        - heading "④ 出力 —— 計算結果を制度の帳票に転記する" [level=3] [ref=f2e2596]
        - paragraph [ref=f2e2597]:
          - text: 最後の出力ステージは、③で確定した数値を各帳票の所定欄へ流し込みます。第13章の
          - strong [ref=f2e2598]: 源泉徴収簿
          - text: （計算の作業台）と
          - strong [ref=f2e2599]: 源泉徴収票
          - text: （結果の証明書）、第16章の
          - strong [ref=f2e2600]: 給与支払報告書
          - text: （市区町村へ／住民税連携）、第17章の
          - strong [ref=f2e2601]: 法定調書
          - text: （税務署へ）——同じ計算結果が、宛先の違う複数の帳票に分岐して出ていきます。
        - paragraph [ref=f2e2602]:
          - text: ここで大切なのは、
          - strong [ref=f2e2603]: 出力段では計算をやり直さない
          - text: ことです。源泉徴収票の支払金額欄と給与支払報告書の同欄が1円でも食い違えば、行政側で突合エラーになります。両者は必ず③の
          - strong [ref=f2e2604]: 同一の確定値
          - text: を参照する——「計算は一度、転記は何度でも」が鉄則です。過不足の精算（還付・追徴、第15章）も、③で確定した年調年税額と源泉徴収済額の差として、この段で各人に反映されます。
        - complementary [ref=f2e2605]:
          - generic [ref=f2e2606]: ENGINEER'S NOTE — パイプラインは一方向・各段の成果物を残す
          - text: 4ステージを実装に落とすときのコツは、
          - strong [ref=f2e2607]: 各段の成果物（中間データ）を捨てずに保持する
          - text: ことです。②の区分札、③の各段の金額を「途中経過」として残しておくと、源泉徴収簿がほぼそのまま再現でき、監査・問い合わせ対応・再計算（第26章）で決定的に効きます。「なぜこの人の控除額がこの額なのか」を、②の札まで遡って説明できる状態にしておく。逆に、入力から最終税額まで一気に計算して中間を捨てる実装は、速いが説明不能になり、年末調整プロダクトとしては致命的です。パイプラインの各段は、次段への入力であると同時に
          - strong [ref=f2e2608]: 監査ログ
          - text: でもある、と考えてください。
