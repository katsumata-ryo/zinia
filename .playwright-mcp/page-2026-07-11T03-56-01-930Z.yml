          - term [ref=f2e3235]: 年末調整（ねんまつちょうせい）
          - definition [ref=f2e3236]:
            - text: 毎月の源泉徴収額の合計（概算）と、その年に本来納めるべき税額（実額）とのズレを、年末に会社が精算する手続き。徴収を会社に委ねた延長で精算も委ねた、日本特有の仕組み。過納なら還付、不足なら追徴する。
            - generic [ref=f2e3237]:
