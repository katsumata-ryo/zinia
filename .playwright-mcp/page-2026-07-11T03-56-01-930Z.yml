          - strong [ref=f2e356]: 国税庁が公表する税額表そのものをデータとして持つ
          - text: のが原則です（電子計算機用の計算式も別途公表されていますが、いずれも「与えられた仕様」であって自前で導出するものではありません）。ここで意識したいのは、月次の源泉徴収額は
          - strong [ref=f2e357]: あくまで概算
          - text: であり、正確さを担保するのは年末調整だという役割分担です。だから月次ロジックは「税額表どおりに引けているか」を検証すればよく、1年間の正しさまで背負う必要はありません。なお第22章で触れるとおり、令和8年分は基礎控除等の引き上げが月次の税額表には反映されず、その差は年末調整で精算される点に注意が必要です
          - generic [ref=f2e358]: 令和8年分時点
          - text: 。
