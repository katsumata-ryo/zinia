      - generic [ref=f2e816]:
        - heading "第7章 人的控除(2) 本人の事情" [level=2] [ref=f2e817]
        - generic [ref=f2e818]:
          - strong [ref=f2e819]: この章の位置づけ：
          - text: 前章は「養う家族」に着目した控除でした。本章は同じ人的控除でも
          - strong [ref=f2e820]: 本人（や本人の状況）そのもの
          - text: に着目する控除——基礎控除、障害者控除、寡婦控除・ひとり親控除、勤労学生控除を扱います。とくに
          - strong [ref=f2e821]: 基礎控除
          - text: は令和7年改正で一律48万円から所得に応じた階段構造へと大きく変わり、いわゆる「103万円→160万円の壁」の主役になりました。ここが今回の改正の震源地です。
        - heading "基礎控除 —— 令和7年改正の震源" [level=3] [ref=f2e822]
        - paragraph [ref=f2e823]:
          - link "基礎控除" [ref=f2e824] [cursor=pointer]:
            - /url: "#g-kiso"
          - text: は、誰にでも認められる「最低限の生活費には課税しない」ための控除です。長らく一律48万円でしたが、令和7年改正で
          - strong [ref=f2e825]: 合計所得金額に応じた階段構造
          - text: になり、低〜中所得層で大きく引き上げられました。第5章の給与所得控除の引き上げ（55万→65万）と
          - strong [ref=f2e826]: セット
          - text: で「課税最低限」を押し上げたのがこの改正の核心です。
