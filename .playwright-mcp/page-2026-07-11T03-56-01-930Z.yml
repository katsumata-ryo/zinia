          - term [ref=f2e3184]: 生命保険料控除（せいめいほけんりょうこうじょ）
          - definition [ref=f2e3185]:
            - text: 生命保険・介護医療保険・個人年金保険の保険料に応じた物的控除。契約時期で新制度・旧制度に分かれ、計算式と上限が異なる（全体上限は12万円）。
            - generic [ref=f2e3186]:
              - text: 関連章：
              - link "第8章" [ref=f2e3187] [cursor=pointer]:
