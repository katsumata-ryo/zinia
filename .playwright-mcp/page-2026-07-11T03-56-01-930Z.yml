          - text: 佐藤さんの源泉徴収票なら、「支払金額 6,200,000／給与所得控除後 4,660,000／所得控除の合計 …／源泉徴収税額 （年調後の確定額）」と並び、摘要欄に生命保険料控除額・住宅ローン控除額・配偶者（美咲さん）・扶養親族（葵さん）が載ります。
          - strong [ref=f2e1477]: この一枚を市区町村へ回したものが給与支払報告書
          - text: （様式はほぼ同じ）で、翌年度の住民税の課税資料になります（第16章）。同じ計算結果が、本人への証明・税務署への法定調書・市区町村への課税資料という三役を兼ねているわけです。
        - complementary [ref=f2e1478]:
          - generic [ref=f2e1479]: ENGINEER'S NOTE — 簿は計算グラフ、票はそのビュー
          - text: 実装の観点では、
          - strong [ref=f2e1480]: 源泉徴収簿＝計算の中間状態を全部保持したモデル
          - text: 、
          - strong [ref=f2e1481]: 源泉徴収票＝そのモデルの表示用プロジェクション
          - text: と割り切ると綺麗に収まります。簿には①〜⑦の各段の値をすべて永続化し（監査・再計算・第15章の再年末調整で必要）、票はそこから必要フィールドを射影して生成する。ポイントは3つ。(1)
          - strong [ref=f2e1482]: 端数処理の適用点を段ごとに固定
          - text: する——課税給与所得金額は1,000円未満切捨て、年調年税額は100円未満切捨て、と丸めるタイミングが違うので、各段のデータ型と丸め規則をセットで持つ（第25章）。(2)
          - strong [ref=f2e1483]: 票と給与支払報告書はほぼ同一データの別レイアウト
          - text: なので、一つの結果モデルから複数フォーマット（本人交付用PDF・eLTAX用電子データ・法定調書）を出力するレンダラ分離にする。(3)
          - strong [ref=f2e1484]: 金額は整数（円）で保持
          - text: し浮動小数を持ち込まない。簿を「計算グラフ」、票を「その読み取り専用ビュー」と捉えれば、表示の都合が計算を汚さずに済みます。
