      - generic [ref=f2e1577]:
        - heading "第15章 過不足の精算とやり直し" [level=2] [ref=f2e1578]
        - generic [ref=f2e1579]:
          - strong [ref=f2e1580]: この章の位置づけ：
          - text: 年税額が確定したら、あとは差額を清算するだけ——のはずですが、実務ではその「清算」に方法があり、確定後に間違いが見つかる「やり直し」もあります。この章では、過不足をどう還付・追徴するか、いつ再年末調整するか、いつ確定申告へ切り替えるかを整理します。第3部の締めくくりとして、計算（13章）の後始末と、年末調整の限界（4章）への接続点を押さえます。
        - paragraph [ref=f2e1581]:
          - text: 第3章で見たとおり、過不足額は
          - strong [ref=f2e1582]: 源泉徴収税額の合計 − 年調年税額
          - text: 。プラスなら還付、マイナスなら追徴です。多くは還付になります（月次で無視されていた控除が年末にまとまって効くため）。ではその還付・追徴を
          - strong [ref=f2e1583]: どうやって従業員に渡す/取るか
          - text: 。ここに実務の工夫があります。
        - heading "還付・追徴の方法 —— 会社の「預り金」で調整する" [level=3] [ref=f2e1584]
        - paragraph [ref=f2e1585]:
          - text: ポイントは、還付金は税務署から従業員に振り込まれるのではなく、
          - strong [ref=f2e1586]: 会社が立て替えて渡す
          - text: という点です。仕組みはこうです。会社は毎月、従業員から源泉徴収した所得税を
          - strong [ref=f2e1587]: 「預り金」として保管し、翌月に国へ納付
          - text: しています。年末調整で還付が生じると、会社は
          - strong [ref=f2e1588]: まだ国へ納めていない他の従業員の源泉税や、その月の納付予定額から差し引いて
          - text: 還付原資に充て、本人へ支払います。
        - table [ref=f2e1590]:
          - rowgroup [ref=f2e1591]:
            - row [ref=f2e1592]:
              - columnheader "過不足" [ref=f2e1593]
              - columnheader "従業員への渡し方" [ref=f2e1594]
              - columnheader "会社の納付への反映" [ref=f2e1595]
            - row [ref=f2e1596]:
              - cell "還付（引きすぎ）" [ref=f2e1597]
              - cell "12月または最終給与に上乗せして支給" [ref=f2e1598]
              - cell "その月に国へ納める源泉税の総額から還付分を減らして納付" [ref=f2e1599]
            - row [ref=f2e1600]:
              - cell "追徴（引き足りない）" [ref=f2e1601]
              - cell "12月または最終給与から追加で天引き" [ref=f2e1602]
              - cell "追徴分を上乗せして納付" [ref=f2e1603]
            - row [ref=f2e1604]:
              - cell "還付額が大きく1か月で戻しきれない" [ref=f2e1605]
              - cell "翌月以降に繰り越して順次還付、または税務署へ還付請求" [ref=f2e1606]
              - cell "複数月にわたり納付額から控除" [ref=f2e1607]
        - paragraph [ref=f2e1608]: 佐藤さんが還付になる場合、その還付金は「税務署から後日振込」ではなく、12月給与の手取りに上乗せされて戻ります。会社視点では、佐藤さんへの還付分だけ、その月に国へ納める源泉税の合計が減る——個人と国の間に会社の預り金が挟まっているのがこの制度の要です。
        - heading "再年末調整 —— 確定後の「やり直し」" [level=3] [ref=f2e1609]
        - paragraph [ref=f2e1610]:
          - text: 年末調整を締めた後で、申告内容の誤りや漏れが判明することがあります。たとえば控除証明書の出し忘れ、扶養の記載漏れ、配偶者の所得見積り違いなど。この場合、
          - strong [ref=f2e1611]: 翌年1月31日まで
          - text: （源泉徴収票の交付・給与支払報告書の提出期限まで）であれば、会社は
          - strong [ref=f2e1612]: 再年末調整
          - text: してやり直せます。まだ行政へ結果を出していない期間だからこそ内部で訂正できるわけです。再計算で新たな過不足が出れば、追加還付・追加徴収します。
        - paragraph [ref=f2e1613]:
          - text: 境目は
          - strong [ref=f2e1614]: 「行政へ提出したかどうか」
          - text: です。1月31日を過ぎ、源泉徴収票を本人へ交付し給与支払報告書を市区町村へ出した後は、会社側でのやり直しはできず、
          - strong [ref=f2e1615]: 本人が確定申告（または更正の請求）で修正
          - text: する世界に移ります。年末調整というのは、あくまで
          - strong [ref=f2e1616]: 行政へ結果を渡すまでの、会社の内部工程
          - text: だと捉えると、この境目が腑に落ちます。
        - heading "確定申告への切り替え・上乗せ" [level=3] [ref=f2e1617]
        - paragraph [ref=f2e1618]: 第4章で見たように、年末調整では扱えない控除や、そもそも年末調整できないケースがあります。これらは確定申告で処理します。整理すると3つのパターンです。
        - list [ref=f2e1619]:
          - listitem [ref=f2e1620]:
            - strong [ref=f2e1621]: 年末調整を受けたうえで上乗せ
            - text: ：年末調整は完了しているが、医療費控除・寄附金控除（ふるさと納税の確定申告分）・初年の住宅ローン控除などを使いたい人。年末調整済みの源泉徴収票を土台に、確定申告で控除を追加します（第4章の「両方やる」パターン）。
          - listitem [ref=f2e1622]:
            - strong [ref=f2e1623]: 年末調整の代わりに確定申告
            - text: ：そもそも対象外の人（乙欄・年途中退職で未再就職・給与2,000万円超・前職源泉徴収票が間に合わなかった田中さんのようなケース＝第14章）。1年分を自分で合算して申告します。
          - listitem [ref=f2e1624]:
            - strong [ref=f2e1625]: やり直しの期限を過ぎた修正
            - text: ：1月31日以降に誤りが判明した場合。会社の再年末調整ではなく、本人の確定申告・更正の請求で正します。
        - paragraph [ref=f2e1626]:
          - text: いずれも
          - strong [ref=f2e1627]: 年末調整の結果（源泉徴収票）が確定申告の出発点になる
          - text: 点が共通です。年末調整は確定申告と対立せず、多くの人にとって確定申告を不要にし、必要な人にとっては土台を用意する——第4章の棲み分けが、精算・やり直しの局面でも一貫しているのが分かります。
        - complementary [ref=f2e1628]:
          - generic [ref=f2e1629]: ENGINEER'S NOTE — 精算の符号・冪等性・訂正フロー
          - text: 精算とやり直しは、実装で正確さが強く問われる部分です。3点を強調します。(1)
          - strong [ref=f2e1630]: 過不足の符号と充当ロジック
          - text: ——還付＝マイナス徴収、追徴＝プラス徴収として給与計算・納付データまで一貫した符号で流す（第3章NOTE）。還付原資を「その月の源泉税納付総額からの控除」として扱うため、
          - strong [ref=f2e1631]: 従業員個人の還付
          - text: と
          - strong [ref=f2e1632]: 事業所単位の納付額
          - text: という粒度の違うデータを整合させる必要がある。還付超過（納付額を還付が上回る）の繰越も状態として持つ。(2)
          - strong [ref=f2e1633]: 再年末調整は冪等な再計算
          - text: ——第13章NOTEの「簿＝計算グラフ」を活かし、入力（申告書データ）を差し替えて全段を再計算し、
          - strong [ref=f2e1634]: 確定済みバージョンとの差分
          - text: を新たな過不足として出す。既存の精算に上書きするのではなく、訂正イベントとして追記し、監査可能にする。(3)
          - strong [ref=f2e1635]: 1月31日という状態境界をシステムで表現
          - text: する——「行政提出前＝会社で再年調可能」「提出後＝確定申告へ誘導」を明確な状態遷移にし、提出後の変更要求は自動的に確定申告ガイドへ分岐させる。年末調整を「提出でロックされる工程」としてモデル化することが、ここでの破綻を防ぎます。
        - generic [ref=f2e1636]:
          - heading "理解度チェック" [level=3] [ref=f2e1637]
          - group [ref=f2e1638]:
            - generic "Q1. 年末調整の還付金は、税務署から従業員へ直接振り込まれますか。" [ref=f2e1639] [cursor=pointer]
