        - paragraph [ref=f2e611]:
          - text: 令和8年分は最低保障額がさらに変わります。本則69万円ですが、令和8・9年分は特例で
          - strong [ref=f2e612]: 74万円
          - text: （区分の下限も「210万円以下」に）。課税最低限178万円の一部を構成します。詳細は第22章。本章の計算例は令和7年分で統一します。
        - paragraph [ref=f2e613]:
          - text: 注意点が2つ。第一に、給与収入660万円未満は本来「所得税法別表第五」という円単位の表で求める建前ですが、実務上はこの速算表でおおむね一致します。第二に、上限が195万円である以上、
          - strong [ref=f2e614]: 収入850万円を超える人の給与所得控除はいくら稼いでも増えません
          - text: 。この「増えない層」への配慮が、次の所得金額調整控除につながります。
        - heading "計算例：3人の給与所得" [level=3] [ref=f2e615]
        - paragraph [ref=f2e616]:
          - text: ペルソナ3人の給与所得を、上の速算表で実際に求めてみましょう
          - generic [ref=f2e617]: 令和7年分
          - text: 。
        - table [ref=f2e619]:
          - rowgroup [ref=f2e620]:
            - row [ref=f2e621]:
              - columnheader "本人" [ref=f2e622]
              - columnheader "給与収入" [ref=f2e623]
              - columnheader "給与所得控除" [ref=f2e624]
              - columnheader "給与所得" [ref=f2e625]
            - row [ref=f2e626]:
              - cell "佐藤健太" [ref=f2e627]
              - cell "620万円" [ref=f2e628]
