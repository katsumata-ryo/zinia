              - cell "納税者の当事者意識" [ref=f2e2468]
              - cell "自分で申告することで税・控除への関心が高まり、負担が「見える」ようになる" [ref=f2e2469]
              - cell "多数の給与所得者に申告義務を課すと負担・混乱が大きい" [ref=f2e2470]
            - row [ref=f2e2471]:
              - cell "企業の負担" [ref=f2e2472]
              - cell "会社が担う徴税・精算のコスト（＝第20章の責任移譲）を本来の当局へ戻せる" [ref=f2e2473]
              - cell "すでに定着した仕組みで、全体の徴税コストは低く抑えられている" [ref=f2e2474]
            - row [ref=f2e2475]:
              - cell "行政コスト" [ref=f2e2476]
              - cell "デジタル化・名寄せが進めば当局処理は現実的になる" [ref=f2e2477]
              - cell "全国民分の申告処理は当局にとって過大" [ref=f2e2478]
            - row [ref=f2e2479]:
