        - code [ref=f2e2762]: "// 年度パラメータを一箇所に集約する type TaxYear = 2024 | 2025 | 2026 type TaxParams = { basicDeductionTable: BasicDeductionBracket[] // 合計所得に応じた基礎控除 salaryDeductionMin: Yen // 給与所得控除の最低保障額 dependentIncomeLimit: Yen // 扶養の合計所得要件 incomeTaxBrackets: Bracket[] // 速算表 reconstructionRate: number // 復興特別所得税 1.021 hasSpecialRelativeDeduction: boolean // 特定親族特別控除（R7創設） } const PARAMS: Record<TaxYear, TaxParams> = { 2024: { salaryDeductionMin: 550_000, dependentIncomeLimit: 480_000, hasSpecialRelativeDeduction: false, /* … */ }, 2025: { salaryDeductionMin: 650_000, dependentIncomeLimit: 580_000, hasSpecialRelativeDeduction: true, /* … */ }, 2026: { salaryDeductionMin: 740_000, dependentIncomeLimit: 620_000, hasSpecialRelativeDeduction: true, /* … */ }, } function paramsFor(year: TaxYear): TaxParams { return PARAMS[year] }"
        - paragraph [ref=f2e2763]:
          - text: 計算関数はこの
          - code [ref=f2e2764]: TaxParams
