          - strong [ref=f2e1395]: 「集める情報」を正規化したデータモデル
          - text: を先に定義し、様式は入力ビューとして被せることです。たとえば人的情報（親族エンティティ：続柄・生年月日・合計所得見積り・障害区分・同居有無）を一元管理すれば、マル扶の「控除対象扶養親族」も令和8年の「源泉控除対象親族」も、同じ親族データへの
          - strong [ref=f2e1396]: 述語（判定関数）
          - text: の違いとして表現できます。
          - code [ref=f2e1397]: isControlledDependent(person, year)
          - text: と
