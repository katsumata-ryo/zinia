          - text: という細則もあります。
        - paragraph [ref=f2e1017]:
          - text: 計算例で慣れましょう。佐藤さん（新制度）が一般生命に年6万円、介護医療に年4万円払ったとします
          - generic [ref=f2e1018]: 令和7年分
          - text: 。一般生命：6万円は「4万超8万以下」なので
          - code [ref=f2e1019]: 6万 × 1/4 ＋ 2万 ＝ 3.5万円
          - text: 。介護医療：4万円は「2万超4万以下」なので
          - code [ref=f2e1020]: 4万 × 1/2 ＋ 1万 ＝ 3万円
          - text: 。合計
          - strong [ref=f2e1021]: 6.5万円
          - text: （12万円の上限内）。田中さん（新制度・一般生命1本のみ、年3万円）は
          - code [ref=f2e1022]: 3万 × 1/2 ＋ 1万 ＝ 2.5万円
          - text: 。鈴木さんは旧制度契約が一部残るので、旧制度の式（各枠上限5万円）と新制度をあわせ、有利な組合せで最大12万円まで、という判定になります。
