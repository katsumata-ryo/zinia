              - cell "段階的に本則へ調整（逓減）予定" [ref=f2e2418]
        - paragraph [ref=f2e2419]:
          - text: もう一段先を見ておくと、令和8・9年分限定の特例（給与所得控除の74万円上乗せ、基礎控除の低所得帯上乗せ）は、
          - strong [ref=f2e2420]: 令和10年分以後に本則へ戻る／調整される
          - text: 方向です。ここは物価動向次第で見直されうる部分で、次章（第23章）で扱う「物価連動の仕組み」とも関わります。
          - strong [ref=f2e2421]: 特例は特例、いつか本則へ収束する
          - text: ——この前提で年度パラメータを設計しておけば、数年後の逓減改正にも慌てずに対応できます。
        - group [ref=f2e2422]:
          - generic "Q1. 令和8年分で、月々の源泉徴収（天引き）と年末調整の関係はどうなりますか。なぜそうなるのですか。" [ref=f2e2423] [cursor=pointer]
        - group [ref=f2e2424]:
