          - strong [ref=f2e1104]: 控除額の入力は原則「税務署の控除証明書に記載の控除可能額の計算方法 × 金融機関の年末残高」
          - text: で、率・限度額は取得年ごとのパラメータ。プロダクトは取得年をキーに率・限度額テーブルを引く設計に。(2)
