          - term [ref=f2e3198]: 税額表（ぜいがくひょう）／月額表・日額表
          - definition [ref=f2e3199]:
            - text: 毎月（毎日）の源泉徴収税額を求める国税庁の表。給与額と「扶養親族等の数」、甲欄・乙欄の別で税額を引く。月給者は
            - strong [ref=f2e3200]: 月額表
            - text: 、日雇い等は
            - strong [ref=f2e3201]: 日額表
            - text: を用いる。年末調整で使う速算表とは別物。
