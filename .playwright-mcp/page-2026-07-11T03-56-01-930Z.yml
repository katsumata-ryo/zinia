          - term [ref=f2e3148]: 源泉控除対象配偶者・同一生計配偶者（げんせんこうじょたいしょうはいぐうしゃ）
          - definition [ref=f2e3149]:
            - strong [ref=f2e3150]: 同一生計配偶者
            - text: は、生計を一にし合計所得金額が要件以下の配偶者（本人の所得は問わない）。
            - strong [ref=f2e3151]: 源泉控除対象配偶者
            - text: は、本人の所得も要件を満たし、月次源泉で「扶養親族等の数」に数えられる配偶者。控除対象配偶者（年末調整で配偶者控除の対象となる配偶者）とは判定軸が異なるので注意。
