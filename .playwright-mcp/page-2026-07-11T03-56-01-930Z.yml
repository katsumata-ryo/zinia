          - text: は別物です。もう一度だけ確認しておきましょう。収入は受け取った額面そのもの、所得はそこから「その収入を得るためにかかった経費」を引いた
          - emphasis [ref=f2e573]: もうけ
          - text: です。個人事業主なら帳簿をつけて実際の経費を引きますが、会社員が一人ひとり領収書を集めて経費計算するのは非現実的です。そこで所得税法は、「これくらいの収入ならこれくらい経費がかかっているだろう」という概算額をあらかじめ決めておきました。これが
          - link "給与所得控除" [ref=f2e574] [cursor=pointer]:
