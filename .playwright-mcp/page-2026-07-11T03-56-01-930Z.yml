        - heading "第19章 マイナンバーと電子化" [level=2] [ref=f2e1969]
        - generic [ref=f2e1970]:
          - strong [ref=f2e1971]: この章の位置づけ：
          - text: ここまでの章で、年末調整データが税務署（第17章）や市区町村（第16章）へ流れる経路を見てきました。この章は、その
          - strong [ref=f2e1972]: データの中身（マイナンバー）
          - text: と
          - strong [ref=f2e1973]: 流れる形（電子化）
          - text: にフォーカスします。番号の本人確認・収集・秘匿管理という実務と、年調ソフト・e-Tax／eLTAX・電子的控除証明書という電子化の全体像を押さえます。第4部の締めくくりとして、年末調整が紙からデータへ移行していく現在地を確認します。
        - heading "マイナンバー —— なぜ集めるのか、どう扱うのか" [level=3] [ref=f2e1974]
        - paragraph [ref=f2e1975]:
          - text: 源泉徴収票や給与支払報告書には、従業員本人と扶養親族の
          - strong [ref=f2e1976]: マイナンバー（個人番号）
          - text: を記載します。国が個人を
          - strong [ref=f2e1977]: 名寄せ
          - text: して所得を正確に把握するためです。マイナンバーがあれば、複数の勤務先からの給与、税務署の源泉徴収票、市区町村の給与支払報告書を
          - strong [ref=f2e1978]: 同一人物として突合
          - text: できます。第16・17章で見た「同じ人のデータが複数の宛先へ流れる」構図を、確実に一人へ結び付ける鍵がマイナンバーです。
        - paragraph [ref=f2e1979]:
          - text: だからこそ番号の取り扱いは厳格です。会社は年末調整でマイナンバーを収集する際、
          - strong [ref=f2e1980]: ①利用目的の明示、②本人確認（番号確認＋身元確認）、③安全管理措置
          - text: を求められます。マイナンバーは
          - strong [ref=f2e1981]: 特定個人情報
          - text: として一般の個人情報より強く保護され、法定の事務（税・社保）以外への利用は禁止です。
        - table [ref=f2e1983]:
          - rowgroup [ref=f2e1984]:
            - row [ref=f2e1985]:
              - columnheader "実務ステップ" [ref=f2e1986]
              - columnheader "内容" [ref=f2e1987]
            - row [ref=f2e1988]:
              - cell "利用目的の明示" [ref=f2e1989]
              - cell "「年末調整・源泉徴収票作成のため」など、番号を使う事務を本人へ通知・公表" [ref=f2e1990]
            - row [ref=f2e1991]:
              - cell "番号確認" [ref=f2e1992]
              - cell "提示された番号が正しいことを確認（マイナンバーカード・通知カード＋等）" [ref=f2e1993]
            - row [ref=f2e1994]:
              - cell "身元確認" [ref=f2e1995]
              - cell "番号の持ち主が本人であることを確認（顔写真付き証明書等。カードなら1枚で両方充足）" [ref=f2e1996]
            - row [ref=f2e1997]:
              - cell "安全管理措置" [ref=f2e1998]
              - cell "アクセス制限・暗号化・保管区域の管理・不要になった番号の廃棄など" [ref=f2e1999]
        - complementary [ref=f2e2000]:
          - generic [ref=f2e2001]: ENGINEER'S NOTE — 特定個人情報の秘匿管理と「最小権限」
          - text: マイナンバーを扱うシステムは、通常の個人情報とは別格の設計が要ります。要点を4つ。(1)
          - strong [ref=f2e2002]: 分離・暗号化保管
          - text: ——番号本体は業務DBと分け、暗号化して保管。画面表示は原則マスキング（下4桁のみ等）し、平文を扱えるのは必要な事務・必要な瞬間だけにする。(2)
          - strong [ref=f2e2003]: 最小権限とアクセスログ
          - text: ——誰が・いつ・どの番号を参照したかを全件ログ化。ロールで参照可否を絞り、開発者が本番の番号を見られない運用にする（マスキング済みテスト環境）。(3)
          - strong [ref=f2e2004]: ライフサイクル管理
          - text: ——法定保存期間を過ぎた番号は
          - strong [ref=f2e2005]: 確実に廃棄・削除
          - text: する。番号は「持ち続けるほどリスク」なので、保持期限を属性として持ち、自動失効させる。(4)
          - strong [ref=f2e2006]: 収集チャネルの本人確認
          - text: ——オンライン収集ではマイナンバーカードのICチップ読み取り（公的個人認証）で番号確認＋身元確認を一度に満たせる。扶養親族の番号は
          - strong [ref=f2e2007]: 本人が確認する
          - text: 建付け（会社は扶養親族本人の身元確認までは不要）である点も、収集フローの分岐として実装に効きます。特定個人情報保護は「集めない・見せない・残さない」を既定値にするのが、事故を構造的に防ぐ設計思想です。
        - heading "電子化 —— 紙の年末調整がデータになる" [level=3] [ref=f2e2008]
        - paragraph [ref=f2e2009]: 年末調整は長らく紙の申告書で回してきましたが、近年は電子化が進みました。全体像を、従業員側・会社側・行政側の3レイヤーで捉えると整理できます。
        - generic [ref=f2e2011]:
          - generic [ref=f2e2012]:
            - text: 従業員：年調ソフト等で申告書を電子作成
            - generic [ref=f2e2013]: 控除証明書は電子データ（XML）で取り込み → 控除額を自動計算
          - generic [ref=f2e2014]: ▼
          - generic [ref=f2e2015]:
            - text: 会社：申告データを電子的に受領し年末調整
            - generic [ref=f2e2016]: 源泉徴収票・給与支払報告書・法定調書を電子生成
          - generic [ref=f2e2017]: ▼
          - generic [ref=f2e2018]: 行政：e-Tax（税務署）／eLTAX（市区町村）で電子提出
        - paragraph [ref=f2e2019]: それぞれのピースを見ておきます。
        - list [ref=f2e2020]:
          - listitem [ref=f2e2021]:
            - strong [ref=f2e2022]: 年調ソフト
            - text: ：国税庁が無償提供する年末調整申告書作成ソフト。従業員が各種申告書（マル扶・マル保・マル基配所など＝第12章）を画面で作成し、控除額を自動計算して電子データで会社へ提出できます。
          - listitem [ref=f2e2023]:
            - strong [ref=f2e2024]: 電子的控除証明書
            - text: ：生命保険料控除・地震保険料控除・住宅ローン控除（残高証明）などの証明書を、保険会社・金融機関が
            - strong [ref=f2e2025]: 電子データ（XML）
            - text: で発行。従業員はマイナポータル等で受け取り、年調ソフトへ
            - strong [ref=f2e2026]: 読み込むだけで控除額が計算
            - text: されます。第8章で見た保険料控除の計算式を、人が転記せずデータが埋める形です。
          - listitem [ref=f2e2027]:
            - strong [ref=f2e2028]: e-Tax
            - text: ：国税（税務署）向けの電子申告・提出システム。法定調書・源泉徴収票（第17章）などを電子提出します。
          - listitem [ref=f2e2029]:
            - strong [ref=f2e2030]: eLTAX（エルタックス）
            - text: ：地方税向けの電子申告・提出システム。給与支払報告書（第16章）を各市区町村へ電子提出し、特別徴収税額決定通知も電子的に受領できます。
        - paragraph [ref=f2e2031]:
          - text: 電子化の意義は単なるペーパーレスではありません。
          - strong [ref=f2e2032]: 証明書の数値が人手を介さずデータで流れる
          - text: ことで、転記ミス（第25章で扱う実装の落とし穴の多くは転記由来）が構造的に減ります。控除証明書のXMLを読み込めば、第8章の生命保険料控除の新旧区分や計算式もソフトが判定してくれる。年末調整の電子化とは、
          - strong [ref=f2e2033]: これまで紙と人がつないでいた計算チェーンを、データで直結する
          - text: 取り組みなのです。
        - complementary [ref=f2e2034]:
          - generic [ref=f2e2035]: ENGINEER'S NOTE — 電子データ連携の3つのフォーマットとインポート設計
          - text: 年末調整プロダクトの電子化対応は、
          - strong [ref=f2e2036]: 複数の標準フォーマットを扱う統合基盤
          - text: の設計に帰着します。押さえどころを3つ。(1)
          - strong [ref=f2e2037]: 宛先ごとにフォーマットとエンドポイントが違う
          - text: ——控除証明書は保険会社発行の
          - strong [ref=f2e2038]: XML
          - text: 、税務署提出はe-Taxのレイアウト、市区町村提出はeLTAXのレイアウト。「年調結果」という単一の内部モデルから、各提出先の仕様へ
          - strong [ref=f2e2039]: 変換する出力アダプタ
          - text: を分離しておく（第24章の入力→計算→出力パイプラインの出力段）。(2)
          - strong [ref=f2e2040]: 控除証明書XMLは「検証してから信じる」
          - text: ——電子証明書には署名・発行者情報がある。取り込み時にスキーマ検証と改ざんチェックを通し、金額をそのまま控除計算の入力にする。ユーザーの手入力値とデータ取り込み値を区別できるよう、
          - strong [ref=f2e2041]: 入力ソースを属性として保持
          - text: すると監査で効く。(3)
          - strong [ref=f2e2042]: 年調ソフトの標準データとの相互運用
          - text: ——国税庁の年調ソフトが出力する申告データ形式に合わせておくと、自社UIで作った申告データと国税庁ソフトのデータを同じインポート経路で受けられる。電子化は「1つの内部モデル × 複数の外部フォーマット」という
          - strong [ref=f2e2043]: ハブ＆スポーク
          - text: で設計するのが、毎年の様式変更（第26章）にも耐える形です。
        - generic [ref=f2e2044]:
          - heading "理解度チェック" [level=3] [ref=f2e2045]
          - group [ref=f2e2046]:
            - generic "Q1. 源泉徴収票や給与支払報告書にマイナンバーを記載するのはなぜですか。" [ref=f2e2047] [cursor=pointer]
