      - heading "巻末 専門用語集" [level=2] [ref=f2e3089]
      - generic [ref=f2e3090]:
        - paragraph [ref=f2e3091]:
          - text: 本書の本文に登場する主要用語を五十音順にまとめました。本文中で 下線つきの語 をクリックすると、この用語集の該当項目へ飛びます。各項目末尾のリンクから詳しく解説した章へ戻れます。金額・要件を含む用語は改正の影響を受けるため、年分注記を付しています
          - generic [ref=f2e3092]: 令和7年分・令和8年分の別に注意
          - text: 。
        - generic [ref=f2e3093]:
          - term [ref=f2e3094]: 確定申告（かくていしんこく）
          - definition [ref=f2e3095]:
            - text: 納税者本人が1年分の所得と税額を計算し、翌年2/16〜3/15に税務署へ申告・精算する手続き。年末調整で処理できない医療費控除・寄附金控除（ふるさと納税）・初年の住宅ローン控除などは確定申告で行う。年末調整は「会社が行う簡易な精算」、確定申告は「本人が行う本来の精算」という関係。
            - generic [ref=f2e3096]:
              - text: 関連章：
              - link "第4章" [ref=f2e3097] [cursor=pointer]:
                - /url: "#ch4"
              - text: ／
              - link "第15章" [ref=f2e3098] [cursor=pointer]:
                - /url: "#ch15"
          - term [ref=f2e3099]: 課税所得（課税給与所得金額）
          - definition [ref=f2e3100]:
            - text: 税率をかける直前の金額。給与所得から所得控除の合計を差し引いて求める（給与所得者は「課税給与所得金額」）。ここに速算表の税率をかけて所得税額を算出する。「収入→所得→課税所得→税額」の3段目にあたる。
            - generic [ref=f2e3101]:
              - text: 関連章：
              - link "第1章" [ref=f2e3102] [cursor=pointer]:
                - /url: "#ch1"
              - text: ／
              - link "第10章" [ref=f2e3103] [cursor=pointer]:
                - /url: "#ch10"
          - term [ref=f2e3104]: 寡婦控除（かふこうじょ）
          - definition [ref=f2e3105]:
            - text: 夫と離婚・死別した後、一定の要件を満たす女性が受けられる人的控除（27万円）。ひとり親に該当する場合はひとり親控除が優先される。本人の合計所得金額500万円以下が要件。
            - generic [ref=f2e3106]:
              - text: 令和7年分時点。関連章：
              - link "第7章" [ref=f2e3107] [cursor=pointer]:
                - /url: "#ch7"
          - term [ref=f2e3108]: 給与所得控除（きゅうよしょとくこうじょ）
          - definition [ref=f2e3109]:
            - text: 給与収入から差し引く、会社員の「概算経費」にあたる控除。収入額に応じて段階的に増え、上限は195万円。最低保障額は令和7年分で65万円
            - generic [ref=f2e3110]: 令和8年分は特例で74万円
            - text: 。これを引いた残りが給与所得。
            - generic [ref=f2e3111]:
              - text: 関連章：
              - link "第5章" [ref=f2e3112] [cursor=pointer]:
                - /url: "#ch5"
          - term [ref=f2e3113]: 基礎控除申告書（マル基配所）
          - definition [ref=f2e3114]:
            - text: 正式には「基礎控除申告書 兼 配偶者控除等申告書 兼 特定親族特別控除申告書 兼 所得金額調整控除申告書」。4つの申告を1枚に統合した様式で、本人・配偶者・特定親族の所得や、所得金額調整控除の判定材料を集める。
            - generic [ref=f2e3115]:
              - text: 関連章：
              - link "第12章" [ref=f2e3116] [cursor=pointer]:
                - /url: "#ch12"
          - term [ref=f2e3117]: 勤労学生控除（きんろうがくせいこうじょ）
          - definition [ref=f2e3118]:
            - text: 働きながら学ぶ学生本人が受けられる人的控除（27万円）。合計所得金額が一定以下などの要件がある。
            - generic [ref=f2e3119]:
              - text: 令和7年分時点。関連章：
              - link "第7章" [ref=f2e3120] [cursor=pointer]:
                - /url: "#ch7"
          - term [ref=f2e3121]: 基礎控除（きそこうじょ）
          - definition [ref=f2e3122]:
            - text: すべての納税者が受けられる基本の所得控除。かつては一律だったが、近年は合計所得金額に応じて額が変わる関数になった。令和7年分は低所得帯で最大95万円、標準帯で58万円（本則）
            - generic [ref=f2e3123]: 令和8年分は本則62万円
            - text: 。高所得で逓減し消滅する。
            - generic [ref=f2e3124]:
              - text: 関連章：
              - link "第7章" [ref=f2e3125] [cursor=pointer]:
                - /url: "#ch7"
              - text: ／
              - link "第21章" [ref=f2e3126] [cursor=pointer]:
                - /url: "#ch21"
          - term [ref=f2e3127]: 甲欄／乙欄／丙欄（こうらん・おつらん・へいらん）
          - definition [ref=f2e3128]:
            - text: 月次の源泉徴収税額表の区分。
            - strong [ref=f2e3129]: 甲欄
            - text: は扶養控除等申告書を提出した主たる給与に適用（年末調整の対象）。
            - strong [ref=f2e3130]: 乙欄
            - text: は申告書未提出＝従たる給与に適用し高めに徴収（年末調整の対象外）。
            - strong [ref=f2e3131]: 丙欄
            - text: は日雇い・短期労働の日額表に適用。
            - generic [ref=f2e3132]:
              - text: 関連章：
              - link "第2章" [ref=f2e3133] [cursor=pointer]:
                - /url: "#ch2"
              - text: ／
              - link "第14章" [ref=f2e3134] [cursor=pointer]:
                - /url: "#ch14"
          - term [ref=f2e3135]: 控除対象扶養親族（こうじょたいしょうふようしんぞく）
          - definition [ref=f2e3136]:
            - text: 生計を一にする親族のうち、その年12/31時点で16歳以上・合計所得金額が要件以下の人。扶養控除の対象になる。うち19〜22歳は特定扶養親族（控除が手厚い）、70歳以上は老人扶養親族。
            - generic [ref=f2e3137]:
              - text: 令和7年分の所得要件は合計所得58万円以下。関連章：
              - link "第6章" [ref=f2e3138] [cursor=pointer]:
                - /url: "#ch6"
          - term [ref=f2e3139]: 合計所得金額（ごうけいしょとくきんがく）
          - definition [ref=f2e3140]:
            - text: 給与所得・事業所得など各種所得を合計した金額（純損失等の繰越控除前）。扶養・配偶者控除や基礎控除の適用可否・控除額を決める最重要の判定基準。似た概念に「総所得金額等」があり、繰越控除の扱いが異なる。
