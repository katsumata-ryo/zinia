          - term [ref=f2e3212]: 徴収義務者（ちょうしゅうぎむしゃ）
          - definition [ref=f2e3213]:
            - text: 給与から源泉徴収し、原則翌月10日までに国へ納付する義務を負う者。通常は給与を支払う会社。計算・徴収・納付の責任を国から委ねられており、誤りは納税額の誤りに直結する。
