      - generic [ref=f2e1493]:
        - heading "第14章 中途入社・退職・複数勤務" [level=2] [ref=f2e1494]
        - generic [ref=f2e1495]:
          - strong [ref=f2e1496]: この章の位置づけ：
          - text: ここまでは「1年間1か所で働いた人」を暗黙の前提にしてきました。現実には転職・退職・掛け持ちがあります。この章は年末調整の
          - strong [ref=f2e1497]: 例外・境界
          - text: を扱います。鍵は一つ——
          - strong [ref=f2e1498]: 年税額はその人の1年分の給与を合算して計算する
          - text: という原則です。中途入社の田中さんを主役に、前職合算・乙欄・対象外パターンを整理します。第4章の対象者判定を、具体的なケースで深掘りする章です。
        - paragraph [ref=f2e1499]:
          - text: 所得税は
          - strong [ref=f2e1500]: 暦年（1月1日〜12月31日）単位
          - text: で、その人の1年間の所得全体に課されます。勤務先が何社あっても、税額の計算単位はあくまで「個人の1年分」。この一点さえ握れば、以下のケースはすべて同じ原則の派生だと分かります。
        - heading "中途入社 —— 前職源泉徴収票の合算" [level=3] [ref=f2e1501]
        - paragraph [ref=f2e1502]:
          - text: 年の途中で転職し、年末に在籍している人は、
          - strong [ref=f2e1503]: 現勤務先が前職分も合算して年末調整
          - text: します。田中さん（当年6月に中途入社／現勤務先380万円＋前職90万円）で見ましょう
          - generic [ref=f2e1504]: 令和7年分時点
          - text: 。
        - generic [ref=f2e1506]:
          - generic [ref=f2e1507]:
            - text: 前職の給与 3,800,000円ではなく…
            - generic [ref=f2e1508]: 前職 900,000円 ＋ 現勤務先 3,800,000円
          - generic [ref=f2e1509]: ▼
          - generic [ref=f2e1510]:
            - text: 合算した収入 4,700,000円
            - generic [ref=f2e1511]: これを一つの年収として給与所得控除を計算（第5章）
          - generic [ref=f2e1512]: ▼
          - generic [ref=f2e1513]: 前職の源泉徴収税額も合算し、年調年税額との差を精算
        - paragraph [ref=f2e1514]:
          - text: ここで
          - strong [ref=f2e1515]: 前職の源泉徴収票が必須
          - text: になります。現勤務先は前職の「支払金額」と「源泉徴収税額」を知らないと、①1年分の収入を合算できず、②既に前職で天引きされた税額を過不足計算に組み込めないからです。第5章で「380万と90万を別々に計算せず合算した470万を速算表に当てる」と述べたのは、この合算のこと。もし前職の源泉徴収票が年末までに間に合わなければ、現勤務先だけでは年末調整できず、本人が
          - strong [ref=f2e1516]: 確定申告
          - text: で合算することになります（第15章）。前職分を落とすと年収が過少になり、年税額が過小に出て後で追徴——という事故につながるため、実務では回収が最重要事項です。
        - heading "乙欄 —— 掛け持ちの「従たる給与」" [level=3] [ref=f2e1517]
        - paragraph [ref=f2e1518]:
          - text: 2か所以上で働く人は、第2章で見たとおりマル扶を
          - strong [ref=f2e1519]: 主たる1社にだけ
          - text: 提出します。マル扶を出した会社は甲欄で徴収し年末調整を行いますが、出していない会社（従たる給与）は
          - strong [ref=f2e1520]: 乙欄
          - text: で高めに源泉徴収し、
          - strong [ref=f2e1521]: 年末調整はしません
          - text: 。なぜ高めか——その人の所得全体を把握しているのは主たる勤務先だけで、従たる側は「上乗せ分に高い率がかかる」前提で多めに取っておく方が、本人が取りっぱぐれ（追徴不能）になりにくいからです。乙欄の人は複数の給与を自分で合算して
          - strong [ref=f2e1522]: 確定申告
          - text: で精算します。田中さんは1か所勤務・甲欄なので乙欄には当たりませんが、もし副業で別の会社からも給与を得ていれば、その副業分は乙欄徴収＋確定申告、という形になります。
        - heading "退職 —— 対象になる退職・ならない退職" [level=3] [ref=f2e1523]
        - paragraph [ref=f2e1524]:
          - text: 年の途中で退職した人は、原則として
          - strong [ref=f2e1525]: 年末調整の対象外
          - text: です。年末時点で在籍していないため、その会社では1年分を締められないから。再就職すれば新しい勤務先が前職（この会社）分を合算して年末調整し、再就職しなければ本人が確定申告で精算します。ただし例外的に、退職時点で会社が年末調整すべきケースがあります。
        - table [ref=f2e1527]:
          - rowgroup [ref=f2e1528]:
            - row [ref=f2e1529]:
              - columnheader "退職のパターン" [ref=f2e1530]
              - columnheader "年末調整" [ref=f2e1531]
