          - text: を年度パラメータ付きで分け、様式はその真偽で表示を切り替える。こうしておけば、令和8年の「源泉控除対象親族＝控除対象扶養親族＋特定親族のうち合計所得100万円以下」という定義変更も、判定関数1本の差し替えで吸収できます。マル基配所の4控除も、共通の所得見積りエンティティに対する4つの判定として実装すると重複が消えます。フォームを増やすのではなく、判定を年度で切り替える——これが毎年改正への設計原則（第26章）です。
