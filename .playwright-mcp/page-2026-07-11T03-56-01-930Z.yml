        - heading "第17章 法定調書" [level=2] [ref=f2e1755]
        - generic [ref=f2e1756]:
          - strong [ref=f2e1757]: この章の位置づけ：
          - text: 第16章では年末調整データが市区町村へ流れる経路を見ました。この章は
          - strong [ref=f2e1758]: 税務署
          - text: へ流れる経路です。源泉徴収票もじつは「法定調書」という大きな書類群の一種。会社は年末調整の結果を、
          - strong [ref=f2e1759]: 法定調書合計表
          - text: という一枚のサマリーとともに税務署へ提出します。ただし源泉徴収票は
          - strong [ref=f2e1760]: 全員分を出すわけではない
          - text: ——ここに金額基準による提出範囲のルールがあります。年末調整の成果物が国へ渡る「最後の一歩」を押さえます。
        - paragraph [ref=f2e1761]:
          - strong [ref=f2e1762]: 法定調書
          - text: とは、税法によって税務署への提出が義務づけられた資料の総称です。「誰が誰にいくら払ったか」を国が把握するための情報で、種類は多数（令和時点で数十種類）あります。会社が年末調整に関連して扱う代表格が、
          - strong [ref=f2e1763]: 給与所得の源泉徴収票
          - text: と、それらを束ねる
          - strong [ref=f2e1764]: 給与所得の源泉徴収票等の法定調書合計表
          - text: です。年末調整は「会社の中で税額を確定する工程」ですが、その結果を
          - strong [ref=f2e1765]: 国が名寄せ・照合できる形で提出する
          - text: ところまでが制度の全体像です。
        - heading "法定調書合計表 —— 提出物の「表紙」" [level=3] [ref=f2e1766]
        - paragraph [ref=f2e1767]:
          - text: 法定調書合計表は、その会社が1年間に支払った給与・報酬などの
          - strong [ref=f2e1768]: 総額と人数を集計したサマリー
          - text: です。個々の源泉徴収票や支払調書を束ねる表紙にあたり、翌年1月31日までに税務署へ提出します。「支払った給与の総額」「源泉徴収した税額の総額」「うち源泉徴収票を添付する人数」などを記載し、税務署は会社の納付実績とこの合計表を突き合わせます。年末調整で確定した会社全体の数字が、ここで一枚に集約されるイメージです。
        - heading "源泉徴収票の税務署提出範囲 —— 全員分ではない" [level=3] [ref=f2e1769]
        - paragraph [ref=f2e1770]:
          - text: 従業員
          - strong [ref=f2e1771]: 本人
          - text: には全員に源泉徴収票を交付します（第13章）。しかし
          - strong [ref=f2e1772]: 税務署へ
          - text: 提出する源泉徴収票は、一定の金額基準を超える人に限られます。国はすべての給与所得者を把握する必要はなく、金額の大きい人や年末調整をしていない人を重点的に捕捉すれば足りるからです。主な基準は次のとおりです
          - generic [ref=f2e1773]: 令和7年分時点。金額基準は改正され得るため提出前に国税庁の最新様式・手引で確認すること。
          - text: 。
