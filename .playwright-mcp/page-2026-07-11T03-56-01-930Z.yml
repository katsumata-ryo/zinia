          - term [ref=f2e3253]: 非居住者（ひきょじゅうしゃ）
          - definition [ref=f2e3254]:
            - text: 国内に住所がなく、かつ現在まで引き続き1年以上居所がない個人。国外に住む親族を扶養控除等の対象とする場合は、送金関係書類や親族関係書類など追加の証明が必要になる。
