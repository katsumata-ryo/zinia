      - generic [ref=f2e1646]:
        - heading "第16章 住民税との連携" [level=2] [ref=f2e1647]
        - generic [ref=f2e1648]:
          - strong [ref=f2e1649]: この章の位置づけ：
          - text: ここまでは「所得税」の話でした。しかし年末調整で会社が集めたデータは、所得税だけでなく
          - strong [ref=f2e1650]: 住民税
          - text: の計算にも使われます。むしろ従業員から見れば、翌年6月から毎月の給与天引きが変わるのは住民税の方。この章では、年末調整の結果が
          - strong [ref=f2e1651]: 給与支払報告書
          - text: という形で市区町村へ流れ、
          - strong [ref=f2e1652]: 翌年度の住民税
          - text: として課税され、
          - strong [ref=f2e1653]: 特別徴収
          - text: で天引きされるまでの経路を追います。第13章の源泉徴収票と「ほぼ同じ様式の別の書類」が、税務署ではなく市区町村へ向かう——その一点が出発点です。
        - paragraph [ref=f2e1654]:
          - text: 所得税と住民税は
          - strong [ref=f2e1655]: 別の税金
          - text: です。所得税は国税（納付先は国＝税務署）、住民税は地方税（納付先は市区町村と都道府県）。にもかかわらず、両者は
          - strong [ref=f2e1656]: 同じ「所得」と「所得控除」の情報
          - text: をベースに計算されます。だから会社は、年末調整で一度集めた申告データを、
          - strong [ref=f2e1657]: 税務署向け
          - text: と
          - strong [ref=f2e1658]: 市区町村向け
          - text: の二方向に流します。この二又の分岐を押さえるのが本章の核です。
        - heading "源泉徴収票と給与支払報告書 —— 同じ中身、違う宛先" [level=3] [ref=f2e1659]
        - paragraph [ref=f2e1660]:
          - text: 第13章で見た源泉徴収票は、従業員本人と税務署へ渡す書類でした。これと
          - strong [ref=f2e1661]: ほぼ同じ様式・同じ記載内容
          - text: で、宛先を市区町村にしたものが
          - strong [ref=f2e1662]: 給与支払報告書（個人別明細書）
          - text: です。会社は翌年1月31日までに、従業員が1月1日時点で住む市区町村へこれを提出します。支払金額・給与所得控除後の金額・所得控除の合計・扶養親族の情報など、記載項目は源泉徴収票とそろっています。
        - generic [ref=f2e1664]:
          - generic [ref=f2e1665]:
            - text: 年末調整で確定した1年分のデータ
            - generic [ref=f2e1666]: 支払金額・所得控除・扶養情報など（第13章の源泉徴収簿の成果）
          - generic [ref=f2e1667]: ▼
          - generic [ref=f2e1668]:
            - text: 同じ中身を宛先違いで2通に分岐
            - generic [ref=f2e1669]: 源泉徴収票 → 税務署／本人 給与支払報告書 → 市区町村
          - generic [ref=f2e1670]: ▼
          - generic [ref=f2e1671]: 市区町村が受け取り、翌年度の住民税を計算
        - paragraph [ref=f2e1672]:
          - text: ポイントは
          - strong [ref=f2e1673]: 提出先の判定基準日が「1月1日」
          - text: だという点です。住民税は「その年の1月1日に住んでいた自治体」が課税します。年末調整は12月31日時点の現況で所得税を締めますが（第13章）、給与支払報告書の宛先は年明け1月1日の住所地。ほんの数日ずれた二つの基準日が、それぞれ別の税を規定しているわけです。
        - heading "翌年度課税 —— 住民税は「後払い」で効いてくる" [level=3] [ref=f2e1674]
        - paragraph [ref=f2e1675]:
          - text: 住民税の最大の特徴は
          - strong [ref=f2e1676]: 後払い（前年所得課税）
          - text: である点です。所得税はその年の所得にその年のうちに課され、年末調整で精算されます。ところが住民税は、
          - strong [ref=f2e1677]: ある年の所得を、翌年度に課税
          - text: します。佐藤さん（年収620万円）で見ましょう。
