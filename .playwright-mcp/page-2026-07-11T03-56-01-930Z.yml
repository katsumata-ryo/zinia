          - text: は、本人・同一生計配偶者・扶養親族が障害者である場合の控除です。ここで大事なのは、
          - strong [ref=f2e891]: 16歳未満の子でも障害者控除は受けられる
          - text: 点。扶養控除は16歳未満は対象外でしたが、障害者控除は別枠なので年齢下限がありません。
