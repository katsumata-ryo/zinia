        - paragraph [ref=f2e1735]:
          - text: 決定的な違いは
          - strong [ref=f2e1736]: 税額を誰が計算するか
          - text: です。所得税は会社が年末調整で自ら計算しますが、住民税は
          - strong [ref=f2e1737]: 市区町村が計算して会社へ「この額を天引きしてください」と通知
          - text: してきます（特別徴収税額決定通知書）。会社は住民税額を計算しません。給与支払報告書というデータを渡し、計算された結果を受け取って天引きするだけ。年末調整の役割は「住民税計算の入力データを市区町村へ供給すること」までなのです。
        - complementary [ref=f2e1738]:
          - generic [ref=f2e1739]: ENGINEER'S NOTE — eLTAX連携と「2つの基準日」のモデル化
          - text: 住民税連携は、年末調整プロダクトが
          - strong [ref=f2e1740]: 行政システムと直結する
          - text: 数少ない領域です。実装の勘所を3点。(1)
          - strong [ref=f2e1741]: 給与支払報告書は源泉徴収票の派生データではなく別エンティティ
          - text: ——中身は9割共通でも、宛先（市区町村コード）・提出先判定基準日（1/1住所）・提出単位（総括表＋個人別明細書）が異なる。源泉徴収票のオブジェクトを使い回すのではなく、
          - strong [ref=f2e1742]: 共通の年調結果から2つの帳票を生成する
          - text: 設計にする。提出は
          - strong [ref=f2e1743]: eLTAX
          - text: （地方税ポータル）経由の電子データ（レイアウトはeLTAX仕様のCSV/XML）で、税務署向けのe-Tax／法定調書とはフォーマットもエンドポイントも別（第17章・第19章）。(2)
          - strong [ref=f2e1744]: 2つの基準日を別カラムで持つ
          - text: ——12/31時点の現況（所得税の判定）と、1/1時点の住所（給与支払報告書の宛先）を混同すると、年末に転居した従業員の報告書が誤った自治体へ飛ぶ。(3)
          - strong [ref=f2e1745]: 特別徴収税額決定通知の取り込み
          - text: ——住民税額は自社では計算せず、市区町村から届く通知（近年はeLTAXで電子的に受領可能）をパースして給与天引きマスタへ反映する。この「投げるデータ（給与支払報告書）」と「受け取るデータ（決定通知）」の非対称なペアを、住民税の年間サイクルとしてモデル化するのが破綻しないコツです。
