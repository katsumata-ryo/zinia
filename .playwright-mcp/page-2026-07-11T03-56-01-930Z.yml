          - term [ref=f2e3208]: 速算表（そくさんひょう）
          - definition [ref=f2e3209]:
            - text: 課税所得金額から所得税額を「課税所得×税率−控除額」で一度に計算できる表。累進税率の各段階を階段状に足し上げる代わりに、一発で算出できるよう変換したもの。
