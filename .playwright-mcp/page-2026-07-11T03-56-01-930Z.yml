          - definition [ref=f2e3164]:
            - text: 住宅ローンを組んでマイホームを取得等した場合に、年末残高の一定割合を
            - strong [ref=f2e3165]: 税額から
            - text: 直接差し引く税額控除。初年は確定申告が必須、2年目以降は残高証明書を添えて年末調整で処理できる。
            - generic [ref=f2e3166]:
              - text: 近年は控除率0.7%・原則13年。関連章：
