          - generic "Q3. 令和8年11月30日までに最後の給与を支払った退職者は、改正後の基礎控除等を年末調整で受けられますか。" [ref=f2e2427] [cursor=pointer]
      - generic [ref=f2e2428]:
        - heading "第23章 これからの年末調整" [level=2] [ref=f2e2429]
        - generic [ref=f2e2430]:
          - strong [ref=f2e2431]: この章の位置づけ：
          - text: 第20章で過去を、第21・22章で現在の改正をたどってきました。第5部の締めくくりとなるこの章は、視線を
          - strong [ref=f2e2432]: これから
          - text: へ向けます。物価連動という新しい仕組み、電子化の行き着く先、そして「そもそも年末調整は必要か」という不要論。いずれも確定した未来ではなく
          - strong [ref=f2e2433]: 論点
          - text: ですが、第20章で見た「精算主体は誰か」という日本型の特殊性が、これからどう組み替わりうるかを考える材料になります。エンジニアとして、自分たちのプロダクトがどの方向へ押されるかを見通すための章です。
        - paragraph [ref=f2e2434]:
          - text: この章は制度の「方向性」を扱います。物価連動の一部は令和7・8年改正で現実に導入されましたが、将来の見直し・デジタル化・不要論の帰趨は
          - strong [ref=f2e2435]: 未確定の論点
          - text: です。確定情報として読まないでください。断定を避け、議論の構造を示すにとどめます。
        - heading "1. 物価連動の仕組み —— 課税最低限が「自動で動く」時代へ" [level=3] [ref=f2e2436]
        - paragraph [ref=f2e2437]:
          - text: 令和7・8年の改正でもっとも構造的に新しいのは、金額の引上げそのものより
          - strong [ref=f2e2438]: 「物価に連動して課税最低限を動かす」という発想が制度に持ち込まれた
          - text: ことです（第22章の基礎控除+4万円の物価スライド）。従来、基礎控除などの金額は長く据え置かれ、政治的な決断があって初めて改定されてきました。その結果、物価や賃金が上がっても控除額が据え置かれ、実質的な増税（＝課税最低限の目減り）が静かに進む、という問題が積み重なっていました。「103万円の壁」が何十年も動かなかったのは、その典型です。
        - paragraph [ref=f2e2439]:
          - text: 物価連動は、この目減りを
          - strong [ref=f2e2440]: 自動的に補正する
          - text: という考え方です。諸外国では、控除額や税率区分を物価指数に合わせて毎年スライドさせる「インフレ調整（インデクセーション）」を制度化している国もあります。日本がその方向へ本格的に舵を切るかはまだ論点ですが、令和7・8年改正はその入口に立ったと言えます。
        - complementary [ref=f2e2441]:
          - generic [ref=f2e2442]: ENGINEER'S NOTE — 物価連動は「パラメータが毎年動く」を常態化する
          - text: 物価連動が制度化されると、私たちのプロダクトにとっては
          - strong [ref=f2e2443]: 「控除額は毎年必ず変わる前提」
          - text: が確定します。これは設計方針を大きく後押しします。第26章で扱う「年度パラメータ化」は、これまで
          - strong [ref=f2e2444]: 改正がある年だけの備え
          - text: でしたが、物価連動時代には
          - strong [ref=f2e2445]: 毎年更新される外部データを取り込む常設のパイプライン
          - text: へと格上げされます。金額をコードに埋め込む選択肢は完全に消え、「年度×合計所得区分×本則/特例」のテーブルを
          - strong [ref=f2e2446]: データとして差し替える
          - text: 設計が唯一の正解になります。連動の基準（どの物価指数を、いつの時点で参照するか）まで仕様化される可能性があり、その場合は基準指標そのものもパラメータとして持つことになります。改正対応が「イベント」から「定常運用」へ変わる——これが物価連動の実装的な含意です。
        - heading "2. デジタル化の方向性 —— 紙からデータへ、そして名寄せへ" [level=3] [ref=f2e2447]
        - paragraph [ref=f2e2448]: 第19章で見たとおり、年末調整はマイナンバー・年調ソフト・電子的控除証明書・e-Tax／eLTAXによって、紙からデータへ移りつつあります。この流れの先に何があるか。方向性は大きく2段階で考えられます。
        - list [ref=f2e2449]:
          - listitem [ref=f2e2450]:
            - strong [ref=f2e2451]: 第1段階：社内手続きの電子化（現在進行中）
            - text: 。従業員が申告書をオンラインで入力し、保険会社等の控除証明書をXMLデータで自動取り込みし、会社が電子データで提出する。手入力と転記のミスを減らし、証明書の突合を自動化する段階です。
          - listitem [ref=f2e2452]:
            - strong [ref=f2e2453]: 第2段階：行政側でのデータ連携・名寄せ
            - text: 。マイナンバーを軸に、給与・保険料・年金などのデータが行政側で名寄せされ、控除の多くが
            - strong [ref=f2e2454]: あらかじめ埋まった状態
            - text: で提示される——いわゆる「記入済み申告（プレフィルド）」の世界です。第20章で見たイギリス型（当局が精算主体）に近づく方向とも言えます。
        - paragraph [ref=f2e2455]:
          - text: 第2段階が進むと、年末調整というイベントの重心が
          - strong [ref=f2e2456]: 「会社が計算する」から「行政が持つデータを本人が確認する」
          - text: へ移っていく可能性があります。ここが次の不要論と直結します。
        - heading "3. 年末調整不要論 —— 論点を整理する" [level=3] [ref=f2e2457]
        - paragraph [ref=f2e2458]:
          - text: 近年、「年末調整を廃止して各人の確定申告に一本化すべきだ」という議論が繰り返し提起されます。感情論になりがちなテーマなので、
          - strong [ref=f2e2459]: 賛否の論点を構造として
          - text: 並べておきます。特定の立場を推奨するものではありません。
        - table [ref=f2e2461]:
          - rowgroup [ref=f2e2462]:
            - row [ref=f2e2463]:
              - columnheader "観点" [ref=f2e2464]
              - columnheader "不要論（廃止・申告一本化）の主張" [ref=f2e2465]
              - columnheader "存続論の主張" [ref=f2e2466]
