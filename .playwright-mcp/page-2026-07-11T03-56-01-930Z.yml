          - term [ref=f2e3204]: 総所得金額等（そうしょとくきんがくとう）
          - definition [ref=f2e3205]:
            - text: 合計所得金額から純損失・雑損失などの繰越控除を差し引いた後の金額。医療費控除や寄附金控除の限度額計算などで用いる。合計所得金額と混同しやすいが、繰越控除の反映有無で異なる。
