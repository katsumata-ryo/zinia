          - text: ／第2章）。その毎月の天引きはあくまで概算にすぎません。
          - strong [ref=f2e293]: 年末に、この地図の①〜⑥を正確にたどり直して本当の年税額を確定し、毎月の概算合計との差額を精算する
          - text: ——それが年末調整です（第3章）。つまり本書全体は、この一枚の地図の各ステージを一つずつ精密化していく旅、と考えてください。
