          - term [ref=f2e3180]: 所得金額調整控除（しょとくきんがくちょうせいこうじょ）
          - definition [ref=f2e3181]:
            - text: 給与収入850万円超で、23歳未満の扶養親族がいる、または本人・扶養親族等が特別障害者などの要件を満たす場合に、給与所得を追加で圧縮する控除。給与所得控除の上限で不利になる子育て・介護世帯への配慮。
