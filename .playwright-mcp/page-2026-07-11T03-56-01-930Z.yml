        - paragraph [ref=f2e1197]:
          - text: 鈴木さんの生命保険料・社会保険料などは第8章の考え方に沿った想定額です。ここで見てほしいのは
          - strong [ref=f2e1198]: 金額そのものより順序と丸め
          - text: 。①で課税所得を1,000円未満切り捨て、速算表で算出税額を出し、②で2.1%を上乗せしてから③で100円未満切り捨て——この順序を1か所でも入れ替えると、最終額が数百円ずれます。
        - heading "計算例B：佐藤健太さん（税額控除で税額が消える）" [level=3] [ref=f2e1199]
        - paragraph [ref=f2e1200]:
          - text: 対照的に佐藤さん（給与収入620万円）を見ます
          - generic [ref=f2e1201]: 令和7年分
          - text: 。給与所得452万円から、基礎控除68万＋配偶者控除38万＋扶養控除（葵）38万＋社会保険料控除93万＋生命保険料控除6.5万＋地震保険料控除3万＋iDeCo27.6万＝
          - strong [ref=f2e1202]: 所得控除計274.1万円
          - text: を引くと、
        - table [ref=f2e1204]:
