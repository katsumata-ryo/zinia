                - /url: "#ch15"
          - term [ref=f2e3244]: 配偶者控除（はいぐうしゃこうじょ）
          - definition [ref=f2e3245]:
            - text: 生計を一にし合計所得金額が要件以下の配偶者がいる場合の人的控除。本人（納税者）の合計所得金額が900万円を超えると逓減し、1,000万円超で消滅する。本人・配偶者双方の所得で二次元に判定する。
