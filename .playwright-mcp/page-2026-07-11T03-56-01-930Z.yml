              - cell [ref=f2e630]:
                - strong [ref=f2e631]: 452万円
            - row [ref=f2e632]:
              - cell "田中由紀" [ref=f2e633]
              - cell "470万円（現380＋前職90の合算）" [ref=f2e634]
              - cell "470 × 20% ＋ 44 ＝ 138万円" [ref=f2e635]
              - cell [ref=f2e636]:
                - strong [ref=f2e637]: 332万円
            - row [ref=f2e638]:
              - cell "鈴木三郎" [ref=f2e639]
              - cell "1,050万円" [ref=f2e640]
              - cell "195万円（上限）" [ref=f2e641]
              - cell [ref=f2e642]:
                - strong [ref=f2e643]: 855万円
        - paragraph [ref=f2e644]:
          - text: 田中さんのように年の途中で転職した人は、
          - strong [ref=f2e645]: 前職の給与も合算した年収
          - text: で給与所得控除を計算します（前職源泉徴収票の合算は第14章）。380万円と90万円を別々に計算するのではなく、合算した470万円を一つの収入として速算表に当てるのがポイントです。鈴木さんは収入が850万円を超えているので、控除は上限の195万円で頭打ちになります。
        - heading "所得金額調整控除 ——「増えない層」への調整" [level=3] [ref=f2e646]
        - paragraph [ref=f2e647]:
          - text: 給与所得控除の上限195万円は、平成30年改正で導入されました。しかし単純に上限を設けると、「収入は高いが、子育てや介護で出費がかさむ世帯」まで一律に不利になってしまいます。そこで、
          - strong [ref=f2e648]: 収入850万円超でも一定の事情がある人には、負担増を和らげる
          - text: ために設けられたのが
          - link "所得金額調整控除" [ref=f2e649] [cursor=pointer]:
            - /url: "#g-shotokuchosei"
          - text: （子ども・特別障害者等がある場合）です。
        - paragraph [ref=f2e650]: 給与収入が850万円を超え、かつ次のいずれかに当てはまる人が対象です。
        - list [ref=f2e651]:
          - listitem [ref=f2e652]:
            - text: 本人が
            - strong [ref=f2e653]: 特別障害者
          - listitem [ref=f2e654]:
            - strong [ref=f2e655]: 23歳未満の扶養親族
            - text: がいる（＝子育て世帯）
          - listitem [ref=f2e656]:
            - text: 特別障害者である
            - strong [ref=f2e657]: 同一生計配偶者または扶養親族
            - text: がいる
        - paragraph [ref=f2e658]: 控除額は次の式で、上限15万円です。
        - table [ref=f2e660]:
          - rowgroup [ref=f2e661]:
            - row [ref=f2e662]:
              - cell "所得金額調整控除額 ＝ ｛min(給与収入, 1,000万円) − 850万円｝ × 10%" [ref=f2e663]
        - paragraph [ref=f2e664]:
          - text: 鈴木三郎さん（収入1,050万円）は、21歳の長男・大輔さん（23歳未満の扶養親族）がいるため対象です。
          - code [ref=f2e665]: (1,000万 − 850万) × 10% ＝ 15万円
          - text: （収入は1,000万円で頭打ち）。先ほどの給与所得855万円から、さらにこの15万円を引いた
          - strong [ref=f2e666]: 840万円
          - text: が、鈴木さんの調整後の給与所得になります。佐藤さん・田中さんは収入が850万円以下なので、この控除は関係ありません。
        - paragraph [ref=f2e667]: もう一種類、「給与所得と年金所得の両方がある人」向けの所得金額調整控除もありますが、こちらは年末調整では処理できず確定申告が必要です。年末調整で扱うのは上記の「子ども・特別障害者等」の類型だけです。
        - complementary [ref=f2e668]:
          - generic [ref=f2e669]: ENGINEER'S NOTE — 給与所得控除は「表」、所得金額調整控除は「条件付きの式」
          - text: 実装の勘所を3つ。(1)
          - strong [ref=f2e670]: 給与所得控除は区分ごとの一次式のテーブル
          - text: として持つ。収入が区分の境界（190万・360万・660万・850万）にちょうど乗るときの「以下／超」の判定を1円単位で正しく実装すること。境界値テストは必須です。(2) 給与収入660万円未満は厳密には別表第五（円単位の階段表）ですが、速算表との差は限定的。プロダクトの要件に応じてどちらを正とするか仕様で固定します。(3)
          - strong [ref=f2e671]:
            - text: 所得金額調整控除は「850万円超」ゲート＋扶養・障害の条件判定＋
            - code [ref=f2e672]: min(収入,1000万)
            - text: のクランプ
          - text: という多段の分岐。特に扶養親族の年齢（23歳未満）は
          - strong [ref=f2e673]: その年12月31日時点
          - text: で判定します。給与所得控除を引く前の「収入」を条件に使い、控除額の計算にも「収入」を使う——第1章で警告した
          - code [ref=f2e674]: income
          - text: と
          - code [ref=f2e675]: shotoku
          - text: の変数取り違えが起きやすい典型箇所です。年度で変わる金額（65万／74万、上限195万など）はすべて年度パラメータに外出しを（第26章）。
        - generic [ref=f2e676]:
          - heading "理解度チェック" [level=3] [ref=f2e677]
          - group [ref=f2e678]:
            - generic "Q1. 会社員の「給与所得」はどう計算しますか。なぜ実際の経費を集計しないのですか。" [ref=f2e679] [cursor=pointer]
          - group [ref=f2e680]:
            - generic "Q2. 給与収入620万円（令和7年分）の給与所得はいくらですか。" [ref=f2e681] [cursor=pointer]
          - group [ref=f2e682]:
            - generic "Q3. 所得金額調整控除（子ども等）は誰が対象で、いくら引けますか。鈴木さん（収入1,050万円・21歳の子あり）で計算してください。" [ref=f2e683] [cursor=pointer]
      - generic [ref=f2e684]:
        - heading "第6章 人的控除(1) 扶養まわり" [level=2] [ref=f2e685]
        - generic [ref=f2e686]:
          - strong [ref=f2e687]: この章の位置づけ：
          - text: ここからは所得控除の本体に入ります。所得控除は大きく「人的控除（家族や本人の事情）」と「物的控除（支払った保険料など）」に分かれます。本章は前者のうち
          - strong [ref=f2e688]: 家族に関する控除
          - text: ——扶養控除、配偶者控除・配偶者特別控除、そして令和7年創設の
          - strong [ref=f2e689]: 特定親族特別控除
          - text: を扱います。どれも「養う家族がいる人は担税力が下がる」という同じ思想の変奏です。金額を暗記するのではなく、まず全控除に共通する2つの判定概念——
          - strong [ref=f2e690]: 合計所得金額
          - text: と
          - strong [ref=f2e691]: 生計を一にする
          - text: ——を先に押さえます。
        - heading "まず共通言語：「合計所得金額」と「生計を一にする」" [level=3] [ref=f2e692]
        - paragraph [ref=f2e693]:
          - text: 扶養控除も配偶者控除も、「その家族が
          - strong [ref=f2e694]: 扶養される側の条件
          - text: を満たすか」で適用が決まります。その条件の中心が
          - link "合計所得金額" [ref=f2e695] [cursor=pointer]:
            - /url: "#g-goukei"
          - text: です。ざっくり言えば「その人自身の1年間のもうけの合計」。給与だけの人なら、第5章で見た
          - strong [ref=f2e696]: 給与収入 − 給与所得控除（最低65万円）
          - text: がそのまま合計所得金額です。だから「給与収入◯万円まで」と「合計所得◯万円まで」は、給与所得控除の分だけズレた同じことを言っています。
        - paragraph [ref=f2e697]:
          - text: 令和7年改正で、扶養親族・同一生計配偶者の
          - strong [ref=f2e698]: 合計所得金額の要件が48万円以下 → 58万円以下
          - text: に引き上げられました。給与収入だけなら
          - strong [ref=f2e699]: 103万円 → 123万円
          - text: に相当します（103万＝48万＋旧給与所得控除55万、123万＝58万＋新65万）。これが「103万円の壁が動いた」の中身です。令和8年分はさらに62万円以下（本章の計算例は令和7年分）。
        - paragraph [ref=f2e700]:
          - text: もう一つが
          - link "生計を一にする" [ref=f2e701] [cursor=pointer]:
            - /url: "#g-seikei"
          - text: 。同居していなくても、仕送りなどで
          - strong [ref=f2e702]: 生活の財布が実質的につながっていれば
          - text: 「生計を一にする」と扱われます。単身赴任の親、下宿の大学生の子、仕送りしている田舎の親などが典型。逆に同居していても財布が完全に独立していれば別。田中由紀さんが実家の弟に仕送りしているケースは、別居でも「生計を一にする」に当たり得ます。
        - heading "扶養控除 —— 年齢で額が変わる" [level=3] [ref=f2e703]
        - paragraph [ref=f2e704]:
          - link "扶養控除" [ref=f2e705] [cursor=pointer]:
            - /url: "#g-fuyou"
          - text: は、配偶者以外の親族（子・親など）を養っている場合の控除です。対象になるのは
          - strong [ref=f2e706]: 控除対象扶養親族
          - text: ——生計を一にし、合計所得金額が58万円以下
          - generic [ref=f2e707]: 令和7年分
          - text: で、かつ
          - strong [ref=f2e708]: その年12月31日時点で16歳以上
          - text: の親族です。16歳未満の子は児童手当があるため扶養控除の対象外（ただし障害者控除や住民税の非課税判定では意味を持つので申告書には書きます）。年齢で額が変わります。
        - table [ref=f2e710]:
          - rowgroup [ref=f2e711]:
            - row [ref=f2e712]:
              - columnheader "区分" [ref=f2e713]
              - columnheader "年齢（12/31時点）" [ref=f2e714]
              - columnheader "控除額" [ref=f2e715]
            - row [ref=f2e716]:
