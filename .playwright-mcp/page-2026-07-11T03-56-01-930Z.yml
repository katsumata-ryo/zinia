        - heading "「徴収義務者」であることの意味" [level=3] [ref=f2e347]
        - paragraph [ref=f2e348]:
          - text: ここが源泉徴収制度の肝です。天引きして国に納める義務を負うのは、給与を受け取る従業員ではなく、
          - strong [ref=f2e349]: 給与を支払う会社
          - text: です。これを
          - link "源泉徴収義務者" [ref=f2e350] [cursor=pointer]:
            - /url: "#g-choshugimusha"
          - text: と呼びます。つまり所得税の納付という国との関係において、会社は「従業員の代わりに税を集めて納める、国の徴収代行者」の立場に立たされているのです。
        - paragraph [ref=f2e351]:
          - text: この立場には重い責任が伴います。天引きした所得税は原則として
          - strong [ref=f2e352]: 翌月10日まで
          - text: に納付しなければなりません。徴収し忘れ・納付漏れがあれば、（本来の負担者は従業員であっても）会社が不納付加算税や延滞税を課されます。「従業員のお金を預かって国に橋渡ししている」ため、そこにミスがあれば橋渡し役である会社の責任になる、という構造です。
        - complementary [ref=f2e353]:
