              - cell "改正前" [ref=f2e2412]
              - cell [ref=f2e2413]:
                - strong [ref=f2e2414]: 引上げ後を適用
            - row [ref=f2e2415]:
              - cell "低所得帯の基礎控除上乗せ特例" [ref=f2e2416]
